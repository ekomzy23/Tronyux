<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Edit book &mdash; Ronyx Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <div class="app">
    <div class="appbar">
      <a href="books.html" class="iconbtn">←</a>
      <span class="appbar__title" id="pageTitle">New book</span>
    </div>

    <div class="app__body">
      <div class="field">
        <label class="field__label">Title</label>
        <input class="input" id="title" placeholder="Book title">
      </div>
      <div class="btn-row">
        <div class="field" style="flex:1;">
          <label class="field__label">Author</label>
          <input class="input" id="author" placeholder="Author name">
        </div>
        <div class="field" style="flex:1;">
          <label class="field__label">Cover emoji</label>
          <input class="input" id="cover" placeholder="📘" maxlength="2">
        </div>
      </div>
      <div class="btn-row">
        <div class="field" style="flex:1;">
          <label class="field__label">Faculty</label>
          <input class="input" id="faculty" placeholder="Faculty of Science">
        </div>
        <div class="field" style="flex:1;">
          <label class="field__label">Department</label>
          <input class="input" id="department" placeholder="Biochemistry">
        </div>
      </div>
      <div class="btn-row">
        <div class="field" style="flex:1;">
          <label class="field__label">Course Code</label>
          <input class="input" id="courseCode" placeholder="BCH301">
        </div>
        <div class="field" style="flex:1;">
          <label class="field__label">Subject</label>
          <input class="input" id="subject" placeholder="Computer Science">
        </div>
      </div>
      <div class="field">
        <label class="field__label">Category <span style="color:var(--color-muted);font-weight:400;">— helps students find this book faster</span></label>
        <div id="catPicker" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;"></div>
        <input type="hidden" id="category" value="">
      </div>
      <div class="btn-row">
        <div class="field" style="flex:1;">
          <label class="field__label">Read time (min)</label>
          <input class="input" id="readMinutes" type="number" value="10">
        </div>
        <div class="field" style="flex:1;"></div>
      </div>
      <div class="field">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:8px;flex-wrap:wrap;">
          <label class="field__label" style="margin:0;">Course Content / Summary</label>
          <div style="display:flex;gap:6px;flex-shrink:0;">
            <button type="button" id="listenBtn" onclick="listenSummary()"
              style="font-size:11px;padding:5px 10px;background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.3);border-radius:8px;cursor:pointer;font-weight:700;white-space:nowrap;touch-action:manipulation;">
              &#128266; Listen
            </button>
            <button type="button" id="aiSumBtn" onclick="aiGenerateSummary()"
              style="font-size:11px;padding:5px 10px;background:rgba(109,94,252,.18);color:var(--color-primary-2);border:1px solid rgba(109,94,252,.35);border-radius:8px;cursor:pointer;font-weight:700;white-space:nowrap;touch-action:manipulation;">
              &#10024; AI Write
            </button>
          </div>
        </div>
        <p style="font-size:11px;color:var(--color-muted-2);margin:0 0 6px;">Students read this in-app. Use ## Heading, ### Sub-heading, - bullet point, **bold**, > quote. Supports full course notes.</p>
        <textarea class="input" id="summary" rows="18" placeholder="## Introduction&#10;Write your full course summary or notes here.&#10;&#10;## Chapter 1: Topic&#10;Students see this formatted in the library reader.&#10;&#10;- Key point 1&#10;- Key point 2&#10;&#10;> Important quote or definition"></textarea>
      </div>
      <div class="field">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
          <label class="field__label" style="margin:0;">Key takeaways (one per line)</label>
          <button type="button" id="aiTakeBtn" onclick="aiGenerateTakeaways()"
            style="font-size:11px;padding:5px 10px;background:rgba(109,94,252,.18);color:var(--color-primary-2);border:1px solid rgba(109,94,252,.35);border-radius:8px;cursor:pointer;font-weight:700;white-space:nowrap;touch-action:manipulation;">
            &#10024; AI Suggest
          </button>
        </div>
        <textarea class="input" id="takeaways" rows="4" placeholder="Key insight 1&#10;Key insight 2&#10;Key insight 3"></textarea>
      </div>

      <!-- ── Book file upload ── -->
      <div class="field">
        <label class="field__label">Book File <span style="color:var(--color-muted);font-weight:400;">(PDF or DOC — students open this in the reader)</span></label>

        <!-- Current file indicator (shown when book already has a file) -->
        <div id="currentFile" style="display:none; padding:12px 14px; background:var(--color-surface);
             border:1px solid var(--color-stroke); border-radius:12px; margin-bottom:10px;
             display:flex; align-items:center; gap:10px;">
          <span style="font-size:22px;">&#128196;</span>
          <div style="flex:1; min-width:0;">
            <div style="font-size:13px; font-weight:700;" id="currentFileName">Current file</div>
            <div style="font-size:11px; color:var(--color-muted);">Tap Replace to upload a new file</div>
          </div>
          <button class="btn btn--sm" onclick="removeCurrentFile()"
                  style="background:rgba(244,63,94,.1);color:#f43f5e;border:1px solid rgba(244,63,94,.25);flex-shrink:0;">
            Remove
          </button>
        </div>

        <!-- Drop zone -->
        <label id="fileDropZone" style="display:block; border:2px dashed var(--color-stroke);
               border-radius:14px; padding:20px; text-align:center; cursor:pointer;
               transition:border-color .2s, background .2s;">
          <div style="font-size:34px; margin-bottom:8px;">&#128228;</div>
          <div style="font-size:14px; font-weight:700; margin-bottom:3px;" id="fileDropLabel">Choose PDF or DOC file</div>
          <div style="font-size:11px; color:var(--color-muted);">Max 10 MB &middot; PDF, DOC, DOCX</div>
          <input type="file" id="bookFileInput" style="display:none;"
                 accept=".pdf,.doc,.docx" onchange="onFileChosen(this)">
        </label>

        <!-- Upload progress -->
        <div id="fileProgress" style="display:none; margin-top:10px;">
          <div style="font-size:13px; font-weight:600; margin-bottom:6px;" id="fileProgressMsg">Uploading&#8230;</div>
          <div style="height:5px; border-radius:3px; background:var(--color-stroke); overflow:hidden;">
            <div id="fileProgressFill" style="height:100%; width:0%; background:var(--color-primary-2);
                 border-radius:3px; transition:width .3s;"></div>
          </div>
        </div>
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;">
        <button class="btn btn--primary" onclick="save()" style="flex:1;min-width:120px;">Save</button>
        <button class="btn btn--ghost" id="previewBtn" style="flex:1;min-width:120px;display:none;" onclick="previewBook()">
          &#128065; Preview
        </button>
      </div>
      <button class="btn btn--danger" id="delBtn" style="display:none; margin-top: 8px;" onclick="del()">Delete</button>
    </div>
  </div>

  <script src="../js/appwrite.min.js?v=mrr39s6t"></script>
  <script src="../js/config.js?v=mrr39s6t"></script>
  <script src="../js/appwrite.js?v=mrr39s6t"></script>
  <script src="../js/admin-data.js?v=mrr39s6t"></script>
  <script src="../js/theme.js?v=mrr39s6t"></script>
  <script>
    /* ── Category chip picker ── */
    var CATEGORIES = [
      { id:'books',     label:'📚 Textbook'      },
      { id:'summaries', label:'📝 Summary'        },
      { id:'research',  label:'🔬 Research'       },
      { id:'materials', label:'📋 Materials'      },
      { id:'notes',     label:'📖 Lecture Notes'  },
      { id:'past',      label:'📄 Past Questions' },
      { id:'other',     label:'📂 Other'          },
    ];

    function renderCatPicker(selected) {
      var picker = document.getElementById('catPicker');
      picker.innerHTML = CATEGORIES.map(function(c) {
        var active = selected === c.id;
        return '<button type="button" onclick="pickCat(\''+c.id+'\')" style="'+
          'padding:8px 14px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;'+
          'border:1px solid '+(active?'rgba(109,94,252,.6)':'var(--color-stroke)')+';'+
          'background:'+(active?'rgba(109,94,252,.2)':'var(--color-surface)')+';'+
          'color:'+(active?'var(--color-primary-2)':'var(--color-muted)')+';'+
          '-webkit-tap-highlight-color:transparent;">'+c.label+'</button>';
      }).join('');
    }

    function pickCat(id) {
      document.getElementById('category').value = id;
      renderCatPicker(id);
    }

    renderCatPicker('');

    requireAdmin();
    const id = new URLSearchParams(location.search).get('id');

    /* ── File upload state ── */
    var _newFileId    = null;  /* fileId of a freshly uploaded file */
    var _existingFileId = null; /* fileId that was on the book when loaded */
    var _removeFile   = false; /* user clicked Remove on existing file */

    function showCurrentFile(fileId, label) {
      _existingFileId = fileId;
      var el = document.getElementById('currentFile');
      if (!el) return;
      el.style.display = 'flex';
      document.getElementById('currentFileName').textContent = label || 'Attached file';
    }

    function removeCurrentFile() {
      _removeFile = true;
      _existingFileId = null;
      var el = document.getElementById('currentFile');
      if (el) el.style.display = 'none';
    }

    function setProgress(msg, pct) {
      var wrap = document.getElementById('fileProgress');
      if (!wrap) return;
      wrap.style.display = 'block';
      document.getElementById('fileProgressMsg').textContent = msg || 'Uploading...';
      document.getElementById('fileProgressFill').style.width = (pct || 0) + '%';
    }
    function hideProgress() {
      var wrap = document.getElementById('fileProgress');
      if (wrap) wrap.style.display = 'none';
    }

    async function onFileChosen(input) {
      var file = input.files[0];
      if (!file) return;

      var dropZone = document.getElementById('fileDropZone');
      var dropLabel = document.getElementById('fileDropLabel');

      if (file.size > 10 * 1024 * 1024) {
        alert('File too large (max 10 MB). Please compress or split the PDF.');
        input.value = '';
        return;
      }

      setProgress('Uploading ' + file.name + '...', 30);
      if (dropZone) dropZone.style.borderColor = 'var(--color-primary-2)';

      try {
        var result = await RonyxAdmin.uploadBookFile(file);
        _newFileId = result.$id;
        setProgress('Uploaded! Will save with book.', 100);
        if (dropLabel) dropLabel.textContent = file.name;
        setTimeout(hideProgress, 2000);
        if (dropZone) dropZone.style.borderColor = 'var(--color-success, #34d399)';
      } catch (e) {
        hideProgress();
        if (dropZone) dropZone.style.borderColor = 'var(--color-danger)';
        alert('Upload failed: ' + (e.message || 'Unknown error') + '\n\nMake sure the uploads storage bucket exists in Appwrite.');
        input.value = '';
      }
    }

    /* ── Load existing book OR pre-link a file from Media Library ── */
    (async function () {
      var params      = new URLSearchParams(location.search);
      var preFileId   = params.get('fileId');
      var preFileName = params.get('fileName') ? decodeURIComponent(params.get('fileName')) : null;

      if (id) {
        document.getElementById('pageTitle').textContent = 'Edit book';
        document.getElementById('delBtn').style.display = 'block';
        const b = await RonyxAdmin.getBook(id);
        document.getElementById('title').value = b.title || '';
        document.getElementById('author').value = b.author || '';
        document.getElementById('cover').value = b.cover || '📘';
        document.getElementById('faculty').value = b.faculty || '';
        document.getElementById('department').value = b.department || '';
        document.getElementById('courseCode').value = b.courseCode || '';
        document.getElementById('subject').value = b.subject || '';
        document.getElementById('readMinutes').value = b.readMinutes || 10;
        document.getElementById('summary').value = b.summary || '';
        try { document.getElementById('takeaways').value = JSON.parse(b.takeaways || '[]').join('\n'); } catch (e) {}
        if (b.category) { document.getElementById('category').value = b.category; renderCatPicker(b.category); }
        if (b.fileId) showCurrentFile(b.fileId, 'Current file (PDF/DOC attached)');
      } else if (preFileId) {
        /* Arriving from Media Library — file is already in storage, just link it */
        _newFileId = preFileId;
        showCurrentFile(preFileId, preFileName || 'Media Library file');
        var titleEl = document.getElementById('title');
        if (!titleEl.value && preFileName) {
          titleEl.value = preFileName.replace(/\.[^.]+$/, '').replace(/[-_]+/g, ' ');
        }
        var dropLabel = document.getElementById('fileDropLabel');
        if (dropLabel) dropLabel.textContent = 'Replace with a different file (optional)';
      }
    })();

    /* ── Save ── */
    async function save() {
      const btn = document.querySelector('button.btn.btn--primary');
      if (btn) { btn.textContent = 'Saving...'; btn.disabled = true; }

      const takes = document.getElementById('takeaways').value.split('\n').map(s => s.trim()).filter(Boolean);
      const data = {
        title:       document.getElementById('title').value.trim(),
        author:      document.getElementById('author').value.trim(),
        cover:       document.getElementById('cover').value.trim() || '📘',
        faculty:     document.getElementById('faculty').value.trim(),
        department:  document.getElementById('department').value.trim(),
        courseCode:  document.getElementById('courseCode').value.trim(),
        subject:     document.getElementById('subject').value.trim(),
        category:    document.getElementById('category').value.trim(),
        readMinutes: parseInt(document.getElementById('readMinutes').value) || 10,
        summary:     document.getElementById('summary').value,
        takeaways:   JSON.stringify(takes),
      };

      /* Include file metadata if a new file was uploaded */
      if (_newFileId) {
        data.fileId = _newFileId;
      } else if (_removeFile) {
        data.fileId = null;
      }

      if (!data.title) {
        if (btn) { btn.textContent = 'Save'; btn.disabled = false; }
        return alert('Title is required.');
      }

      /* Auto-strip unknown attributes and retry until Appwrite accepts the save */
      var payload  = Object.assign({}, data);
      var optional = ['category', 'takeaways', 'faculty', 'department', 'courseCode', 'subject'];
      var stripped = [];
      var maxTries = optional.length + 1;
      for (var _t = 0; _t < maxTries; _t++) {
        try {
          if (id) await RonyxAdmin.updateBook(id, payload);
          else    await RonyxAdmin.createBook(payload);
          if (stripped.length) toast('Saved (some fields unavailable: ' + stripped.join(', ') + ')', 'info');
          location.href = 'books.html';
          return;
        } catch (e) {
          var match = (e.message || '').match(/[Uu]nknown attribute[^']*'?(\w+)'?/);
          var bad   = match ? match[1] : null;
          if (bad && optional.indexOf(bad) !== -1) {
            delete payload[bad];
            optional = optional.filter(function(a){ return a !== bad; });
            stripped.push(bad);
          } else {
            if (btn) { btn.textContent = 'Save'; btn.disabled = false; }
            alert('Save failed — ' + (e.message || JSON.stringify(e)));
            return;
          }
        }
      }
      if (btn) { btn.textContent = 'Save'; btn.disabled = false; }
      alert('Save failed — could not find a compatible payload.');
    }

    /* ── AI helpers ── */
    async function _aiCall(type, payload) {
      var sessionKey = typeof getAdminSessionKey === 'function' ? getAdminSessionKey() : '';
      if (!sessionKey) throw new Error('Session expired — log out and back in first.');
      var resp = await fetch('/api/ai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Session': sessionKey },
        body: JSON.stringify({ type: type, payload: payload })
      });
      var data = await resp.json();
      if (!resp.ok) throw new Error(data.error || 'AI request failed');
      return data.result;
    }

    async function aiGenerateSummary() {
      var title = document.getElementById('title').value.trim();
      if (!title) { alert('Fill in the title first so AI knows what to write about.'); return; }
      var btn = document.getElementById('aiSumBtn');
      btn.textContent = '⏳ Writing…'; btn.disabled = true;
      try {
        var summary = await _aiCall('book_summary', {
          title:      title,
          author:     document.getElementById('author').value.trim(),
          courseCode: document.getElementById('courseCode').value.trim(),
          subject:    document.getElementById('subject').value.trim(),
          department: document.getElementById('department').value.trim(),
          faculty:    document.getElementById('faculty').value.trim(),
        });
        document.getElementById('summary').value = summary;
        toast('Summary generated — review and edit before saving.', 'success');
      } catch(e) { toast('AI error: ' + e.message, 'error'); }
      btn.textContent = '✨ AI Write'; btn.disabled = false;
    }

    async function aiGenerateTakeaways() {
      var title   = document.getElementById('title').value.trim();
      var summary = document.getElementById('summary').value.trim();
      if (!title && !summary) { alert('Fill in the title or summary first.'); return; }
      var btn = document.getElementById('aiTakeBtn');
      btn.textContent = '⏳ Thinking…'; btn.disabled = true;
      try {
        var takes = await _aiCall('book_takeaways', { title: title, summary: summary });
        document.getElementById('takeaways').value = takes.trim();
        toast('Takeaways generated — edit if needed.', 'success');
      } catch(e) { toast('AI error: ' + e.message, 'error'); }
      btn.textContent = '✨ AI Suggest'; btn.disabled = false;
    }

    async function del() {
      if (!confirm('Delete this book?')) return;
      /* Clean up the attached file from storage too */
      var fileId = _existingFileId || _newFileId;
      if (fileId) await RonyxAdmin.deleteBookFile(fileId).catch(function(){});
      await RonyxAdmin.deleteBook(id);
      location.href = 'books.html';
    }

    /* ── Preview — open student reader in new tab ── */
    function previewBook() {
      if (!id) { toast('Save the book first to preview it.', 'info'); return; }
      window.open('/pages/student/book.html?id=' + encodeURIComponent(id), '_blank');
    }

    /* ── Listen — TTS on summary textarea content ── */
    var _ttsPlaying = false, _ttsGen = 0;
    function listenSummary() {
      var synth = window.speechSynthesis;
      if (!synth) { toast('Text-to-speech not supported in this browser.', 'info'); return; }
      var btn = document.getElementById('listenBtn');

      if (_ttsPlaying) {
        _ttsGen++;
        synth.cancel();
        _ttsPlaying = false;
        if (btn) btn.innerHTML = '&#128266; Listen';
        return;
      }

      /* Strip markdown syntax for cleaner speech */
      var raw = (document.getElementById('summary').value || '').trim();
      if (!raw) { toast('Nothing to read — write some content first.', 'info'); return; }

      raw = raw
        .replace(/#{1,6}\s+/g, '')
        .replace(/\*\*(.+?)\*\*/g, '$1')
        .replace(/\*(.+?)\*/g, '$1')
        .replace(/`(.+?)`/g, '$1')
        .replace(/>\s*/g, '')
        .replace(/^-\s+/gm, '')
        .replace(/\n{2,}/g, '. ')
        .replace(/\n/g, ' ');

      /* Split into sentences */
      var sentences = raw.match(/[^.!?]+[.!?]+/g) || [raw];
      var myGen = ++_ttsGen;
      _ttsPlaying = true;
      if (btn) btn.innerHTML = '&#9632; Stop';

      var idx = 0;
      function next() {
        if (myGen !== _ttsGen || idx >= sentences.length) {
          _ttsPlaying = false;
          if (btn) btn.innerHTML = '&#128266; Listen';
          return;
        }
        var u = new SpeechSynthesisUtterance(sentences[idx++].trim());
        u.rate = 0.95;
        u.onend = next;
        u.onerror = function(e) { if (e.error !== 'interrupted' && e.error !== 'canceled') next(); };
        synth.speak(u);
      }
      next();
    }

    /* Show Preview button only when editing an existing book */
    (function() {
      if (id) {
        var btn = document.getElementById('previewBtn');
        if (btn) btn.style.display = '';
      }
    })();
  </script>
</body>
</html>
