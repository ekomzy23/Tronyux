<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Books &mdash; Ronyx Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <div class="app">
    <div class="appbar">
      <a href="dashboard.html" class="iconbtn">←</a>
      <span class="appbar__title">Library</span>
      <button class="iconbtn" onclick="location.href='book-edit.html'">＋</button>
    </div>

    <div class="app__body">
      <div id="bookList">
        <div class="empty"><div class="empty__icon">⏳</div><p>Loading&hellip;</p></div>
      </div>
    </div>
    <nav class="tabbar" data-nav-admin="books"></nav>
  </div>

  <script src="../js/appwrite.min.js?v=mqypss88"></script>
  <script src="../js/config.js?v=mqypss88"></script>
  <script src="../js/appwrite.js?v=mqypss88"></script>
  <script src="../js/admin-data.js?v=mqypss88"></script>
  <script src="../js/realtime.js?v=mqypss88"></script>
  <script src="../js/theme.js?v=mqypss88"></script>
  <script src="../js/ui.js?v=mqypss88"></script>
  <script>
    requireAdmin();
    async function load() {
      const books = await RonyxAdmin.listBooks();
      const el = document.getElementById('bookList');
      el.innerHTML = books.length ? books.map(b => `
        <div class="row-card">
          <div class="row-card__icon" style="font-size:24px;">${b.cover || '📘'}</div>
          <div class="row-card__meta" style="flex:1;"><h4>${b.title}</h4><p>${b.author || 'N/A'} &middot; ${b.readMinutes || 0} min</p></div>
          <button class="btn btn--sm" onclick="location.href='book-edit.html?id=${b.$id}'">Edit</button>
          <button class="btn btn--sm btn--danger" onclick="delBook('${b.$id}')">✕</button>
        </div>`).join('') : '<div class="empty"><div class="empty__icon">📖</div><p>No books.</p></div>';
    }
    async function delBook(id) {
      if (!confirm('Delete this book permanently?')) return;
      try { await RonyxAdmin.deleteBook(id); toast('Book deleted.', 'success'); load(); }
      catch(e) { toast('Delete failed: ' + e.message, 'error'); }
    }
    load();
    if (window.RonyxRealtime && RONYX.CONFIGURED) RonyxRealtime.subscribe(RONYX.COLLECTIONS.books, load);
  </script>
</body>
</html>
