<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Results &mdash; Ronyx Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <div class="app">
    <div class="appbar">
      <a href="dashboard.html" class="iconbtn">←</a>
      <span class="appbar__title">Results</span>
    </div>

    <div class="app__body">

      <div class="stat-grid mb-4">
        <div class="stat stat--accent"><div class="stat__n" id="kSubmitted">&mdash;</div><div class="stat__l">Submitted</div></div>
        <div class="stat"><div class="stat__n" id="kInProgress">&mdash;</div><div class="stat__l">In Progress</div></div>
        <div class="stat"><div class="stat__n" id="kTotal">&mdash;</div><div class="stat__l">Total</div></div>
      </div>

      <div class="search-bar mb-4">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Search by student or exam ID&hellip;" oninput="render()">
      </div>

      <div class="section-hd"><h3>Submissions</h3></div>
      <div id="attemptList">
        <div class="empty"><div class="empty__icon">⏳</div><p>Loading&hellip;</p></div>
      </div>

    </div>
    <nav class="tabbar" data-nav-admin="more"></nav>
  </div>

  <script src="../js/appwrite.min.js?v=mqypih1j"></script>
  <script src="../js/config.js?v=mqypih1j"></script>
  <script src="../js/appwrite.js?v=mqypih1j"></script>
  <script src="../js/admin-data.js?v=mqypih1j"></script>
  <script src="../js/theme.js?v=mqypih1j"></script>
  <script src="../js/ui.js?v=mqypih1j"></script>
  <script>
    requireAdmin();
    let allAttempts = [];

    function render() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      let list = allAttempts;
      if (q) list = list.filter(a => (a.userId||'').toLowerCase().includes(q) || (a.examId||'').toLowerCase().includes(q));
      const el = document.getElementById('attemptList');
      if (!list.length) {
        el.innerHTML = '<div class="empty"><div class="empty__icon">📊</div><p>No attempts yet.</p></div>';
        return;
      }
      el.innerHTML = list.map(a => {
        const date = a.$createdAt ? new Date(a.$createdAt).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '&mdash;';
        const statusCls = a.status === 'submitted' ? 'badge--green' : a.status === 'in_progress' ? 'badge--yellow' : 'badge--violet';
        const statusLabel = a.status === 'submitted' ? 'Submitted' : a.status === 'in_progress' ? 'In Progress' : (a.status || 'Started');
        const studentId = a.userId ? a.userId.slice(0,12) + '&hellip;' : 'Unknown';
        const examId = a.examId ? a.examId.slice(0,10) + '&hellip;' : 'Unknown Exam';
        return `<div class="row-card">
          <div style="width:40px;height:40px;border-radius:14px;background:var(--gradient-brand);display:grid;place-items:center;font-size:16px;color:#fff;flex-shrink:0;">📊</div>
          <div class="row-card__meta" style="flex:1;">
            <h4>${studentId}</h4>
            <p>Exam: ${examId} &middot; ${date}</p>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
            <span class="badge ${statusCls}">${statusLabel}</span>
            <button class="btn btn--sm" onclick="viewAttempt('${a.$id}')">View</button>
          </div>
        </div>`;
      }).join('');
    }

    function viewAttempt(id) {
      toast('Attempt detail view coming soon');
    }

    async function load() {
      if (!RONYX.CONFIGURED) {
        document.getElementById('attemptList').innerHTML = '<div class="empty"><div class="empty__icon">⚙️</div><p>Connect Appwrite to view results.</p></div>';
        document.getElementById('kSubmitted').textContent = '0';
        document.getElementById('kInProgress').textContent = '0';
        document.getElementById('kTotal').textContent = '0';
        return;
      }
      try {
        allAttempts = await RonyxAdmin.listAttempts();
        const submitted = allAttempts.filter(a => a.status === 'submitted').length;
        const inProgress = allAttempts.filter(a => a.status === 'in_progress').length;
        document.getElementById('kSubmitted').textContent = submitted;
        document.getElementById('kInProgress').textContent = inProgress;
        document.getElementById('kTotal').textContent = allAttempts.length;
        render();
      } catch(e) {
        document.getElementById('attemptList').innerHTML = '<div class="empty"><div class="empty__icon">⚠️</div><p>Failed to load.</p></div>';
      }
    }
    load();
  </script>
</body>
</html>
