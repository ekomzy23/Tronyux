<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Question review — Runyx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="app">

    <div class="appbar">
      <a href="/pages/student/performance.html" class="iconbtn">←</a>
      <span class="appbar__title">Question review</span>
    </div>

    <div class="app__body">
      <div class="chips mb-4">
        <div class="chip is-active">All</div>
        <div class="chip">Correct</div>
        <div class="chip">Incorrect</div>
        <div class="chip">Unattempted</div>
      </div>

      <a href="/pages/student/explain.html" class="row-card">
        <div class="row-card__icon row-card__icon--green">✓</div>
        <div class="row-card__meta"><h4>Q1 · Time complexity</h4><p>Correct · 3 marks</p></div>
      </a>
      <a href="/pages/student/explain.html" class="row-card">
        <div class="row-card__icon row-card__icon--green">✓</div>
        <div class="row-card__meta"><h4>Q2 · Stacks &amp; queues</h4><p>Correct · 3 marks</p></div>
      </a>
      <a href="/pages/student/explain.html" class="row-card">
        <div class="row-card__icon row-card__icon--red">✕</div>
        <div class="row-card__meta"><h4>Q3 · Binary search complexity</h4><p>Incorrect · 0 / 3 marks</p></div>
      </a>
      <a href="/pages/student/explain.html" class="row-card">
        <div class="row-card__icon row-card__icon--green">✓</div>
        <div class="row-card__meta"><h4>Q4 · Hash tables</h4><p>Correct · 3 marks</p></div>
      </a>
      <a href="/pages/student/explain.html" class="row-card">
        <div class="row-card__icon row-card__icon--red">✕</div>
        <div class="row-card__meta"><h4>Q5 · Tree traversal</h4><p>Incorrect · 0 / 3 marks</p></div>
      </a>
    </div>

    <nav class="tabbar" data-nav="results"></nav>
  </div>

  <script src="/js/ui.js"></script>
  <script src="/js/theme.js"></script>
</body>
</html>
