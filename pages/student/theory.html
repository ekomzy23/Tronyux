  <style>
    /* ---- override app body to flex column ---- */
    .app__body { padding:0; overflow:hidden; display:flex; flex-direction:column; }

    /* ---- question header ---- */
    .q-hdr {
      padding:8px 14px; background:var(--color-bg-2);
      border-bottom:1px solid var(--color-stroke); flex-shrink:0;
    }
    .q-hdr__meta { display:flex; justify-content:space-between; font-size:11px; color:var(--color-muted-2); margin-bottom:4px; }
    .q-hdr__text { font-size:14px; font-weight:600; line-height:1.4; }

    /* ---- format toolbar ---- */
    .fmtbar {
      display:flex; overflow-x:auto; scrollbar-width:none; gap:3px;
      padding:5px 10px; border-bottom:1px solid var(--color-stroke); flex-shrink:0;
      align-items:center;
    }
    .fmtbar::-webkit-scrollbar { display:none; }
    .fmtbar__sep { width:1px; height:18px; background:var(--color-stroke); flex-shrink:0; margin:0 3px; }
    .fb {
      flex-shrink:0; min-width:30px; height:30px; padding:0 8px; border-radius:8px;
      border:1px solid transparent; background:transparent; color:var(--color-muted);
      font-family:var(--font-body); font-size:12px; font-weight:700; cursor:pointer;
      display:flex; align-items:center; justify-content:center; transition:.12s;
    }
    .fb:hover { background:var(--color-surface-2); color:var(--color-text); }
    .fb.active { background:var(--color-primary-soft); color:var(--color-primary-2); border-color:rgba(109,94,252,.35); }

    /* ---- editor ---- */
    .editor-wrap { flex:1; overflow-y:auto; position:relative; }
    #editor {
      min-height:100%; padding:14px 16px 40px;
      font-size:15px; line-height:1.7; color:var(--color-text);
      outline:none; caret-color:var(--color-primary-2);
      font-family:var(--font-body);
    }
    #editor:empty::before {
      content:attr(data-placeholder);
      color:var(--color-muted-2); pointer-events:none;
    }
    #editor h1 { font-size:22px; font-weight:800; margin:12px 0 6px; }
    #editor h2 { font-size:18px; font-weight:700; margin:10px 0 5px; }
    #editor h3 { font-size:15px; font-weight:700; margin:8px 0 4px; color:var(--color-primary-2); }
    #editor ul, #editor ol { padding-left:20px; margin:6px 0; }
    #editor li { margin:3px 0; }
    #editor blockquote { border-left:3px solid var(--color-primary-2); margin:8px 0; padding:6px 12px; color:var(--color-muted); background:var(--color-surface); border-radius:0 8px 8px 0; }
    #editor code, #editor pre { font-family:ui-monospace,monospace; background:var(--color-surface-2); border-radius:6px; padding:2px 6px; font-size:13px; }
    #editor pre { display:block; padding:10px; margin:8px 0; overflow-x:auto; }
    #editor mark { background:rgba(251,191,36,.3); color:var(--color-text); border-radius:3px; padding:0 2px; }
    #editor img { max-width:100%; border-radius:10px; margin:8px 0; display:block; }
    #editor hr { border:none; border-top:1px solid var(--color-stroke); margin:12px 0; }
    #editor a { color:var(--color-primary-2); text-decoration:underline; }
    #editor table { width:100%; border-collapse:collapse; margin:8px 0; }
    #editor td, #editor th { border:1px solid var(--color-stroke); padding:6px 10px; font-size:13px; }
    #editor th { background:var(--color-surface); font-weight:700; }

    /* ---- word count bar ---- */
    .wc-bar { position:absolute; bottom:0; left:0; right:0; display:flex; justify-content:space-between;
              padding:3px 14px; background:var(--color-bg); border-top:1px solid var(--color-stroke);
              font-size:10px; color:var(--color-muted-2); pointer-events:none; }

    /* ---- bottom action bar ---- */
    .action-bar {
      display:flex; border-top:1px solid var(--color-stroke); flex-shrink:0;
      background:var(--color-bg-2);
    }
    .ab-btn {
      flex:1; padding:10px 4px; font-size:11px; font-weight:700; color:var(--color-muted);
      border:none; background:transparent; cursor:pointer; display:flex;
      flex-direction:column; align-items:center; gap:2px; transition:.15s;
    }
    .ab-btn span { font-size:16px; line-height:1; }
    .ab-btn.active { color:var(--color-primary-2); background:var(--color-primary-soft); }

    /* ---- keyboard sheet ---- */
    .kb-sheet {
      flex-shrink:0; border-top:1px solid var(--color-stroke);
      background:var(--color-bg-2); display:none; flex-direction:column;
      max-height:52vh;
    }
    .kb-sheet.open { display:flex; }
    .kb-tabs { display:flex; overflow-x:auto; scrollbar-width:none; gap:0;
               border-bottom:1px solid var(--color-stroke); flex-shrink:0; }
    .kb-tabs::-webkit-scrollbar { display:none; }
    .kbt { flex-shrink:0; padding:7px 14px; font-size:11px; font-weight:700;
           color:var(--color-muted); border-bottom:2px solid transparent; cursor:pointer; transition:.12s; }
    .kbt.active { color:var(--color-primary-2); border-bottom-color:var(--color-primary-2); }
    .kb-panels { flex:1; overflow:hidden; position:relative; min-height:120px; }
    .kbp { position:absolute; inset:0; display:none; overflow-y:auto;
            grid-template-columns:repeat(6,1fr); gap:4px; padding:6px; }
    .kbp.active { display:grid; }
    .ks {
      border-radius:8px; border:1px solid var(--color-stroke); background:var(--color-surface);
      color:var(--color-text); font-size:14px; padding:8px 4px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; user-select:none;
      -webkit-tap-highlight-color:transparent; transition:transform .07s;
    }
    .ks:active { transform:scale(.88); background:var(--color-surface-2); }
    .ks--wide { grid-column:span 2; font-size:11px; font-weight:700; }

    /* ---- canvas overlay ---- */
    .canvas-ov {
      position:absolute; inset:0; z-index:50; background:var(--color-bg);
      display:none; flex-direction:column;
    }
    .canvas-ov.open { display:flex; }
    .cv-head { display:flex; align-items:center; gap:6px; padding:8px 12px;
               border-bottom:1px solid var(--color-stroke); flex-shrink:0; }
    .cv-head__title { flex:1; font-size:14px; font-weight:700; }
    .cv-tools { display:flex; overflow-x:auto; scrollbar-width:none;
                gap:4px; padding:6px 10px; border-bottom:1px solid var(--color-stroke); flex-shrink:0; }
    .cv-tools::-webkit-scrollbar { display:none; }
    .cvt { flex-shrink:0; min-width:36px; height:36px; border-radius:10px; border:1px solid var(--color-stroke);
           background:var(--color-surface); color:var(--color-muted); font-size:14px;
           cursor:pointer; display:flex; align-items:center; justify-content:center; transition:.12s; }
    .cvt:hover { background:var(--color-surface-2); }
    .cvt.active { background:var(--color-primary-soft); color:var(--color-primary-2); border-color:rgba(109,94,252,.4); }
    .cv-colors { display:flex; gap:5px; padding:5px 10px; flex-shrink:0; align-items:center; flex-wrap:wrap; }
    .cc { width:22px; height:22px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:.12s; flex-shrink:0; }
    .cc.active { border-color:var(--color-text); transform:scale(1.2); }
    .cv-sizes { display:flex; gap:5px; padding:0 10px 4px; align-items:center; flex-shrink:0; }
    .csz { width:28px; height:28px; border-radius:8px; border:1px solid var(--color-stroke); background:var(--color-surface);
           cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .csz.active { border-color:var(--color-primary-2); background:var(--color-primary-soft); }
    .canvas-wrap { flex:1; overflow:hidden; position:relative; background:#111128; }
    #drawCanvas { display:block; touch-action:none; cursor:crosshair; }
    .cv-bottom { display:flex; gap:5px; padding:6px 10px; border-top:1px solid var(--color-stroke);
                 flex-shrink:0; }
    .cvb { flex:1; padding:8px; border-radius:10px; border:1px solid var(--color-stroke);
           background:var(--color-surface); color:var(--color-muted); font-size:11px; font-weight:700; cursor:pointer; }
    .cvb--primary { background:var(--gradient-brand); color:#fff; border-color:transparent; }

      <button class="csz" data-sz="8" onclick="setBrush(8)"><div style="width:8px;height:8px;background:currentColor;border-radius:50%;margin:auto;"></div></button>

<script src="/js/appwrite.min.js?v=mqypih1j"></script>
<script src="/js/config.js?v=mqypih1j"></script>
<script src="/js/theme.js?v=mqypih1j"></script>
<script>
(function(){
  'use strict';

  /* ===== Rich Text Editor ===== */
  var editor   = document.getElementById('editor');
  var saveKey  = 'ronyx_theory_' + (new URLSearchParams(location.search).get('q') || 'demo');
  var savedSel = null;
  var saveTimer;

  // Restore saved content
  var saved = sessionStorage.getItem(saveKey);
  if (saved) editor.innerHTML = saved;

  // Save selection when editor loses focus (keyboard buttons steal focus)
  editor.addEventListener('blur', function(){
    var sel = window.getSelection();
    if (sel && sel.rangeCount) savedSel = sel.getRangeAt(0).cloneRange();
  });

  // Autosave
  editor.addEventListener('input', function(){
    updateWc();
    clearTimeout(saveTimer);
    document.getElementById('saveStatus').textContent = 'Saving...';
    saveTimer = setTimeout(function(){
      sessionStorage.setItem(saveKey, editor.innerHTML);
      document.getElementById('saveStatus').textContent = 'Saved ✓';
    }, 700);
  });

  function updateWc() {
    var text = editor.innerText || '';
    var words = text.trim() ? text.trim().split(/\s+/).length : 0;
    document.getElementById('wcWords').textContent = words + ' word' + (words===1?'':'s');
  }
  updateWc();

  /* ---- Formatting commands ---- */
  window.fmt = function(cmd, val) {
    editor.focus();
    document.execCommand(cmd, false, val || null);
    editor.focus();
  };
  window.fmtBlock = function(tag) {
    editor.focus();
    document.execCommand('formatBlock', false, '<'+tag+'>');
    editor.focus();
  };
  window.insertCode = function() {
    editor.focus();
    document.execCommand('insertHTML', false, '<code>&nbsp;</code>');
    editor.focus();
  };
  window.insertHR = function() {
    editor.focus();
    document.execCommand('insertHTML', false, '<hr>');
    editor.focus();
  };
  window.insertLink = function() {
    var url = prompt('URL:', 'https://');
    if (!url) return;
    editor.focus();
    document.execCommand('createLink', false, url);
    editor.focus();
  };
  window.insertTable = function() {
    editor.focus();
    document.execCommand('insertHTML', false,
      '<table><tr><th>Header 1</th><th>Header 2</th><th>Header 3</th></tr>' +
      '<tr><td>Cell</td><td>Cell</td><td>Cell</td></tr>' +
      '<tr><td>Cell</td><td>Cell</td><td>Cell</td></tr></table><p></p>');
    editor.focus();
  };

  /* ---- Symbol insertion (from keyboard) ---- */
  window.ins = function(sym) {
    // Restore selection if we lost it
    if (savedSel) {
      var sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(savedSel);
    } else {
      editor.focus();
    }
    try { document.execCommand('insertText', false, sym); }
    catch(e) {
      // Fallback: insert at end
      editor.focus();
      var range = document.createRange();
      range.selectNodeContents(editor);
      range.collapse(false);
      var sel2 = window.getSelection();
      sel2.removeAllRanges();
      sel2.addRange(range);
      document.execCommand('insertText', false, sym);
    }
    updateWc();
    // Save selection for next symbol
    var sel3 = window.getSelection();
    if (sel3 && sel3.rangeCount) savedSel = sel3.getRangeAt(0).cloneRange();
  };

  /* ===== Keyboard Panels ===== */
  var kbOpen = false;
  window.switchKb = function(name, btn) {
    document.querySelectorAll('.kbt').forEach(function(b){ b.classList.remove('active'); });
    document.querySelectorAll('.kbp').forEach(function(p){ p.classList.remove('active'); });
    var p = document.getElementById('kbp-'+name);
    if (p) p.classList.add('active');
    if (btn) btn.classList.add('active');
  };

  /* ===== Bottom action bar ===== */
  window.abSwitch = function(mode) {
    document.querySelectorAll('.ab-btn').forEach(function(b){ b.classList.remove('active'); });
    var kbSheet = document.getElementById('kbSheet');
    if (mode === 'kb') {
      document.getElementById('ab-kb').classList.add('active');
      kbSheet.classList.toggle('open');
      kbOpen = kbSheet.classList.contains('open');
      if (kbOpen) {
        // Save selection now before keyboard takes focus
        var sel = window.getSelection();
        if (sel && sel.rangeCount) savedSel = sel.getRangeAt(0).cloneRange();
      }
    } else if (mode === 'canvas') {
      document.getElementById('ab-canvas').classList.add('active');
      openCanvas();
    } else {
      document.getElementById('ab-editor').classList.add('active');
      kbSheet.classList.remove('open');
      kbOpen = false;
      editor.focus();
    }
  };
  window.triggerUpload = function() {
    document.getElementById('imgUpload').click();
  };
  window.insertImage = function(input) {
    var file = input.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      editor.focus();
      document.execCommand('insertHTML', false, '<img src="'+e.target.result+'" alt="uploaded image"><p></p>');
      updateWc();
    };
    reader.readAsDataURL(file);
    input.value = '';
  };

  /* ===== Canvas Drawing ===== */
  var canvas, ctx, isDrawing=false, tool='pen', color='#ffffff', brushSz=3;
  var snapshots=[], startX, startY, overlayImg;

  var COLORS = ['#ffffff','#6d5efc','#34d399','#fb7185','#fbbf24','#60a5fa','#f472b6','#000000'];

  function openCanvas() {
    var ov = document.getElementById('canvasOv');
    ov.classList.add('open');
    setTimeout(initCanvas, 50);
  }
  window.closeCanvas = function() {
    document.getElementById('canvasOv').classList.remove('open');
    document.getElementById('ab-editor').classList.add('active');
    document.getElementById('ab-canvas').classList.remove('active');
  };

  function initCanvas() {
    canvas = document.getElementById('drawCanvas');
    var wrap = document.getElementById('canvasWrap');
    canvas.width  = wrap.clientWidth;
    canvas.height = wrap.clientHeight;
    ctx = canvas.getContext('2d');
    ctx.fillStyle = '#111128';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    pushSnap();
    bindCanvas();
  }

  // Color buttons
  var cDiv = document.getElementById('cvColors');
  COLORS.forEach(function(c){
    var btn = document.createElement('div');
    btn.className = 'cc' + (c===color?' active':'');
    btn.style.background = c;
    btn.style.border = '2px solid ' + (c===color?'var(--color-text)':'transparent');
    btn.onclick = function(){
      color = c;
      document.querySelectorAll('.cc').forEach(function(x){
        x.style.border = '2px solid '+(x.style.background===c?'var(--color-text)':'transparent');
      });
    };
    cDiv.appendChild(btn);
  });

  window.setTool = function(t) {
    tool = t;
    document.querySelectorAll('.cvt').forEach(function(b){ b.classList.remove('active'); });
    var el = document.getElementById('cvt-'+t);
    if (el) el.classList.add('active');
  };
  window.setBrush = function(sz) {
    brushSz = sz;
    document.querySelectorAll('.csz').forEach(function(b){ b.classList.remove('active'); });
    document.querySelector('.csz[data-sz="'+sz+'"]').classList.add('active');
  };

  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - r.left, y: src.clientY - r.top };
  }

  function pushSnap() {
    if (!ctx) return;
    snapshots.push(ctx.getImageData(0,0,canvas.width,canvas.height));
    if (snapshots.length > 40) snapshots.shift();
  }

  function bindCanvas() {
    function start(e) {
      e.preventDefault();
      var p = getPos(e); startX=p.x; startY=p.y; isDrawing=true;
      pushSnap();
      if (tool==='pen'||tool==='hl'||tool==='er') {
        ctx.beginPath(); ctx.moveTo(p.x,p.y);
      }
      if (tool==='txt') {
        var text = prompt('Enter text:', '');
        if (text) {
          ctx.font = (brushSz*6)+'px Inter, sans-serif';
          ctx.fillStyle = color;
          ctx.fillText(text, p.x, p.y);
          pushSnap();
        }
        isDrawing = false;
      }
    }
    function move(e) {
      if (!isDrawing) return; e.preventDefault();
      var p = getPos(e);
      if (tool==='pen'||tool==='hl'||tool==='er') {
        ctx.lineWidth = tool==='hl' ? brushSz*4 : brushSz;
        ctx.strokeStyle = tool==='er' ? '#111128' : color;
        ctx.globalAlpha = tool==='hl' ? 0.3 : 1;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.lineTo(p.x,p.y); ctx.stroke();
        ctx.globalAlpha = 1;
      } else if (tool==='line'||tool==='rect'||tool==='circ'||tool==='arr') {
        // Restore last snapshot for preview
        if (snapshots.length) ctx.putImageData(snapshots[snapshots.length-1],0,0);
        ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=brushSz; ctx.lineCap='round';
        if (tool==='line') { ctx.moveTo(startX,startY); ctx.lineTo(p.x,p.y); ctx.stroke(); }
        else if (tool==='rect') { ctx.strokeRect(startX,startY,p.x-startX,p.y-startY); }
        else if (tool==='circ') {
          var cx=(startX+p.x)/2, cy=(startY+p.y)/2, rx=Math.abs(p.x-startX)/2, ry=Math.abs(p.y-startY)/2;
          ctx.ellipse(cx,cy,rx,ry,0,0,2*Math.PI); ctx.stroke();
        } else if (tool==='arr') {
          ctx.moveTo(startX,startY); ctx.lineTo(p.x,p.y); ctx.stroke();
          // arrowhead
          var ang=Math.atan2(p.y-startY,p.x-startX), hs=12;
          ctx.beginPath();
          ctx.moveTo(p.x,p.y);
          ctx.lineTo(p.x-hs*Math.cos(ang-0.4),p.y-hs*Math.sin(ang-0.4));
          ctx.lineTo(p.x-hs*Math.cos(ang+0.4),p.y-hs*Math.sin(ang+0.4));
          ctx.closePath(); ctx.fillStyle=color; ctx.fill();
        }
      }
    }
    function end(e) { if (!isDrawing) return; isDrawing=false; pushSnap(); }
    canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move); canvas.addEventListener('mouseup',end);
    canvas.addEventListener('touchstart',start,{passive:false}); canvas.addEventListener('touchmove',move,{passive:false}); canvas.addEventListener('touchend',end);
  }

  window.cvUndo = function() {
    if (snapshots.length > 1) { snapshots.pop(); ctx.putImageData(snapshots[snapshots.length-1],0,0); }
  };
  window.cvClear = function() {
    ctx.fillStyle='#111128'; ctx.fillRect(0,0,canvas.width,canvas.height); pushSnap();
  };
  window.cvDone = function() {
    var dataUrl = canvas.toDataURL('image/png');
    editor.focus();
    document.execCommand('insertHTML', false, '<img src="'+dataUrl+'" style="max-width:100%;border-radius:10px;border:1px solid var(--color-stroke);" alt="drawing"><p></p>');
    closeCanvas();
    updateWc();
  };

  /* ===== Timer (reads from sessionStorage if exam is running) ===== */
  var timerEl = document.getElementById('tTimer');
  var dur = parseInt(sessionStorage.getItem('ronyx_minutes') || '30') * 60;
  (function tick(){
    if (dur <= 0) { timerEl.textContent='Time up'; return; }
    dur--;
    var m=Math.floor(dur/60), s=dur%60;
    timerEl.textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    setTimeout(tick, 1000);
  })();

})();
</script>
