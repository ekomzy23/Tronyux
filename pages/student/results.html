<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Result — Runyx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="app">

    <div class="appbar">
      <a href="/pages/student/dashboard.html" class="iconbtn">←</a>
      <span class="appbar__title">Result</span>
    </div>

    <div class="app__body text-center">
      <h1 class="title-lg" style="margin-bottom: 2px;">Data Structures Final</h1>
      <p class="text-muted mb-4">Completed 20 May 2024</p>

      <div class="ring mb-4">
        <svg width="170" height="170">
          <circle class="ring__bg" cx="85" cy="85" r="74"></circle>
          <circle class="ring__fg" cx="85" cy="85" r="74" stroke="url(#grad)" data-ring="86"></circle>
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#6d5efc"></stop>
              <stop offset="1" stop-color="#8b5cf6"></stop>
            </linearGradient>
          </defs>
        </svg>
        <div class="ring__center">
          <div class="ring__value">86%</div>
          <div class="ring__sub">52 / 60 marks</div>
        </div>
      </div>

      <div class="card between mb-4">
        <span class="text-muted">Class rank</span>
        <b class="title-md">12 / 120</b>
      </div>

      <a href="/pages/student/performance.html" class="btn btn--primary">View detailed report</a>
      <a href="/pages/student/study.html" class="btn btn--ghost" style="margin-top: var(--space-2);">Open AI study mode</a>
    </div>

    <nav class="tabbar" data-nav="results"></nav>
  </div>

  <script src="/js/ui.js"></script>
  <script>
    // animate every progress ring on the page
    document.querySelectorAll('[data-ring]').forEach(ring => {
      const pct = +ring.getAttribute('data-ring');
      const c = 2 * Math.PI * 74;
      ring.style.strokeDasharray = c;
      ring.style.strokeDashoffset = c;
      requestAnimationFrame(() => { ring.style.strokeDashoffset = c * (1 - pct / 100); });
    });
  </script>
  <script src="/js/theme.js"></script>
</body>
</html>
