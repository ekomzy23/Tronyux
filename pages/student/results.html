<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Result — Runyx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="app">

    <div class="appbar">
      <a href="/pages/student/dashboard.html" class="iconbtn">&larr;</a>
      <span class="appbar__title">Result</span>
    </div>

    <div class="app__body" id="resultBody">
      <div class="empty"><div class="empty__icon">&#8987;</div><p>Loading result&hellip;</p></div>
    </div>

    <nav class="tabbar" data-nav="results"></nav>
  </div>

  <script src="/js/ui.js?v=mqyp3s49"></script>
  <script>
  (function () {
    var body = document.getElementById('resultBody');

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    var result = null;
    try { result = JSON.parse(localStorage.getItem('ronyx_last_result') || 'null'); } catch(e) {}

    if (!result) {
      body.innerHTML =
        '<div class="empty text-center"><div class="empty__icon">&#128236;</div>' +
        '<p>No result found.<br><small class="text-muted">Complete an exam to see your result here.</small></p>' +
        '<a href="/pages/student/exams.html" class="btn btn--primary" style="margin-top:var(--space-4);">Browse exams</a></div>';
      return;
    }

    var pct  = result.percentage || 0;
    var c    = 2 * Math.PI * 74;
    var hasSubjective = (result.questions || []).some(function(q) {
      return ['theory','fill','upload'].indexOf(q.type) !== -1;
    });
    var gradeCol = pct >= 70 ? 'var(--color-success)' :
                   pct >= 50 ? '#f59e0b' : 'var(--color-danger)';

    body.className = 'app__body text-center';
    body.innerHTML =
      '<h1 class="title-lg mb-1">' + esc(result.examTitle || 'Result') + '</h1>' +
      '<p class="text-muted mb-4">Completed ' + new Date(result.completedAt).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}) + '</p>' +

      '<div class="ring mb-4">' +
        '<svg width="170" height="170">' +
          '<circle class="ring__bg" cx="85" cy="85" r="74"></circle>' +
          '<circle class="ring__fg" cx="85" cy="85" r="74" stroke="url(#rg)" id="ringFg"></circle>' +
          '<defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">' +
            '<stop offset="0" stop-color="#6d5efc"></stop>' +
            '<stop offset="1" stop-color="#8b5cf6"></stop>' +
          '</linearGradient></defs>' +
        '</svg>' +
        '<div class="ring__center">' +
          '<div class="ring__value" style="color:' + gradeCol + '">' + pct + '%</div>' +
          '<div class="ring__sub">' + (result.score || 0) + ' / ' + (result.totalMarks || 0) + ' marks</div>' +
        '</div>' +
      '</div>' +

      '<div class="stat-grid mb-4">' +
        '<div class="stat"><div class="stat__n" style="color:var(--color-success)">' + (result.correct || 0) + '</div><div class="stat__l">Correct</div></div>' +
        '<div class="stat"><div class="stat__n" style="color:var(--color-danger)">' + (result.incorrect || 0) + '</div><div class="stat__l">Wrong</div></div>' +
        '<div class="stat"><div class="stat__n">' + (result.unattempted || 0) + '</div><div class="stat__l">Skipped</div></div>' +
      '</div>' +

      '<div class="card between mb-2"><span class="text-muted">Grade</span><b class="title-md" style="color:' + gradeCol + '">' + (result.grade || '—') + '</b></div>' +
      '<div class="card between mb-4"><span class="text-muted">Time taken</span><b>' + (result.timeTaken || 0) + ' min</b></div>' +

      (hasSubjective ? '<p class="text-muted" style="font-size:11px;margin-bottom:var(--space-4);">Score covers objective questions only. Theory / fill answers are shown in the review.</p>' : '') +

      '<a href="/pages/student/qreview.html" class="btn btn--primary">Review all questions &amp; answers</a>' +
      '<a href="/pages/student/dashboard.html" class="btn btn--ghost" style="margin-top:var(--space-2);">Back to dashboard</a>';

    var fg = document.getElementById('ringFg');
    fg.style.strokeDasharray = c;
    fg.style.strokeDashoffset = c;
    requestAnimationFrame(function () { fg.style.strokeDashoffset = c * (1 - pct / 100); });
  })();
  </script>
  <script src="/js/theme.js?v=mqyp3s49"></script>
</body>
</html>
