<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Search — Ronyx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="app">

    <div class="appbar">
      <a href="/pages/student/dashboard.html" class="iconbtn">←</a>
      <input class="input" placeholder="Search exams, topics…" autofocus>
    </div>

    <div class="app__body">
      <div id="searchResults">
        <div class="empty" style="margin-top:32px;"><div class="empty__icon">🔍</div><p>Search exams, topics or notes.</p></div>
      </div>
    </div>
  <script src="/js/appwrite.min.js?v=mqypih1j"></script>
  <script src="/js/config.js?v=mqypih1j"></script>
  <script src="/js/appwrite.js?v=mqypih1j"></script>
  <script src="/js/data.js?v=mqypih1j"></script>
  <script src="/js/render.js?v=mqypih1j"></script>
  <script>
    var input = document.querySelector('.appbar .input');
    var el = document.getElementById('searchResults');
    var allExams = [];
    (async function() {
      if (!window.RONYX_CONFIG || !RONYX_CONFIG.CONFIGURED) return;
      allExams = await RonyxData.listExams().catch(function(){ return []; });
    })();
    if (input) input.addEventListener('input', function() {
      var q = input.value.trim().toLowerCase();
      if (!q) { el.innerHTML = '<div class="empty" style="margin-top:32px;"><div class="empty__icon">🔍</div><p>Search exams, topics or notes.</p></div>'; return; }
      var hits = allExams.filter(function(e){ return (e.title+' '+(e.courseCode||'')+' '+(e.topic||'')).toLowerCase().includes(q); });
      el.innerHTML = hits.length ? hits.map(renderExamCard).join('') : '<div class="empty"><div class="empty__icon">🕳️</div><p>No results for "'+q+'"</p></div>';
    });
  </script>
  </div>
  <script src="/js/theme.js?v=mqypih1j"></script>
</body>
</html>
