<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Performance — Runyx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="app">

    <div class="appbar">
      <a href="/pages/student/results.html" class="iconbtn">←</a>
      <span class="appbar__title">Performance analysis</span>
    </div>

    <div class="app__body">
      <div class="chips mb-4">
        <div class="chip is-active">Overview</div>
        <div class="chip">Strengths</div>
        <div class="chip">Weaknesses</div>
      </div>

      <div class="ring mb-4">
        <svg width="170" height="170">
          <circle class="ring__bg" cx="85" cy="85" r="74"></circle>
          <circle class="ring__fg" cx="85" cy="85" r="74" stroke="url(#grad2)" data-ring="86"></circle>
          <defs>
            <linearGradient id="grad2" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#34d399"></stop>
              <stop offset="1" stop-color="#6d5efc"></stop>
            </linearGradient>
          </defs>
        </svg>
        <div class="ring__center">
          <div class="ring__value">86%</div>
          <div class="ring__sub">accuracy</div>
        </div>
      </div>

      <div class="list-item">
        <div class="list-item__icon" style="background: var(--color-success-soft); color: var(--color-success);">✓</div>
        <div class="list-item__text">Correct</div><b>52</b>
      </div>
      <div class="list-item">
        <div class="list-item__icon" style="background: var(--color-danger-soft); color: var(--color-danger);">✕</div>
        <div class="list-item__text">Incorrect</div><b>6</b>
      </div>
      <div class="list-item">
        <div class="list-item__icon" style="background: var(--color-surface-2);">○</div>
        <div class="list-item__text">Unattempted</div><b>2</b>
      </div>

      <div class="stat-grid">
        <div class="stat"><div class="stat__n">75</div><div class="stat__l">Time (min)</div></div>
        <div class="stat"><div class="stat__n">86%</div><div class="stat__l">Accuracy</div></div>
        <div class="stat"><div class="stat__n">A</div><div class="stat__l">Grade</div></div>
      </div>

      <a href="/pages/student/qreview.html" class="btn btn--primary">Review questions</a>
    </div>

    <nav class="tabbar" data-nav="results"></nav>
  </div>

  <script src="/js/ui.js"></script>
  <script>
    document.querySelectorAll('[data-ring]').forEach(ring => {
      const pct = +ring.getAttribute('data-ring');
      const c = 2 * Math.PI * 74;
      ring.style.strokeDasharray = c;
      ring.style.strokeDashoffset = c;
      requestAnimationFrame(() => { ring.style.strokeDashoffset = c * (1 - pct / 100); });
    });
  </script>
  <script src="/js/theme.js"></script>
</body>
</html>
