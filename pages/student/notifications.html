<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Notifications &mdash; Ronyx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>
    /* ── filter tabs ── */
    .filter-row {
      display:flex; gap:8px; margin-bottom:16px;
    }
    .filter-chip {
      flex:1; padding:10px 0; border-radius:12px; font-size:12px; font-weight:700;
      text-align:center; cursor:pointer; border:1px solid var(--color-stroke);
      background:var(--color-surface); color:var(--color-muted);
      transition:background .15s, color .15s, border-color .15s;
      -webkit-tap-highlight-color:transparent;
    }
    .filter-chip.active {
      background:rgba(109,94,252,.16); border-color:rgba(109,94,252,.5);
      color:var(--color-primary-2);
    }
    .filter-chip__count {
      display:inline-block; margin-left:5px;
      background:rgba(109,94,252,.25); border-radius:10px;
      padding:1px 6px; font-size:10px;
    }
    .filter-chip.active .filter-chip__count { background:rgba(109,94,252,.35); }

    /* ── notification card ── */
    .notif-card {
      display:flex; gap:12px; padding:14px;
      border-radius:16px; margin-bottom:10px;
      border:1px solid var(--color-stroke); background:var(--color-surface);
      cursor:pointer; transition:background .15s, border-color .15s;
      -webkit-tap-highlight-color:transparent;
    }
    .notif-card.unread {
      border-color:rgba(109,94,252,.4); background:rgba(109,94,252,.05);
    }
    .notif-card:active { background:rgba(109,94,252,.08); }

    .notif-icon {
      width:44px; height:44px; border-radius:14px; flex-shrink:0;
      display:grid; place-items:center; font-size:22px;
    }
    .notif-icon--announcement { background:rgba(251,191,36,.15); }
    .notif-icon--exam_reminder{ background:rgba(109,94,252,.15); }
    .notif-icon--result       { background:rgba(52,211,153,.15); }
    .notif-icon--alert        { background:rgba(251,113,133,.15); }
    .notif-icon--default      { background:var(--color-surface-2,rgba(255,255,255,.06)); }

    .notif-body { flex:1; min-width:0; }
    .notif-title {
      font-size:14px; font-weight:700; margin-bottom:3px;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .notif-msg {
      font-size:13px; color:var(--color-muted); line-height:1.5;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .notif-time { font-size:10px; color:var(--color-muted-2); margin-top:6px; }

    .notif-right {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:6px; flex-shrink:0;
    }
    .notif-dot {
      width:9px; height:9px; border-radius:50%;
      background:var(--color-primary-2); flex-shrink:0;
    }
    .notif-arr { font-size:18px; color:var(--color-muted-2); line-height:1; }

    /* ── header stats row ── */
    .notif-stats {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:14px;
    }
    .notif-stats__label { font-size:12px; color:var(--color-muted); }
    .notif-stats__mark  {
      font-size:12px; font-weight:700; color:var(--color-primary-2);
      cursor:pointer; padding:4px 10px; border-radius:8px;
      background:rgba(109,94,252,.1); border:1px solid rgba(109,94,252,.25);
      -webkit-tap-highlight-color:transparent;
    }
    .notif-stats__mark:active { opacity:.7; }

    /* ── push banner ── */
    .push-banner {
      display:none; align-items:center; gap:12px;
      background:rgba(109,94,252,.08); border:1px solid rgba(109,94,252,.3);
      border-radius:16px; padding:14px; margin-bottom:14px;
    }
    .push-banner.visible { display:flex; }
    .push-banner__body { flex:1; min-width:0; }
    .push-banner__title { font-size:13px; font-weight:700; margin-bottom:2px; }
    .push-banner__sub   { font-size:11px; color:var(--color-muted); }
  </style>
</head>
<body>
  <div class="app">
    <div class="appbar">
      <a href="/pages/student/dashboard.html" class="iconbtn">&larr;</a>
      <span class="appbar__title">Notifications</span>
    </div>

    <div class="app__body">

      <!-- Push permission banner -->
      <div class="push-banner" id="pushBanner">
        <span style="font-size:28px;flex-shrink:0;">&#128276;</span>
        <div class="push-banner__body">
          <div class="push-banner__title">Get instant alerts</div>
          <div class="push-banner__sub">Receive exam reminders even when the app is closed.</div>
        </div>
        <button class="btn btn--primary" style="font-size:11px;padding:8px 14px;flex-shrink:0;"
          onclick="askPush()">Allow</button>
      </div>

      <!-- Stats row -->
      <div class="notif-stats">
        <span class="notif-stats__label" id="countLine">Loading&hellip;</span>
        <span class="notif-stats__mark" id="markAllBtn" style="display:none;" onclick="markAll()">
          &#10003; Mark all read
        </span>
      </div>

      <!-- Filter tabs -->
      <div class="filter-row" id="filterRow" style="display:none;">
        <div class="filter-chip active" id="chipAll" onclick="setFilter('all')">
          All <span class="filter-chip__count" id="chipAllCount">0</span>
        </div>
        <div class="filter-chip" id="chipUnread" onclick="setFilter('unread')">
          Unread <span class="filter-chip__count" id="chipUnreadCount">0</span>
        </div>
      </div>

      <!-- Notification list -->
      <div id="notifList">
        <div class="empty"><div class="empty__icon">&#128276;</div><p>Loading&hellip;</p></div>
      </div>

    </div>
    <nav class="tabbar" data-nav="notifications"></nav>
  </div>

  <script src="/js/appwrite.min.js?v=mrr39s6t"></script>
  <script src="/js/config.js?v=mrr39s6t"></script>
  <script src="/js/appwrite.js?v=mrr39s6t"></script>
  <script src="/js/data.js?v=mrr39s6t"></script>
  <script src="/js/ui.js?v=mrr39s6t"></script>
  <script src="/js/theme.js?v=mrr39s6t"></script>
  <script>
    var _notifs = [];
    var _filter = 'all';

    var ICONS = {
      announcement:  '&#128226;',
      exam_reminder: '&#9200;',
      result:        '&#128202;',
      alert:         '&#9888;',
      info:          '&#8505;',
      success:       '&#9989;',
      reminder:      '&#9200;',
      update:        '&#11014;',
      exam:          '&#128221;',
    };

    function iconClass(type) {
      var map = {
        announcement:'notif-icon--announcement', exam_reminder:'notif-icon--exam_reminder',
        result:'notif-icon--result', alert:'notif-icon--alert', reminder:'notif-icon--exam_reminder',
      };
      return map[type] || 'notif-icon--default';
    }

    function timeAgo(dateStr) {
      var d    = new Date(dateStr || Date.now());
      var diff = Math.floor((Date.now() - d) / 1000);
      if (diff < 60)     return 'Just now';
      if (diff < 3600)   return Math.floor(diff / 60)  + 'm ago';
      if (diff < 86400)  return Math.floor(diff / 3600) + 'h ago';
      if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
      return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
    }

    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function setFilter(f) {
      _filter = f;
      document.getElementById('chipAll').classList.toggle('active', f==='all');
      document.getElementById('chipUnread').classList.toggle('active', f==='unread');
      renderList();
    }

    function renderList() {
      var list = _filter === 'unread'
        ? _notifs.filter(function(n){ return !n.read; })
        : _notifs;

      var el = document.getElementById('notifList');

      if (!list.length) {
        el.innerHTML = _filter === 'unread'
          ? '<div class="empty"><div class="empty__icon">&#10003;</div><p>All caught up!<br><small>No unread notifications.</small></p></div>'
          : '<div class="empty"><div class="empty__icon">&#128276;</div><p>No notifications yet.<br><small>Announcements from your school appear here.</small></p></div>';
        return;
      }

      el.innerHTML = list.map(function(n, i) {
        var globalIdx = _notifs.indexOf(n);
        var icon    = ICONS[n.type] || '&#128276;';
        var ic      = iconClass(n.type);
        var hasLink = !!(n.link && !/^\/admin-bundle/.test(n.link) && n.link !== '/pages/student/notifications.html');
        return '<div class="notif-card ' + (n.read ? '' : 'unread') + '" onclick="openNotif(' + globalIdx + ')">' +
          '<div class="notif-icon ' + ic + '">' + icon + '</div>' +
          '<div class="notif-body">' +
            '<div class="notif-title">' + esc(n.title) + '</div>' +
            '<div class="notif-msg">'   + esc(n.body)  + '</div>' +
            '<div class="notif-time">'  + timeAgo(n.createdAt || n.$createdAt) + '</div>' +
          '</div>' +
          '<div class="notif-right">' +
            (n.read ? '' : '<div class="notif-dot"></div>') +
            (hasLink ? '<div class="notif-arr">&#8250;</div>' : '') +
          '</div>' +
        '</div>';
      }).join('');
    }

    function updateCounts() {
      var total  = _notifs.length;
      var unread = _notifs.filter(function(n){ return !n.read; }).length;

      document.getElementById('countLine').textContent = total
        ? total + ' notification' + (total !== 1 ? 's' : '') +
          (unread ? '  ·  ' + unread + ' unread' : '  ·  all read')
        : 'No notifications';

      document.getElementById('markAllBtn').style.display = unread ? '' : 'none';
      document.getElementById('filterRow').style.display  = total  ? '' : 'none';

      document.getElementById('chipAllCount').textContent    = total;
      document.getElementById('chipUnreadCount').textContent = unread;

      /* Sync the tab bar badge */
      _syncBadge(unread);
    }

    function _syncBadge(count) {
      document.querySelectorAll('#notifBadge').forEach(function(b) {
        if (count > 0) { b.textContent = count > 99 ? '99+' : String(count); b.style.display = 'inline-block'; }
        else b.style.display = 'none';
      });
      if (count > 0) {
        if ('setAppBadge' in navigator) navigator.setAppBadge(count).catch(function(){});
      } else {
        if ('clearAppBadge' in navigator) navigator.clearAppBadge().catch(function(){});
      }
    }

    async function openNotif(i) {
      var n = _notifs[i]; if (!n) return;
      if (!n.read) {
        n.read = true;
        updateCounts();
        renderList();
        RonyxData.markNotificationRead(n.$id).catch(function(){});
      }
      if (n.link && !/^\/admin-bundle/.test(n.link) && n.link !== '/pages/student/notifications.html') {
        window.location.href = n.link;
      }
    }

    async function markAll() {
      var unread = _notifs.filter(function(n){ return !n.read; });
      _notifs.forEach(function(n){ n.read = true; });
      updateCounts();
      renderList();
      unread.forEach(function(n){ RonyxData.markNotificationRead(n.$id).catch(function(){}); });
    }

    /* Push permission */
    function _urlB64ToUint8Array(b64) {
      var pad = '='.repeat((4 - b64.length % 4) % 4);
      var raw = atob((b64 + pad).replace(/-/g,'+').replace(/_/g,'/'));
      var arr = new Uint8Array(raw.length);
      for (var i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
      return arr;
    }

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(function(){});

    (function() {
      if (!('Notification' in window) || !('serviceWorker' in navigator) || !('PushManager' in window)) return;
      if (Notification.permission === 'default') document.getElementById('pushBanner').classList.add('visible');
    })();

    window.askPush = async function() {
      document.getElementById('pushBanner').classList.remove('visible');
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
        toast('Push notifications are not supported on this browser.', 'info'); return;
      }
      var vapidKey = (window.RONYX_CONFIG || {}).VAPID_PUBLIC_KEY;
      if (!vapidKey) { toast('Push not configured yet — contact your admin.', 'info'); return; }
      var perm = await Notification.requestPermission();
      if (perm !== 'granted') return;
      try {
        var reg = await navigator.serviceWorker.register('/sw.js');
        await navigator.serviceWorker.ready;
        var existing = await reg.pushManager.getSubscription();
        var sub = existing || await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: _urlB64ToUint8Array(vapidKey)
        });
        if (window.RonyxData) await RonyxData.savePushSubscription(JSON.stringify(sub.toJSON()));
        await reg.showNotification('Ronyx', {
          body: 'Notifications enabled! You will receive exam alerts and announcements.',
          icon: '/assets/icon-192.png', badge: '/assets/icon-72.png'
        });
      } catch(e) {
        toast('Could not enable push notifications: ' + (e.message || e), 'error');
      }
    };

    (async function() {
      if (!window.RONYX_CONFIG || !RONYX_CONFIG.CONFIGURED) {
        document.getElementById('notifList').innerHTML =
          '<div class="empty"><div class="empty__icon">&#128276;</div><p>Sign in to see notifications.</p></div>';
        document.getElementById('countLine').textContent = '';
        return;
      }
      try {
        var yr  = await RonyxData.getLevel().catch(function(){ return 0; });
        _notifs = await RonyxData.listNotifications(yr);
        updateCounts();
        renderList();
      } catch(e) {
        document.getElementById('notifList').innerHTML =
          '<div class="empty"><div class="empty__icon">&#9888;</div><p>Could not load notifications.</p></div>';
        document.getElementById('countLine').textContent = '';
      }
    })();
  </script>
</body>
</html>
