<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Notifications &mdash; Runyx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>
    .notif-card {
      display:flex; gap:13px; padding:14px 16px;
      border-radius:16px; margin-bottom:8px;
      border:1px solid var(--color-stroke); background:var(--color-surface);
      cursor:pointer; transition:border-color .15s, opacity .15s;
    }
    .notif-card.unread {
      border-color:rgba(109,94,252,.45); background:rgba(109,94,252,.06);
    }
    .notif-card:active { opacity:.8; }

    .notif-icon {
      width:42px; height:42px; border-radius:14px; flex-shrink:0;
      display:grid; place-items:center; font-size:20px;
    }
    .notif-icon--announcement { background:rgba(251,191,36,.15);  }
    .notif-icon--exam_reminder{ background:rgba(109,94,252,.15);  }
    .notif-icon--result       { background:rgba(52,211,153,.15);  }
    .notif-icon--alert        { background:rgba(251,113,133,.15); }
    .notif-icon--default      { background:var(--color-surface-2); }

    .notif-body { flex:1; min-width:0; }
    .notif-title { font-size:14px; font-weight:700; margin-bottom:3px;
                   white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .notif-msg   { font-size:13px; color:var(--color-muted); line-height:1.45;
                   display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .notif-time  { font-size:10px; color:var(--color-muted-2); margin-top:5px; }

    .notif-dot {
      width:8px; height:8px; border-radius:50%;
      background:var(--color-primary-2); flex-shrink:0; margin-top:8px;
    }

    .mark-all { font-size:12px; color:var(--color-muted-2); cursor:pointer;
                text-decoration:underline; }

    .push-banner {
      display:none; align-items:center; gap:12px;
      background:rgba(109,94,252,.08); border:1px solid rgba(109,94,252,.35);
      border-radius:16px; padding:14px 16px; margin-bottom:14px;
    }
    .push-banner.visible { display:flex; }
  </style>
</head>
<body>
  <div class="app">
    <div class="appbar">
      <a href="/pages/student/dashboard.html" class="iconbtn">&larr;</a>
      <span class="appbar__title">Notifications</span>
    </div>

    <div class="app__body">

      <!-- Push permission banner -->
      <div class="push-banner" id="pushBanner">
        <span style="font-size:28px;">&#128276;</span>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:700;margin-bottom:2px;">Get instant alerts</div>
          <div style="font-size:11px;color:var(--color-muted);">Receive exam reminders even when the app is closed.</div>
        </div>
        <button class="btn btn--primary" style="font-size:11px;padding:7px 12px;flex-shrink:0;"
          onclick="askPush()">Allow</button>
      </div>

      <div class="between mb-4">
        <span class="text-tiny" id="countLine">Loading&hellip;</span>
        <span class="mark-all" id="markAllBtn" style="display:none;" onclick="markAll()">Mark all read</span>
      </div>

      <div id="notifList">
        <div class="empty"><div class="empty__icon">&#128276;</div><p>Loading&hellip;</p></div>
      </div>

    </div>
    <nav class="tabbar" data-nav="notifications"></nav>
  </div>

  <script src="/js/appwrite.min.js?v=mqyp3s49"></script>
  <script src="/js/config.js?v=mqyp3s49"></script>
  <script src="/js/appwrite.js?v=mqyp3s49"></script>
  <script src="/js/data.js?v=mqyp3s49"></script>
  <script src="/js/ui.js?v=mqyp3s49"></script>
  <script src="/js/theme.js?v=mqyp3s49"></script>
  <script>
    var _notifs = [];

    var ICONS = {
      announcement:  '&#128226;',   /* 📢 */
      exam_reminder: '&#9200;',     /* ⏰ */
      result:        '&#128202;',   /* 📊 */
      alert:         '&#9888;',     /* ⚠ */
      info:          '&#8505;',     /* ℹ */
      success:       '&#9989;',     /* ✅ */
      reminder:      '&#9200;',
      update:        '&#11014;',
      exam:          '&#128221;',
    };

    function iconClass(type) {
      var map = {
        announcement:'notif-icon--announcement', exam_reminder:'notif-icon--exam_reminder',
        result:'notif-icon--result', alert:'notif-icon--alert', reminder:'notif-icon--exam_reminder',
      };
      return map[type] || 'notif-icon--default';
    }

    function timeAgo(dateStr) {
      var d = new Date(dateStr || Date.now());
      var diff = Math.floor((Date.now() - d) / 1000);
      if (diff < 60)     return 'Just now';
      if (diff < 3600)   return Math.floor(diff / 60)   + 'm ago';
      if (diff < 86400)  return Math.floor(diff / 3600)  + 'h ago';
      if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
      return d.toLocaleDateString('en-GB', {day:'numeric', month:'short'});
    }

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function render(list) {
      var el = document.getElementById('notifList');
      var unread = list.filter(function(n) { return !n.read; }).length;
      var countEl = document.getElementById('countLine');

      countEl.textContent = list.length
        ? list.length + ' notification' + (list.length !== 1 ? 's' : '') +
          (unread ? '  ·  ' + unread + ' unread' : '  ·  all read')
        : 'No notifications';

      document.getElementById('markAllBtn').style.display = unread ? 'inline' : 'none';

      if (!list.length) {
        el.innerHTML =
          '<div class="empty"><div class="empty__icon">&#128276;</div>' +
          '<p>No notifications yet.<br><small>Announcements from your school appear here.</small></p></div>';
        return;
      }

      el.innerHTML = list.map(function(n, i) {
        var icon = ICONS[n.type] || '&#128276;';
        var ic   = iconClass(n.type);
        return '<div class="notif-card ' + (n.read ? '' : 'unread') + '" onclick="openNotif(' + i + ')">' +
          '<div class="notif-icon ' + ic + '">' + icon + '</div>' +
          '<div class="notif-body">' +
            '<div class="notif-title">' + esc(n.title) + '</div>' +
            '<div class="notif-msg">'   + esc(n.body)  + '</div>' +
            '<div class="notif-time">'  + timeAgo(n.createdAt || n.$createdAt) + '</div>' +
          '</div>' +
          (n.read ? '' : '<div class="notif-dot"></div>') +
        '</div>';
      }).join('');
    }

    async function openNotif(i) {
      var n = _notifs[i]; if (!n) return;
      if (!n.read) {
        n.read = true;
        render(_notifs);
        RonyxData.markNotificationRead(n.$id).catch(function(){});
      }
      if (n.link) window.location.href = n.link;
    }

    async function markAll() {
      var unread = _notifs.filter(function(n) { return !n.read; });
      _notifs.forEach(function(n) { n.read = true; });
      render(_notifs);
      unread.forEach(function(n) {
        RonyxData.markNotificationRead(n.$id).catch(function(){});
      });
    }

    /* Push permission banner */
    (function() {
      if (!('Notification' in window)) return;
      if (Notification.permission === 'default') {
        document.getElementById('pushBanner').classList.add('visible');
      }
    })();

    window.askPush = function() {
      Notification.requestPermission().then(function(perm) {
        document.getElementById('pushBanner').classList.remove('visible');
        if (perm === 'granted') {
          new Notification('Runyx', {
            body: 'Notifications enabled! You will receive exam alerts and announcements.',
            icon: '/assets/icon-192.png'
          });
        }
      });
    };

    (async function() {
      if (!window.RONYX_CONFIG || !RONYX_CONFIG.CONFIGURED) {
        document.getElementById('notifList').innerHTML =
          '<div class="empty"><div class="empty__icon">&#128276;</div><p>Sign in to see notifications.</p></div>';
        document.getElementById('countLine').textContent = '';
        return;
      }
      try {
        var yr = await RonyxData.getLevel().catch(function() { return 0; });
        _notifs = await RonyxData.listNotifications(yr);
        render(_notifs);
      } catch(e) {
        document.getElementById('notifList').innerHTML =
          '<div class="empty"><div class="empty__icon">&#9888;</div><p>Could not load notifications.</p></div>';
        document.getElementById('countLine').textContent = '';
      }
    })();
  </script>
</body>
</html>
