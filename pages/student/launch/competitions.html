<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Compete — Ronyx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>
    .comp-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 12px;
      text-decoration: none;
      display: block;
      position: relative;
      overflow: hidden;
      transition: transform .15s, border-color .15s;
    }
    .comp-card:active { transform: scale(.985); }
    .comp-card__emoji { font-size: 36px; margin-bottom: 10px; display: block; }
    .comp-card__title { font-size: 17px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
    .comp-card__exam  { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
    .comp-card__footer { display: flex; align-items: center; justify-content: space-between; }
    .comp-card--active { border-color: rgba(109,94,252,.5); background: rgba(109,94,252,.06); }
    .comp-card--ended  { opacity: .55; }
    .countdown-pill {
      background: rgba(109,94,252,.18);
      color: var(--color-primary);
      font-size: 11px;
      font-weight: 700;
      border-radius: 20px;
      padding: 4px 10px;
      white-space: nowrap;
    }
    .countdown-pill--red { background: rgba(239,68,68,.15); color: #ef4444; }
    .prize-tag {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface-2, rgba(255,255,255,.06));
      border-radius: 20px;
      padding: 3px 10px;
    }
    .points-hero {
      text-align: center;
      padding: 8px 0 4px;
    }
    .points-hero__n {
      font-size: 44px;
      font-weight: 800;
      font-family: var(--font-display);
      line-height: 1;
    }
    .points-hero__l { font-size: 12px; opacity: .75; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="app">

    <div class="appbar">
      <button onclick="history.back()" class="iconbtn" style="font-size:20px;">&#8592;</button>
      <h2 style="font-family:var(--font-display);font-size:18px;font-weight:700;flex:1;text-align:center;">Compete</h2>
      <a href="/pages/student/launch/wallet.html" class="iconbtn" title="My Wallet">&#127881;</a>
    </div>

    <div class="app__body">

      <!-- Points snapshot -->
      <div class="card card--brand" style="text-align:center;padding:20px 16px;">
        <div class="points-hero">
          <div class="points-hero__n" id="balanceNum">—</div>
          <div class="points-hero__l">your points · <a href="/pages/student/launch/wallet.html" style="color:rgba(255,255,255,.8);text-decoration:underline;">view wallet</a></div>
        </div>
      </div>

      <!-- Active competitions -->
      <div class="between mb-4 mt-6">
        <h3 class="title-md">🔥 Active Now</h3>
      </div>
      <div id="activeList">
        <div class="empty"><div class="empty__icon">⏳</div><p>Loading…</p></div>
      </div>

      <!-- Upcoming -->
      <div class="between mb-4 mt-6">
        <h3 class="title-md">📅 Coming Soon</h3>
      </div>
      <div id="upcomingList">
        <div class="empty"><div class="empty__icon">🗓</div><p>Loading…</p></div>
      </div>

      <!-- Past -->
      <div class="between mb-4 mt-6">
        <h3 class="title-md">🏁 Ended</h3>
      </div>
      <div id="endedList">
        <div class="empty"><div class="empty__icon">📋</div><p>Loading…</p></div>
      </div>

      <div style="height:32px;"></div>
    </div>

  </div>

  <script src="/js/appwrite.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/appwrite.js"></script>
  <script src="/js/data.js"></script>
  <script src="/js/launch-data.js"></script>
  <script>
    (async function () {
      if (!window.RONYX_CONFIG || !RONYX_CONFIG.CONFIGURED) return;
      const user = await RonyxData.currentUser();
      if (!user) { location.href = '/pages/auth/login.html'; return; }

      /* Load points balance */
      const bal = await RonyxLaunch.getMyBalance();
      document.getElementById('balanceNum').textContent = bal.toLocaleString();

      /* Load all competitions */
      const comps = await RonyxLaunch.listCompetitions();
      const now   = Date.now();

      const active   = comps.filter(c => c.status === 'active');
      const upcoming = comps.filter(c => c.status === 'draft' && c.startDate && new Date(c.startDate) > now);
      const ended    = comps.filter(c => c.status === 'ended');

      function timeLeft(dateStr) {
        const ms  = new Date(dateStr) - Date.now();
        if (ms <= 0) return null;
        const h   = Math.floor(ms / 3600000);
        const m   = Math.floor((ms % 3600000) / 60000);
        if (h > 48) return Math.floor(h / 24) + 'd left';
        if (h > 0)  return h + 'h ' + m + 'm left';
        return m + 'm left';
      }

      function compCard(c, type) {
        const tl   = c.endDate ? timeLeft(c.endDate) : null;
        const pill = tl
          ? ('<span class="countdown-pill' + (tl.includes('m left') && !tl.includes('h') ? ' countdown-pill--red' : '') + '">' + tl + '</span>')
          : (type === 'upcoming' && c.startDate ? '<span class="countdown-pill">Starts ' + new Date(c.startDate).toLocaleDateString() + '</span>' : '<span class="countdown-pill">Ended</span>');
        const prize = c.prizeDescription ? '<span class="prize-tag">🎁 ' + c.prizeDescription.slice(0, 40) + '</span>' : '';

        return '<a class="comp-card comp-card--' + (type === 'ended' ? 'ended' : 'active') + '" href="/pages/student/launch/compete.html?id=' + c.$id + '">'
          + '<span class="comp-card__emoji">' + (c.bannerEmoji || '🏆') + '</span>'
          + '<div class="comp-card__title">' + c.title + '</div>'
          + (c.examTitle ? '<div class="comp-card__exam">📝 ' + c.examTitle + '</div>' : '')
          + '<div class="comp-card__footer">' + pill + prize + '</div>'
          + '</a>';
      }

      function render(el, arr, type, emptyMsg) {
        if (!arr.length) {
          el.innerHTML = '<div class="empty" style="padding:20px 0;"><p>' + emptyMsg + '</p></div>';
          return;
        }
        el.innerHTML = arr.map(c => compCard(c, type)).join('');
      }

      render(document.getElementById('activeList'),   active,   'active',   'No active competitions right now — check back soon!');
      render(document.getElementById('upcomingList'), upcoming, 'upcoming', 'Nothing scheduled yet.');
      render(document.getElementById('endedList'),    ended,    'ended',    'No past competitions yet.');
    })();
  </script>
</body>
</html>
