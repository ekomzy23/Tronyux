<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Exam — Ronyx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- KaTeX for equation preview in theory answers -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>
    .overlay { position:absolute; inset:0; background:rgba(4,4,15,.75); backdrop-filter:blur(6px); display:none; z-index:30; padding:22px; }
    .overlay.open { display:block; }
    .overlay__sheet { background:var(--color-bg-2); border:1px solid var(--color-stroke); border-radius:var(--radius-lg); padding:20px; margin-top:60px; }

    /* Immediate answer feedback */
    .opt.fb-correct { border-color:var(--color-success) !important; background:rgba(52,211,153,.1) !important; }
    .opt.fb-wrong   { border-color:var(--color-danger)  !important; background:rgba(251,113,133,.1) !important; }
    .opt.fb-correct .opt__key { background:var(--color-success) !important; color:#fff !important; }
    .opt.fb-wrong   .opt__key { background:var(--color-danger)  !important; color:#fff !important; }
    .feedback-card {
      margin-top:12px; padding:13px 15px; border-radius:14px;
      animation:fbIn .2s ease;
    }
    .feedback-card.correct { background:rgba(52,211,153,.1); border:1px solid rgba(52,211,153,.35); }
    .feedback-card.wrong   { background:rgba(251,113,133,.1); border:1px solid rgba(251,113,133,.3); }
    .feedback-card__hd   { font-size:13px; font-weight:700; margin-bottom:7px; }
    .feedback-card__body { font-size:12px; color:var(--color-muted); line-height:1.55; margin-top:8px;
                           border-top:1px solid rgba(255,255,255,.07); padding-top:7px; }
    /* Answer comparison rows (You chose / Correct answer) */
    .fb-compare { display:flex; flex-direction:column; gap:5px; margin-bottom:2px; }
    .fb-row     { display:flex; align-items:flex-start; gap:8px; font-size:12px; line-height:1.45; }
    .fb-row__tag {
      font-size:10px; font-weight:800; letter-spacing:.05em; text-transform:uppercase;
      flex-shrink:0; padding:2px 7px; border-radius:6px; margin-top:2px; white-space:nowrap;
    }
    .fb-row--yours   .fb-row__tag { background:rgba(251,113,133,.18); color:var(--color-danger); }
    .fb-row--correct .fb-row__tag { background:rgba(52,211,153,.18);  color:var(--color-success); }
    .fb-row__val { color:var(--color-text); font-weight:600; flex:1; }
    @keyframes fbIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    /* ── Audio exam buttons (stacked FABs) ── */
    .audio-fab-group {
      position:fixed; bottom:92px; right:14px;
      z-index:25; display:flex; flex-direction:column; align-items:center; gap:8px;
    }
    .audio-fab-item { display:flex; flex-direction:column; align-items:center; gap:3px; }
    .audio-fab {
      width:46px; height:46px; border-radius:50%;
      background:var(--color-bg-2); border:1.5px solid var(--color-stroke);
      color:var(--color-text); font-size:19px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 4px 18px rgba(0,0,0,.38); transition:background .2s,border .2s;
      line-height:1; padding:0;
    }
    .audio-fab:active { transform:scale(.9); }
    .audio-fab__lbl {
      font-size:9px; font-weight:700; color:var(--color-muted);
      text-transform:uppercase; letter-spacing:.5px;
    }
    .audio-fab--on {
      background:var(--color-primary,#6d5efc) !important;
      border-color:transparent !important; color:#fff !important;
      animation:audioPulse 2.5s ease-in-out infinite;
    }
    .audio-fab--listening {
      background:#e11d48 !important; border-color:transparent !important;
      color:#fff !important; animation:recPulse 1s ease-in-out infinite !important;
    }
    @keyframes audioPulse {
      0%,100%{ box-shadow:0 4px 20px rgba(109,94,252,.4); }
      50%    { box-shadow:0 4px 32px rgba(109,94,252,.85); }
    }
    @keyframes recPulse {
      0%,100%{ box-shadow:0 4px 18px rgba(225,29,72,.4); }
      50%    { box-shadow:0 4px 28px rgba(225,29,72,.85); }
    }
    /* Speech pop — shows raw transcript on every capture */
    #speechPop {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(.85);
      background:rgba(15,15,30,.96); color:#fff;
      border:1.5px solid rgba(109,94,252,.6);
      border-radius:18px; padding:18px 28px; z-index:60;
      text-align:center; pointer-events:none; min-width:180px;
      opacity:0; transition:opacity .18s, transform .18s;
    }
    #speechPop.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
    #speechPop .sp-label { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:rgba(255,255,255,.5); margin-bottom:6px; }
    #speechPop .sp-text  { font-size:22px; font-weight:800; color:#fff; word-break:break-word; }
    #speechPop .sp-match { font-size:13px; margin-top:6px; color:#a78bfa; font-weight:600; }

    /* STT status hint */
    #sttHint {
      position:fixed; bottom:238px; right:68px;
      max-width:210px; font-size:11px; font-weight:600; line-height:1.45;
      background:rgba(0,0,0,.85); color:#fff; border-radius:10px;
      padding:7px 11px; z-index:26; pointer-events:none;
      opacity:0; transition:opacity .25s; text-align:right;
    }
    #sttHint.visible { opacity:1; }

    /* ── Mic state + waveform panel ── */
    #micPanel {
      position:fixed; bottom:155px; right:8px; z-index:24;
      display:none; flex-direction:column; align-items:flex-end; gap:5px;
    }
    #micPanel.show { display:flex; }
    #micChip {
      font-size:9px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
      padding:3px 9px; border-radius:20px;
      background:rgba(109,94,252,.92); color:#fff;
      transition:background .22s;
    }
    #micChip.listening { background:rgba(225,29,72,.92); }
    #waveCanvas {
      width:110px; height:26px; border-radius:7px;
      background:rgba(0,0,0,.45); display:block;
    }

    /* Dictation mode — pulsing red border on textarea */
    textarea.is-dictating {
      border-color:#e11d48 !important;
      outline:none;
      animation:dictPulse 1.6s ease-in-out infinite;
    }
    @keyframes dictPulse {
      0%,100%{ box-shadow:0 0 0 2px rgba(225,29,72,.22); }
      50%    { box-shadow:0 0 0 4px rgba(225,29,72,.45); }
    }
    /* ── Voice Mode button ── */
    .audio-fab--vm { border-color:rgba(109,94,252,.45); color:var(--color-primary-2,#6d5efc); }
    .audio-fab--vm.vm-on {
      background:var(--color-primary-2,#6d5efc) !important;
      border-color:transparent !important; color:#fff !important;
      animation:vmGlow 2s ease-in-out infinite;
    }
    @keyframes vmGlow {
      0%,100%{ box-shadow:0 4px 20px rgba(109,94,252,.5); }
      50%    { box-shadow:0 4px 38px rgba(109,94,252,1);  }
    }
    /* ── Voice Mode status chip (floating pill near FABs) ── */
    #vmStatus {
      position:fixed; bottom:202px; right:70px; z-index:110;
      background:rgba(15,10,40,.92); color:#fff; backdrop-filter:blur(8px);
      border:1.5px solid rgba(109,94,252,.55);
      font-size:11px; font-weight:700; letter-spacing:.04em; text-align:center;
      padding:6px 12px; display:none; pointer-events:none;
      border-radius:20px; max-width:196px; white-space:nowrap;
      overflow:hidden; text-overflow:ellipsis;
      animation:vmBannerIn .2s ease;
    }
    #vmStatus.show { display:block; }
    @keyframes vmBannerIn { from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)} }
    /* Desktop: fixed-position elements become absolute so they stay inside the .app frame */
    @media (min-width: 768px) {
      .audio-fab-group,
      #speechPop,
      #sttHint,
      #micPanel,
      #vmStatus { position:absolute !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="appbar">
      <a href="/pages/student/dashboard.html" class="iconbtn">&larr;</a>
      <span class="text-tiny" data-status style="flex:1;"></span>
      <span class="timer">&#9201; <span id="examTimer">--:--:--</span></span>
      <button class="iconbtn" id="paletteBtn">&#9638;</button>
    </div>

    <div class="app__body" id="examBody">
      <div class="between mb-4">
        <span class="text-tiny" id="qcount">Loading…</span>
        <span class="badge badge--violet" id="qbadge">—</span>
      </div>
      <h3 class="title-md mb-4" id="qtext">Loading questions…</h3>
      <div id="qbody"></div>
      <div class="card mt-4 row" style="justify-content: space-around;" id="toolRow">
        <span class="link text-tiny" id="flagBtn">&#9872; Flag</span>
        <a class="link text-tiny" href="/pages/student/calculator.html">&#129518; Calculator</a>
        <a class="link text-tiny" href="/pages/student/notepad.html">&#128221; Notepad</a>
      </div>
    </div>

    <div style="padding: 0 22px 12px;">
      <div class="pbar"><i class="pbar__fill" id="progress" style="width: 0;"></i></div>
    </div>

    <nav class="tabbar tabbar--actions" id="navRow">
      <button class="btn btn--ghost" id="prevBtn">&larr; Previous</button>
      <button class="btn btn--primary" id="nextBtn">Next &rarr;</button>
    </nav>

    <!-- Voice mode status banner — sits just below the appbar when active -->
    <div id="vmStatus">&#129302; Voice Mode &bull; <span id="vmStatusText">Starting&hellip;</span></div>

    <!-- Audio exam FABs: Auto (voice mode) · Read · Speak -->
    <div class="audio-fab-group">
      <div class="audio-fab-item">
        <button class="audio-fab audio-fab--vm" id="vmBtn" title="Hands-free voice mode — reads question then listens for your answer">&#129302;</button>
        <span class="audio-fab__lbl" id="vmLbl">Auto</span>
      </div>
      <div class="audio-fab-item">
        <button class="audio-fab" id="ttsBtn" title="Read question &amp; options aloud">&#128266;</button>
        <span class="audio-fab__lbl">Read</span>
      </div>
      <div class="audio-fab-item">
        <button class="audio-fab" id="sttBtn" title="Speak your answer (A / B / C / D or True / False)">&#127910;</button>
        <span class="audio-fab__lbl">Speak</span>
      </div>
    </div>
    <!-- STT status hint bubble -->
    <div id="sttHint"></div>
    <!-- Speech pop — raw transcript toast -->
    <div id="speechPop">
      <div class="sp-label">I heard</div>
      <div class="sp-text" id="spText">...</div>
      <div class="sp-match" id="spMatch"></div>
    </div>
    <!-- Mic state chip + waveform -->
    <div id="micPanel">
      <div id="micChip">Setting up&hellip;</div>
      <canvas id="waveCanvas" width="220" height="52"></canvas>
    </div>

    <div class="overlay" id="overlay">
      <div class="overlay__sheet">
        <div class="between mb-4">
          <h3 class="title-md">Questions</h3>
          <button class="iconbtn" id="closePalette">&times;</button>
        </div>
        <div class="legend">
          <div><span class="legend__dot" style="background: var(--color-success);"></span>Answered</div>
          <div><span class="legend__dot" style="background: var(--color-primary-2);"></span>Marked</div>
          <div><span class="legend__dot" style="background: var(--color-surface-2); border: 1px solid var(--color-stroke);"></span>Not done</div>
        </div>
        <div class="palette" id="paletteGrid"></div>
      </div>
    </div>
  </div>

  <script src="/js/appwrite.min.js?v=mrr39s6t"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="/js/config.js?v=mrr39s6t"></script>
  <script src="/js/appwrite.js?v=mrr39s6t"></script>
  <script src="/js/data.js?v=mrr39s6t"></script>
  <script src="/js/scikeyboard.js?v=mrr39s6t"></script>
  <script src="/js/theme.js?v=mrr39s6t"></script>
  <script>
  (function () {
    const cfg = window.RONYX_CONFIG || { CONFIGURED: false };
    const params = new URLSearchParams(location.search);
    const examId = params.get('exam') || '';
    const format = sessionStorage.getItem('ronyx_format') || 'mixed';
    const minutes = parseInt(sessionStorage.getItem('ronyx_minutes')) || 30;
    const qcount  = parseInt(sessionStorage.getItem('ronyx_qcount') || '0');

    const OBJECTIVE = ['mcq','truefalse','multi'];
    const THEORY    = ['theory','fill'];
    const BADGE = { mcq:'MCQ', multi:'Multi-select', truefalse:'True / False', theory:'Theory', fill:'Fill blank', upload:'Upload' };

    /* Namespace answers + flags per exam so stale data from a previous exam never pre-selects */
    const ANSWERS_KEY = 'ronyx_ans_' + examId;
    const MARKED_KEY  = 'ronyx_mrk_' + examId;

    let questions = [], current = 0, attemptId = null, durationSec = minutes * 60;
    var timerPaused = false; /* VoiceMode pauses this during intro speech */
    const answers = JSON.parse(sessionStorage.getItem(ANSWERS_KEY) || '{}');
    const answeredQs = new Set(); /* questions locked after feedback is shown — cannot re-answer */
    const marked  = new Set(JSON.parse(sessionStorage.getItem(MARKED_KEY) || '[]'));
    const statusEl = document.querySelector('[data-status]');

    function emptyState(msg) {
      document.getElementById('examBody').innerHTML =
        `<div class="empty"><div class="empty__icon">📭</div><p>${msg}</p></div>`;
      document.getElementById('navRow').style.display = 'none';
      document.getElementById('examTimer').textContent = '--:--:--';
    }

    (async function init() {
      if (!cfg.CONFIGURED || !window.RonyxData) {
        emptyState('App not configured. Run setup first.');
        return;
      }
      if (!examId) {
        emptyState('No exam ID found. Go back and open the exam again.');
        return;
      }

      /* ── Load questions with a 12-second timeout ─────────────────────────
         Questions are the ONLY thing students need to see. Everything else
         (exam title, user session, attempt record) runs in the background
         so a slow auth check can never freeze the exam screen.
      ──────────────────────────────────────────────────────────────────── */
      let all;
      try {
        all = await Promise.race([
          RonyxData.listQuestions(examId),
          new Promise(function(_, rej) {
            setTimeout(function() { rej(new Error('timeout')); }, 12000);
          }),
        ]);
      } catch(e) {
        if (e.message === 'timeout') {
          emptyState('Questions took too long to load. Check your internet connection and tap ← to try again.');
        } else {
          emptyState('Could not load questions (' + (e.message || 'network error') + '). Tap ← to retry.');
        }
        return;
      }

      // filter by the format the student chose
      let qs = all;
      if (format === 'objective') qs = qs.filter(q => OBJECTIVE.includes(q.type));
      else if (format === 'theory') qs = qs.filter(q => THEORY.includes(q.type));

      // shuffle so each attempt feels fresh
      qs = qs.sort(() => Math.random() - 0.5);

      // apply question count limit (0 = all)
      if (qcount > 0 && qs.length > qcount) qs = qs.slice(0, qcount);

      questions = qs;

      if (!questions.length) {
        emptyState('No ' + format + ' questions found for this exam. The admin may need to add questions first.');
        return;
      }

      /* Store questions for auto-scoring (note: Appwrite uses correctAnswer / explanation) */
      try {
        sessionStorage.setItem('ronyx_examId', examId);
        if (!sessionStorage.getItem('ronyx_examStart')) {
          sessionStorage.setItem('ronyx_examStart', String(Date.now()));
        }
        sessionStorage.setItem('ronyx_q_' + examId, JSON.stringify(questions.map(function(q) {
          return {
            id:      q.$id,
            text:    q.text,
            type:    q.type,
            options: q.options || '[]',
            answer:  q.correctAnswer || q.answer || '',   /* setup.js field = correctAnswer */
            explain: q.explanation   || q.explain  || '', /* setup.js field = explanation  */
            marks:   q.marks || 1,
          };
        })));
      } catch(e) {}

      sessionStorage.setItem('ronyx_total', questions.length);

      /* Render NOW — student sees questions immediately */
      render(); buildPalette(); startTimer();

      /* Everything else is background — slow auth/network can't block the exam */
      Promise.all([
        RonyxData.getExam(examId).catch(function() { return null; }),
        RonyxData.currentUser().catch(function() { return null; }),
      ]).then(function(res) {
        const exam = res[0], user = res[1];
        if (exam) sessionStorage.setItem('ronyx_examTitle', exam.title || '');
        if (user) {
          RonyxData.startAttempt(examId).then(function(attempt) {
            if (attempt) attemptId = attempt.$id;
          }).catch(function() {});
        }
      }).catch(function() {});
    })();

    function render() {
      const q = questions[current];
      document.getElementById('qcount').textContent = `Question ${current + 1} of ${questions.length}`;
      document.getElementById('qbadge').textContent = `${BADGE[q.type] || 'Question'} · ${q.marks || 1} marks`;
      document.getElementById('qtext').textContent = q.text;

      const body = document.getElementById('qbody');
      const val = answers[q.$id];

      if (q.type === 'theory' || q.type === 'fill') {
        body.innerHTML = `<textarea class="input" id="ans" rows="6" placeholder="Write your answer…">${val || ''}</textarea>`;
        const ta = document.getElementById('ans');
        ta.addEventListener('input', e => setAnswer(q.$id, e.target.value));
        RonyxSciKeyboard.attach(ta);
      } else if (q.type === 'upload') {
        body.innerHTML = `
          <p class="text-muted mb-4">Accepted: PDF, DOC, JPG, PNG · max 10 MB</p>
          <label class="btn btn--ghost">⤓ ${val ? 'Replace file' : 'Choose file'}
            <input type="file" hidden accept=".pdf,.doc,.docx,.jpg,.png"></label>
          <p class="text-tiny mt-2" id="fileName">${val || ''}</p>`;
        body.querySelector('input').addEventListener('change', e => {
          const f = e.target.files[0]; if (!f) return;
          setAnswer(q.$id, f.name);
          document.getElementById('fileName').textContent = f.name;
          if (window.RonyxData) RonyxData.uploadFile(f).catch(() => {});
        });
      } else if (q.type === 'truefalse') {
        /* True / False — two big buttons */
        body.innerHTML = ['True','False'].map(o =>
          `<div class="opt ${val === o ? 'is-selected' : ''}" data-k="${o}" style="margin-bottom:10px;">
             <span class="opt__key">${o === 'True' ? '✓' : '✗'}</span><span>${o}</span></div>`
        ).join('');
        body.querySelectorAll('.opt').forEach(el => el.addEventListener('click', () => {
          if (answeredQs.has(q.$id)) return;
          body.querySelectorAll('.opt').forEach(o => {
            o.classList.remove('is-selected','fb-correct','fb-wrong');
            o.querySelector('.opt__key').textContent = o.dataset.k === 'True' ? '✓' : '✗';
          });
          el.classList.add('is-selected');
          setAnswer(q.$id, el.dataset.k);
          showFeedback(q, el.dataset.k);
          scrollFbIntoView();
        }));
        if (val) { showFeedback(q, val); scrollFbIntoView(); }
      } else {
        /* MCQ + Multi-select — parse options (supports string[] and {text,explain}[]) */
        const rawOpts = JSON.parse(q.options || '[]');
        const opts = rawOpts.map(o => typeof o === 'string' ? o : (o.text || ''));
        const keys = ['A','B','C','D','E','F','G','H'];
        const isMulti = q.type === 'multi';
        const selected = isMulti && val ? val.split(',') : [];

        body.innerHTML = opts.map((o, i) => {
          const k = keys[i] || String(i + 1);
          const active = isMulti ? selected.includes(k) : val === k;
          return `<div class="opt ${active ? 'is-selected' : ''}" data-k="${k}" style="margin-bottom:8px;">
                    <span class="opt__key">${k}</span><span>${o}</span></div>`;
        }).join('');

        if (isMulti) {
          /* Multi-select: freely toggle; options lock once feedback is revealed */
          body.querySelectorAll('.opt').forEach(el => el.addEventListener('click', () => {
            if (answeredQs.has(q.$id)) return;
            el.classList.toggle('is-selected');
            const sel = [...body.querySelectorAll('.opt.is-selected')].map(e => e.dataset.k);
            setAnswer(q.$id, sel.join(','));
          }));
        } else {
          /* Single MCQ: immediate feedback on first click, then locked */
          body.querySelectorAll('.opt').forEach(el => el.addEventListener('click', () => {
            if (answeredQs.has(q.$id)) return;
            body.querySelectorAll('.opt').forEach(o => {
              o.classList.remove('is-selected','fb-correct','fb-wrong');
              o.querySelector('.opt__key').textContent = o.dataset.k;
            });
            el.classList.add('is-selected');
            setAnswer(q.$id, el.dataset.k);
            showFeedback(q, el.dataset.k);
            scrollFbIntoView();
          }));
        }
        /* Re-show feedback when navigating back to an answered question */
        if (val) { showFeedback(q, val); scrollFbIntoView(); }
      }

      document.getElementById('progress').style.width = ((current + 1) / questions.length * 100) + '%';
      document.getElementById('prevBtn').style.visibility = current === 0 ? 'hidden' : 'visible';
      document.getElementById('nextBtn').textContent = current === questions.length - 1 ? 'Review →' : 'Next →';

      /* Stop dictation when question changes */
      if (typeof STTMode !== 'undefined' && STTMode.stop) STTMode.stop();
      /* TTS: auto-read new question — skip if Voice Mode is driving (it handles reading itself) */
      var _vmDriving = typeof VoiceMode !== 'undefined' && VoiceMode.isActive();
      if (typeof TTSMode !== 'undefined' && !_vmDriving) TTSMode.onRender(q);
      /* Voice Mode: triggered by manual nav (user tapped Next while mode was on) */
      if (typeof VoiceMode !== 'undefined') VoiceMode.onRender(q);
    }

    /* ── Immediate answer feedback ───────────────────────────
       Shows correct/wrong highlight + explanation right after
       the student selects an answer (before they tap Next).
    ──────────────────────────────────────────────────────── */
    function resolveCorrectKeys(q, rawOpts) {
      var OPT_KEYS = ['A','B','C','D','E','F','G','H'];
      var correctAns = String(q.correctAnswer || q.answer || '').trim();
      if (!correctAns) return [];
      if (q.type === 'truefalse') return [correctAns];
      /* Already letter-format: "A", "B|C", "A,B" */
      if (/^[A-Ha-h]([,|][A-Ha-h])*$/.test(correctAns)) {
        return correctAns.replace(/\|/g, ',').split(',').map(function(s){ return s.trim().toUpperCase(); });
      }
      /* Text-format: match against option texts */
      var corrTexts = correctAns.split('|').map(function(s){ return s.trim().toLowerCase(); });
      var keys = [];
      rawOpts.forEach(function(o, i) {
        if (i >= OPT_KEYS.length) return;
        var txt = (typeof o === 'string' ? o : (o.text || o.exp || '')).trim().toLowerCase();
        if (corrTexts.indexOf(txt) !== -1) keys.push(OPT_KEYS[i]);
      });
      return keys;
    }

    function showFeedback(q, selectedValue) {
      try {
        if (q.type === 'theory' || q.type === 'fill' || q.type === 'upload') return null;

        var OPT_KEYS = ['A','B','C','D','E','F','G','H'];
        var explain = String(q.explanation || q.explain || '').trim();
        var rawOpts = [];
        try { rawOpts = JSON.parse(q.options || '[]'); } catch(e) {}

        var correctKeys  = resolveCorrectKeys(q, rawOpts);
        var selectedKeys = String(selectedValue || '').split(',').map(function(s){ return s.trim().toUpperCase(); }).filter(Boolean);

        /* Always lock the question first */
        answeredQs.add(q.$id || q.id);
        document.querySelectorAll('#qbody .opt').forEach(function(el) {
          el.style.pointerEvents = 'none';
          el.style.cursor = 'default';
        });

        function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
        function optLabel(key) {
          if (q.type === 'truefalse') return key;
          var idx = OPT_KEYS.indexOf(String(key).toUpperCase());
          if (idx === -1 || idx >= rawOpts.length) return key;
          var o = rawOpts[idx];
          return key + ' — ' + (typeof o === 'string' ? o : (o.text || ''));
        }
        function optSpeech(key) {
          if (q.type === 'truefalse') return key;
          var idx = OPT_KEYS.indexOf(String(key).toUpperCase());
          if (idx === -1 || idx >= rawOpts.length) return key;
          var o = rawOpts[idx];
          return key + ': ' + (typeof o === 'string' ? o : (o.text || ''));
        }

        /* Remove any existing feedback card */
        var _old = document.getElementById('fbCard');
        if (_old) _old.remove();

        /* ── Case A: No correct answer in DB — neutral confirmation ── */
        if (!correctKeys.length) {
          /* Highlight the selected option(s) in neutral primary tint */
          document.querySelectorAll('#qbody .opt').forEach(function(el) {
            if (selectedKeys.indexOf(el.dataset.k) !== -1) {
              el.style.borderColor = 'rgba(109,94,252,.7)';
              el.style.background  = 'rgba(109,94,252,.12)';
              var keyEl = el.querySelector('.opt__key');
              if (keyEl) { keyEl.style.background = '#6d5efc'; keyEl.style.color = '#fff'; keyEl.textContent = '✓'; }
            }
          });
          /* Always show a card — confirmation + explanation if available */
          var nc = document.createElement('div');
          nc.id = 'fbCard'; nc.className = 'feedback-card';
          nc.style.cssText = 'background:rgba(109,94,252,.07);border:1px solid rgba(109,94,252,.22);';
          var ncHtml = '<div class="feedback-card__hd" style="color:#a89bff;">&#10003; Answer recorded</div>';
          if (explain) ncHtml += '<div class="feedback-card__body">' + esc(explain) + '</div>';
          nc.innerHTML = ncHtml;
          document.getElementById('qbody').appendChild(nc);
          return null;
        }

        /* ── Case B: Correct answer known — full quiz feedback ── */
        var isCorrect = [...correctKeys].sort().join(',') === [...selectedKeys].sort().join(',');

        /* Colour option chips */
        document.querySelectorAll('#qbody .opt').forEach(function(el) {
          var k = el.dataset.k;
          var keyEl = el.querySelector('.opt__key');
          if (correctKeys.indexOf(k) !== -1) {
            el.classList.add('fb-correct');
            if (keyEl) keyEl.textContent = '✓';
          } else if (selectedKeys.indexOf(k) !== -1 && correctKeys.indexOf(k) === -1) {
            el.classList.add('fb-wrong');
            if (keyEl) keyEl.textContent = '✗';
          }
        });

        /* Build feedback card */
        var card = document.createElement('div');
        card.id = 'fbCard';
        card.className = 'feedback-card ' + (isCorrect ? 'correct' : 'wrong');

        var html = '<div class="feedback-card__hd">' + (isCorrect ? '&#9989; Correct!' : '&#10060; Incorrect') + '</div>';

        if (!isCorrect) {
          html += '<div class="fb-compare">';
          html += '<div class="fb-row fb-row--yours"><span class="fb-row__tag">You chose</span>';
          html += '<span class="fb-row__val">' + selectedKeys.map(function(k){ return esc(optLabel(k)); }).join(', ') + '</span></div>';
          html += '<div class="fb-row fb-row--correct"><span class="fb-row__tag">Correct</span>';
          html += '<span class="fb-row__val">' + correctKeys.map(function(k){ return esc(optLabel(k)); }).join(', ') + '</span></div>';
          html += '</div>';
        }
        if (explain) {
          html += '<div class="feedback-card__body">' + esc(explain) + '</div>';
        }
        card.innerHTML = html;
        document.getElementById('qbody').appendChild(card);

        var shortExplain = explain ? (explain.length > 200 ? explain.slice(0, 197) + '...' : explain) : '';
        var speechText = isCorrect
          ? 'Correct!' + (shortExplain ? ' ' + shortExplain : '')
          : 'Incorrect. You chose ' + selectedKeys.map(optSpeech).join(' and ') +
            '. The correct answer is ' + correctKeys.map(optSpeech).join(' and ') + '.' +
            (shortExplain ? ' ' + shortExplain : '');

        return { isCorrect: isCorrect, speechText: speechText };
      } catch(err) {
        console.error('[Exam] showFeedback error:', err);
        answeredQs.add(q.$id || q.id);
        return null;
      }
    }

    /* Scroll the feedback card into view so the student always sees it */
    function scrollFbIntoView() {
      setTimeout(function() {
        const el = document.getElementById('fbCard');
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 60);
    }

    let saveTimer;
    function setAnswer(qid, value) {
      answers[qid] = value;
      sessionStorage.setItem(ANSWERS_KEY, JSON.stringify(answers));
      statusEl.textContent = 'Saving…';
      clearTimeout(saveTimer);
      saveTimer = setTimeout(async () => {
        try { if (attemptId && window.RonyxData) await RonyxData.saveAnswers(attemptId, answers); } catch (e) {}
        statusEl.textContent = '&#10003; Saved';
        buildPalette();
      }, 600);
    }

    function buildPalette() {
      const grid = document.getElementById('paletteGrid');
      grid.innerHTML = questions.map((q, i) => {
        let cls = '';
        if (i === current) cls = 'pcell--current';
        else if (marked.has(q.$id)) cls = 'pcell--marked';
        else if (answers[q.$id] != null && answers[q.$id] !== '') cls = 'pcell--answered';
        return `<div class="pcell ${cls}" data-i="${i}">${i + 1}</div>`;
      }).join('');
      grid.querySelectorAll('.pcell').forEach(c =>
        c.addEventListener('click', () => { current = +c.dataset.i; render(); closeOverlay(); }));
    }

    document.getElementById('prevBtn').onclick = () => { if (current > 0) { current--; render(); } };
    document.getElementById('nextBtn').onclick = () => {
      const cq = questions[current];
      /* Multi-select only: if the student has chosen but the feedback card hasn't
         appeared yet, reveal it and auto-advance after 2 s so they see the result. */
      if (cq && cq.type === 'multi' && !document.getElementById('fbCard')) {
        const cVal = answers[cq.$id];
        if (cVal) {
          showFeedback(cq, cVal);
          scrollFbIntoView();
          setTimeout(() => {
            if (current < questions.length - 1) { current++; render(); }
            else location.href = '/pages/student/review.html';
          }, 2200);
          return;
        }
      }
      /* All other types — advance immediately (single MCQ/TF already got feedback on click) */
      if (current < questions.length - 1) { current++; render(); }
      else location.href = '/pages/student/review.html';
    };
    const flagBtnEl = document.getElementById('flagBtn');
    if (flagBtnEl) flagBtnEl.onclick = () => {
      const id = questions[current].$id;
      marked.has(id) ? marked.delete(id) : marked.add(id);
      sessionStorage.setItem(MARKED_KEY, JSON.stringify([...marked]));
      buildPalette();
    };

    const overlay = document.getElementById('overlay');
    function closeOverlay() { overlay.classList.remove('open'); }
    document.getElementById('paletteBtn').onclick = () => overlay.classList.add('open');
    document.getElementById('closePalette').onclick = closeOverlay;
    overlay.addEventListener('click', e => { if (e.target === overlay) closeOverlay(); });

    function startTimer() {
      const display = document.getElementById('examTimer');
      const tick = () => {
        if (timerPaused) return;
        if (durationSec <= 0) { location.href = '/pages/student/review.html'; return; }
        durationSec--;
        const h = Math.floor(durationSec / 3600), m = Math.floor(durationSec % 3600 / 60), s = durationSec % 60;
        display.textContent = [h, m, s].map(n => String(n).padStart(2, '0')).join(':');
      };
      tick(); setInterval(tick, 1000);
    }

    /* ══════════════════════════════════════════════════════════════
       TTS MODULE — "Read" button (🔊)
       Reads the current question and its options aloud.
       Completely independent of the STT module below.

       Tap when OFF  → turn ON, read current question; auto-reads
                       every question as you navigate.
       Tap when ON   → if currently speaking: stop (stay ON for
                       next question); if idle: re-read now.
       Tap while ON  twice within 400ms → turn OFF completely.
    ══════════════════════════════════════════════════════════════ */
    var TTSMode = (function () {
      var SYNTH  = window.speechSynthesis || null;
      var btn    = document.getElementById('ttsBtn');
      var KEYS   = ['A','B','C','D','E','F','G','H'];
      var active = false;
      var slowMode = false;

      if (!btn) return { onRender: function(){} };
      if (!SYNTH) {
        btn.parentElement.style.display = 'none';
        return { onRender: function(){} };
      }

      function bestVoice() {
        var vs = SYNTH.getVoices();
        if (!vs.length) return null;
        var en = vs.filter(function(v) { return /^en/i.test(v.lang); });
        /* Prefer online neural voices (Google/Microsoft/Premium) for en-US */
        var neural = en.filter(function(v) {
          return /Google|Microsoft|Premium|Enhanced|Natural/i.test(v.name)
              && /en[-_]?US/i.test(v.lang) && !v.localService;
        });
        if (neural.length) return neural[0];
        /* Any online en-US/en-GB */
        var online = en.filter(function(v) { return /en[-_]?(US|GB)/i.test(v.lang) && !v.localService; });
        if (online.length) return online[0];
        /* Best local en-US/en-GB */
        var usGb = en.filter(function(v) { return /en[-_]?(US|GB)/i.test(v.lang); });
        if (usGb.length) return usGb[0];
        return en[0] || vs[0] || null;
      }

      function buildText(q) {
        if (!q) return '';
        var t = 'Question ' + (current + 1) + ' of ' + questions.length + '.  ' + q.text + '.  ';
        if (q.type === 'truefalse') {
          t += 'True or False?';
        } else if (q.type === 'theory' || q.type === 'fill') {
          t += 'Type your answer in the box below.';
        } else if (q.type === 'upload') {
          t += 'Upload your answer as a file.';
        } else {
          try {
            var opts = JSON.parse(q.options || '[]');
            opts.forEach(function(o, i) {
              if (!KEYS[i]) return;
              var txt = typeof o === 'string' ? o : (o.text || '');
              t += 'Option ' + KEYS[i] + ': ' + txt + '.  ';
            });
          } catch(e) {}
        }
        return t;
      }

      function read(q) {
        if (!active || !q) return;
        SYNTH.cancel();
        var u = new SpeechSynthesisUtterance(buildText(q));
        u.rate = slowMode ? 0.65 : 0.88; u.pitch = 1;
        var v = bestVoice(); if (v) u.voice = v;
        u.onend = u.onerror = function() {
          btn.title = 'Reading ON — tap to re-read or double-tap to turn off';
        };
        SYNTH.speak(u);
        btn.classList.add('audio-fab--on');
        btn.title = (slowMode ? '🐢 Slow · ' : '') + 'Speaking…';
      }

      function turnOff() {
        active = false; slowMode = false;
        SYNTH.cancel();
        btn.classList.remove('audio-fab--on');
        btn.innerHTML = '&#128266;';
        var lbl = btn.parentElement && btn.parentElement.querySelector('.audio-fab__lbl');
        if (lbl) lbl.textContent = 'Read';
        btn.title = 'Read question &amp; options aloud';
      }

      /* Long press (600 ms) on TTS button → toggle slow (🐢) mode */
      var _ttsHoldTimer = null, _ttsHoldFired = false;
      btn.addEventListener('touchstart', function() {
        _ttsHoldFired = false;
        _ttsHoldTimer = setTimeout(function() {
          _ttsHoldFired = true;
          slowMode = !slowMode;
          var lbl = btn.parentElement && btn.parentElement.querySelector('.audio-fab__lbl');
          if (lbl) lbl.textContent = slowMode ? '🐢 Slow' : 'Read';
          btn.title = slowMode ? '🐢 Slow mode ON — long press again to turn off' : 'Read question aloud';
          if (active && questions && questions[current]) read(questions[current]);
        }, 600);
      }, { passive: true });
      ['touchend', 'touchcancel'].forEach(function(ev) {
        btn.addEventListener(ev, function() { clearTimeout(_ttsHoldTimer); });
      });

      var lastTap = 0;
      btn.addEventListener('click', function() {
        if (_ttsHoldFired) { _ttsHoldFired = false; return; }
        var now = Date.now();
        if (active && now - lastTap < 400) { turnOff(); lastTap = 0; return; }
        lastTap = now;

        if (!active) {
          active = true;
          btn.classList.add('audio-fab--on');
          btn.title = 'Read ON — double-tap to turn off';
          if (questions && questions[current]) read(questions[current]);
        } else {
          if (SYNTH.speaking) { SYNTH.cancel(); }
          else { if (questions && questions[current]) read(questions[current]); }
        }
      });

      if (typeof SYNTH.onvoiceschanged !== 'undefined') SYNTH.onvoiceschanged = function(){};

      return {
        onRender: function(q) { if (active) read(q); }
      };
    })();

    /* STT MODULE - "Speak" button
       Desktop : continuous dictation with live interim preview.
       Mobile  : short non-continuous sessions (restart per phrase)
                 because Android Chrome kills continuous after ~5 s.
       New     : live waveform via Web Audio API, mic state chip.        */
    var STTMode = (function () {
      var SRec      = window.SpeechRecognition || window.webkitSpeechRecognition || null;
      var btn       = document.getElementById('sttBtn');
      var hintEl    = document.getElementById('sttHint');
      var rec       = null;
      var sttActive = false;
      var hintTimer = null;
      var recBusy   = false;
      var recStarted = false; /* true once rec.onstart has fired */

      var isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);

      var T_NOSPEECH = isMobile ? 800 : 600;
      var T_END      = isMobile ? 700 : 500;
      var T_MCQ      = isMobile ? 800 : 600;

      /* Restart guard — prevents double-fires when both onerror:no-speech
         and onend try to schedule the same restart.                       */
      var _restartTimer = null;
      function scheduleRestart(fn, delay) {
        if (_restartTimer) return; /* already scheduled — first one wins */
        _restartTimer = setTimeout(function() { _restartTimer = null; fn(); }, delay);
      }
      function cancelRestart() {
        if (_restartTimer) { clearTimeout(_restartTimer); _restartTimer = null; }
      }

      /* On the very first tap we show "Speak Now…" and open getUserMedia.
         On every subsequent restart within the same session we stay silent
         so the user never sees the mic "shut down" between phrases.       */
      var _isFirstRec = true;

      /* ── Animated waveform (canvas only — no getUserMedia so Chrome STT
         never conflicts with a second mic grab)                          ── */
      var waveRaf   = null;
      var wavePhase = 0;

      var waveCanvas = document.getElementById('waveCanvas');
      var micPanel   = document.getElementById('micPanel');
      var micChip    = document.getElementById('micChip');

      function setMicState(state) {
        if (state === 'idle') {
          if (micPanel) micPanel.classList.remove('show');
          stopViz();
        } else if (state === 'setup') {
          if (micPanel) micPanel.classList.add('show');
          if (micChip)  { micChip.textContent = 'Speak Now…'; micChip.className = ''; }
          startAnimWave(false); /* slow purple wave while mic initialises */
        } else if (state === 'listening') {
          if (micPanel) micPanel.classList.add('show');
          if (micChip)  { micChip.textContent = 'Listening'; micChip.className = 'listening'; }
          startAnimWave(true);  /* energetic red wave when actively recording */
        }
      }

      function stopViz() {
        if (waveRaf) { cancelAnimationFrame(waveRaf); waveRaf = null; }
        if (waveCanvas) {
          var c = waveCanvas.getContext('2d');
          c.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
        }
      }

      /* Two overlapping sines — looks like compressions/rarefactions.
         energetic=false: slow, dim (setup); true: faster, bright (listening). */
      function startAnimWave(energetic) {
        if (!waveCanvas) return;
        if (waveRaf) { cancelAnimationFrame(waveRaf); waveRaf = null; }
        var ctx   = waveCanvas.getContext('2d');
        var W     = waveCanvas.width, H = waveCanvas.height;
        var amp   = energetic ? H * 0.38 : H * 0.16;
        var spd   = energetic ? 0.18     : 0.07;
        var col1  = energetic ? 'rgba(225,29,72,.9)'    : 'rgba(109,94,252,.65)';
        var col2  = energetic ? 'rgba(109,94,252,.55)'  : 'rgba(109,94,252,.28)';
        wavePhase = 0;
        (function draw() {
          waveRaf = requestAnimationFrame(draw);
          ctx.clearRect(0, 0, W, H);
          for (var w = 0; w < 2; w++) {
            var off   = w * Math.PI * 0.75;
            var scale = w === 0 ? 1.0 : 0.5;
            ctx.strokeStyle = w === 0 ? col1 : col2;
            ctx.lineWidth   = w === 0 ? 2.0 : 1.4;
            ctx.beginPath();
            for (var x = 0; x < W; x++) {
              var y = H / 2
                    + Math.sin(x * 0.055 + wavePhase + off) * amp * scale
                    + Math.sin(x * 0.110 + wavePhase * 1.8 + off) * amp * 0.22 * scale;
              if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
          }
          wavePhase += spd;
        })();
      }

      if (!btn) return { stop: function(){} };

      function showHint(msg, ms) {
        if (!hintEl) return;
        hintEl.textContent = msg;
        hintEl.classList.add('visible');
        clearTimeout(hintTimer);
        if (ms !== 0) hintTimer = setTimeout(function() { hintEl.classList.remove('visible'); }, ms || 3000);
      }
      function hideHint() {
        if (!hintEl) return;
        clearTimeout(hintTimer);
        hintEl.classList.remove('visible');
      }

      var _popTimer = null;
      function showSpeechPop(heard, matched, rawOpts) {
        var pop  = document.getElementById('speechPop');
        var txt  = document.getElementById('spText');
        var mtch = document.getElementById('spMatch');
        if (!pop || !txt) return;
        txt.textContent = heard || '(nothing)';
        if (matched) {
          var label = matched;
          /* Show the option text alongside the letter for richer feedback */
          if (rawOpts && /^[A-H]$/.test(matched)) {
            var idx2 = matched.charCodeAt(0) - 65;
            if (idx2 >= 0 && idx2 < rawOpts.length) {
              var o2 = rawOpts[idx2];
              var ot = (typeof o2 === 'string' ? o2 : (o2.text || '')).slice(0, 36);
              if (ot) label = matched + ' — ' + ot;
            }
          }
          mtch.textContent = '✓ ' + label;
          mtch.style.color = '#34d399';
          pop.style.borderColor = 'rgba(52,211,153,.5)';
        } else {
          mtch.textContent = heard ? 'No match — try again' : 'Nothing heard — try again';
          mtch.style.color = '#f87171';
          pop.style.borderColor = 'rgba(248,113,113,.4)';
        }
        clearTimeout(_popTimer);
        pop.classList.add('show');
        _popTimer = setTimeout(function() {
          pop.classList.remove('show');
          pop.style.borderColor = '';
        }, matched ? 1500 : 2600);
      }

      if (!SRec) {
        btn.addEventListener('click', function() {
          showHint(isMobile
            ? 'Voice needs Chrome on Android — Safari is not supported.'
            : 'Voice input needs Chrome or Edge.', 5000);
        });
        return { stop: function(){} };
      }

      function setIdle() {
        btn.classList.remove('audio-fab--listening');
        btn.innerHTML = '&#127910;';
        recBusy = false;
        recStarted = false;
        _isFirstRec = true;
        cancelRestart();
        setMicState('idle');
      }
      function setBusy() {
        btn.classList.add('audio-fab--listening');
        btn.innerHTML = '&#127908;';
      }
      function clearDictUI() { var ta = document.getElementById('ans'); if (ta) ta.classList.remove('is-dictating'); }

      function killRec() {
        if (rec) { try { rec.abort(); } catch(e) {} rec = null; }
        recBusy = false;
        recStarted = false;
        cancelRestart();
      }

      function parseVoice(text, qtype, rawOpts) {
        var t = text.trim().toUpperCase().replace(/[^A-Z0-9\s]/g,'').replace(/\s+/g,' ');
        if (qtype === 'truefalse') {
          if (/\b(TRUE|YES|CORRECT|RIGHT|YEP|YEA|YEAH)\b/.test(t)) return 'True';
          if (/\b(FALSE|NO|WRONG|INCORRECT|NAH|NOPE)\b/.test(t))   return 'False';
          return null;
        }
        if (/^[A-H]$/.test(t)) return t;
        var MAP = { AY:'A',EI:'A',EY:'A',AH:'A',EH:'A',AYE:'A',
                    BEE:'B',BE:'B',BI:'B',
                    SEE:'C',SEA:'C',SI:'C',DEE:'D',DE:'D',DI:'D',
                    EE:'E',HEE:'E',EF:'F',GEE:'G',AGE:'G',AITCH:'H',ACE:'A' };
        if (MAP[t]) return MAP[t];
        var m = t.match(/\b(?:OPTION|ANSWER|LETTER|CHOOSE|SELECT|PICK)\s+([A-H])\b/);
        if (m) return m[1];
        m = t.match(/\b([A-H])\b/);
        if (m) return m[1];
        var NUM = { ONE:'A',TWO:'B',THREE:'C',FOUR:'D',FIVE:'E',SIX:'F',SEVEN:'G',EIGHT:'H',
                    FIRST:'A',SECOND:'B',THIRD:'C',FOURTH:'D' };
        var ws = t.split(' ');
        for (var i = 0; i < ws.length; i++) { if (NUM[ws[i]]) return NUM[ws[i]]; }
        /* Content matching — student can say the option text instead of just a letter */
        if (rawOpts && rawOpts.length) {
          var OKS = ['A','B','C','D','E','F','G','H'];
          var heard = text.trim().toLowerCase().replace(/[^\w\s]/g,' ').replace(/\s+/g,' ');
          var bestK = null, bestSc = 0;
          rawOpts.forEach(function(o, idx) {
            if (idx >= OKS.length) return;
            var optTxt = (typeof o === 'string' ? o : (o.text || '')).toLowerCase().replace(/[^\w\s]/g,' ').replace(/\s+/g,' ').trim();
            if (!optTxt || optTxt.length < 3) return;
            /* Direct substring match */
            if (optTxt.length >= 5 && heard.indexOf(optTxt) !== -1) {
              if (1.0 > bestSc) { bestSc = 1.0; bestK = OKS[idx]; }
              return;
            }
            /* Keyword overlap (words ≥ 4 chars) */
            var kws = optTxt.split(' ').filter(function(w) { return w.length >= 4; });
            if (!kws.length) return;
            var hits = kws.filter(function(w) { return heard.indexOf(w) !== -1; }).length;
            var sc = hits / kws.length;
            if (sc >= 0.55 && sc > bestSc) { bestSc = sc; bestK = OKS[idx]; }
          });
          if (bestK) return bestK;
        }
        return null;
      }

      function handleFatalError(code) {
        var MSGS = {
          'not-allowed'        : 'Mic blocked — allow microphone in browser settings.',
          'service-not-allowed': 'Mic blocked — allow microphone in browser settings.',
          'audio-capture'      : 'No microphone found on this device.',
          'network'            : 'Network error — voice input needs internet.',
          'aborted'            : '',
        };
        var msg = (code in MSGS) ? MSGS[code] : ('Mic error: ' + code);
        sttActive = false; killRec(); clearDictUI(); setIdle();
        if (msg) showHint(msg, 6000);
      }

      function startMCQ(q) {
        if (rec) { try { rec.abort(); } catch(e2) {} rec = null; }

        var rawOpts = [];
        try { rawOpts = JSON.parse(q.options || '[]'); } catch(e3) {}
        var _attempts = 0, MAX_ATT = 4;

        recBusy = true; setBusy(); setMicState('setup');

        function tryListen() {
          if (!sttActive) return;
          try {
            rec = new SRec();
            rec.lang = 'en-US';
            rec.continuous = false;
            rec.interimResults = true;
            rec.maxAlternatives = 8;

            rec.onstart = function() {
              setMicState('listening');
              var hint = _attempts === 0 ? 'Say your answer or A · B · C · D'
                       : _attempts === 1 ? 'Try again — say the answer or a letter'
                       : 'One more try…';
              showHint(hint, 0);
            };

            rec.onresult = function(e) {
              var last = e.results[e.results.length - 1];
              /* Show what's being heard in real time */
              if (!last.isFinal) {
                var interim = last[0].transcript || '';
                if (interim) showHint('"' + interim + '"', 0);
                return;
              }
              /* Final result — process all alternatives */
              var heard = '', letter = null;
              for (var ri = 0; ri < e.results.length; ri++) {
                if (!e.results[ri].isFinal) continue;
                for (var ai = 0; ai < e.results[ri].length; ai++) {
                  var tx = e.results[ri][ai].transcript || '';
                  if (!heard) heard = tx;
                  if (!letter) letter = parseVoice(tx, q.type, rawOpts);
                  if (letter) break;
                }
              }
              rec = null; recBusy = false; cancelRestart();
              hideHint();
              showSpeechPop(heard, letter, rawOpts);
              if (letter) {
                sttActive = false; setIdle();
                applyMCQAnswer(q, letter);
              } else {
                _attempts++;
                setIdle();
                if (sttActive && _attempts < MAX_ATT) {
                  showHint(heard ? ('"' + heard.slice(0, 28) + '" — try again') : 'Nothing matched — try again', 1000);
                  setTimeout(function() {
                    if (sttActive) { recBusy = true; setBusy(); tryListen(); }
                  }, 1200);
                } else {
                  sttActive = false; setIdle();
                  showHint(heard ? 'Couldn\'t match — tap an option directly' : 'Couldn\'t hear — tap to retry', 3500);
                }
              }
            };

            rec.onnomatch = function() {
              rec = null; recBusy = false; cancelRestart();
              _attempts++;
              if (sttActive && _attempts < MAX_ATT) {
                setIdle();
                showHint('Nothing clear — trying again…', 800);
                setTimeout(function() {
                  if (sttActive) { recBusy = true; setBusy(); tryListen(); }
                }, 1000);
              } else {
                sttActive = false; setIdle();
                showHint('Couldn\'t hear clearly — tap the option', 3000);
              }
            };

            rec.onerror = function(ev) {
              if (ev.error === 'aborted') { rec = null; recBusy = false; return; }
              rec = null; recBusy = false; cancelRestart();
              if (ev.error === 'no-speech') {
                _attempts++;
                if (sttActive && _attempts < MAX_ATT) {
                  setTimeout(function() { if (sttActive) { recBusy = true; tryListen(); } }, 500);
                } else {
                  sttActive = false; setIdle();
                  showHint('Ready when you are — tap mic to try again', 3000);
                }
                return;
              }
              sttActive = false; setIdle();
              handleFatalError(ev.error);
            };

            rec.onend = function() { rec = null; recBusy = false; };

            rec.start();
          } catch(e) {
            sttActive = false; rec = null; recBusy = false; setIdle();
            showHint('Mic error: ' + (e.message || e), 4000);
          }
        }

        tryListen();
      }

      function applyMCQAnswer(q, letter) {
        var qid = q.$id || q.id;
        if (answeredQs.has(qid)) { showHint('Already answered - move to next question.', 2000); return; }
        var body = document.getElementById('qbody');
        if (!body) return;
        var opts = body.querySelectorAll('.opt');
        var sel = null;
        for (var i = 0; i < opts.length; i++) {
          opts[i].classList.remove('is-selected', 'fb-correct', 'fb-wrong');
          var ke0 = opts[i].querySelector('.opt__key');
          if (ke0) ke0.textContent = opts[i].dataset.k;
          if (String(opts[i].dataset.k) === String(letter)) sel = opts[i];
        }
        if (!sel) { showHint('Option ' + letter + ' not on this question.', 2500); return; }
        sel.classList.add('is-selected');
        try { setAnswer(q.$id || q.id, letter); } catch(e) {}
        try { showFeedback(q, letter); } catch(e) {}
      }

      function startDictation(q) {
        if (recBusy) return;
        var ta = document.getElementById('ans');
        if (!ta) { showHint('Text field not ready yet.', 2500); sttActive = false; setIdle(); return; }

        killRec(); recBusy = true;
        setBusy();
        ta.classList.add('is-dictating');

        /* Snapshot the textarea's current value as the base for this phrase.
           finalBuf accumulates words heard in this single rec session.       */
        var base = ta.value;
        if (base && base[base.length-1] !== ' ' && base[base.length-1] !== '\n') base += ' ';
        var finalBuf = '';

        function go() {
          try {
            rec = new SRec();
            rec.lang            = 'en-US';
            rec.maxAlternatives = 1;

            rec.onstart = function() {
              recStarted = true;
              setMicState('listening');
              if (isMobile) showHint('Speak a phrase, pause, speak again. Tap mic to stop.', 0);
              else          showHint('Dictating… speak naturally. Tap mic to stop.', 0);
            };

            if (isMobile) {
              rec.continuous     = false;
              rec.interimResults = false;

              rec.onresult = function(e) {
                for (var i = 0; i < e.results.length; i++) {
                  if (e.results[i].isFinal) {
                    finalBuf += e.results[i][0].transcript;
                    if (finalBuf && finalBuf[finalBuf.length-1] !== ' ') finalBuf += ' ';
                  }
                }
                var ta2 = document.getElementById('ans');
                if (ta2) {
                  ta2.value = base + finalBuf;
                  ta2.dispatchEvent(new Event('input'));
                  ta2.scrollTop = ta2.scrollHeight;
                }
                if (finalBuf) showHint('”' + finalBuf.slice(-50).trimStart() + '”', 0);
              };

              rec.onerror = function(ev) {
                recBusy = false;
                if (ev.error === 'no-speech') {
                  /* onerror fires first, then onend. Guard so only one restart
                     is scheduled — scheduleRestart ignores the second call.   */
                  if (sttActive) scheduleRestart(function() { startDictation(q); }, T_NOSPEECH);
                  return;
                }
                if (ev.error === 'aborted') { rec = null; return; }
                handleFatalError(ev.error);
              };

              rec.onend = function() {
                rec = null; recBusy = false;
                if (sttActive) {
                  /* Update base so next phrase appends after what we have so far */
                  var ta2 = document.getElementById('ans');
                  if (ta2) {
                    base = ta2.value;
                    if (base && base[base.length-1] !== ' ' && base[base.length-1] !== '\n') base += ' ';
                  }
                  finalBuf = '';
                  /* scheduleRestart is a no-op if onerror already scheduled */
                  scheduleRestart(function() { if (sttActive) startDictation(q); }, T_END);
                } else {
                  clearDictUI();
                }
              };

            } else {
              rec.continuous     = true;
              rec.interimResults = true;

              rec.onresult = function(e) {
                var interim = '';
                for (var i = e.resultIndex; i < e.results.length; i++) {
                  var chunk = e.results[i][0].transcript || '';
                  if (e.results[i].isFinal) {
                    finalBuf += chunk;
                    if (finalBuf && finalBuf[finalBuf.length-1] !== ' ') finalBuf += ' ';
                  } else {
                    interim += chunk;
                  }
                }
                var ta2 = document.getElementById('ans');
                if (ta2) {
                  ta2.value = base + finalBuf + interim;
                  ta2.dispatchEvent(new Event('input'));
                  ta2.scrollTop = ta2.scrollHeight;
                }
                if (interim) showHint('”' + interim + '…”', 0);
                else if (finalBuf) showHint('Got: ' + finalBuf.slice(-60).trimStart(), 1800);
              };

              rec.onerror = function(ev) {
                recBusy = false;
                if (ev.error === 'no-speech') {
                  var ta2 = document.getElementById('ans');
                  if (ta2 && sttActive) {
                    base = ta2.value;
                    if (base && base[base.length-1] !== ' ' && base[base.length-1] !== '\n') base += ' ';
                    finalBuf = '';
                  }
                  if (sttActive) scheduleRestart(function() { startDictation(q); }, T_NOSPEECH);
                  return;
                }
                if (ev.error === 'aborted') { rec = null; return; }
                handleFatalError(ev.error);
              };

              rec.onend = function() {
                rec = null; recBusy = false;
                if (sttActive) {
                  var ta2 = document.getElementById('ans');
                  if (ta2) {
                    base = ta2.value;
                    if (base && base[base.length-1] !== ' ' && base[base.length-1] !== '\n') base += ' ';
                  }
                  finalBuf = '';
                  scheduleRestart(function() { if (sttActive) startDictation(q); }, T_END);
                } else {
                  clearDictUI();
                }
              };
            }

            rec.start();
          } catch(err) {
            showHint('Could not start mic: ' + (err.message || err), 4000);
            sttActive = false; recBusy = false; clearDictUI(); setIdle();
          }
        }

        /* First tap: show “Speak Now…” wave; restarts go straight to go()
           so the waveform never flickers between phrases.                */
        if (_isFirstRec) {
          _isFirstRec = false;
          setMicState('setup');
        }
        go();
      }

      function startRec() {
        var q = questions && questions[current];
        if (!q) { showHint('No question loaded.', 2000); sttActive = false; setIdle(); return; }
        if (q.type === 'theory' || q.type === 'fill') {
          startDictation(q);
        } else if (['mcq','truefalse','multi'].indexOf(q.type) !== -1) {
          startMCQ(q);
        } else {
          showHint('Voice input not available for upload questions.', 3000);
          sttActive = false; setIdle();
        }
      }

      var _tapping = false;
      function handleTap() {
        if (_tapping) return;
        _tapping = true;
        setTimeout(function() { _tapping = false; }, 400);
        if (sttActive) {
          sttActive = false; killRec(); clearDictUI(); setIdle();
          showHint('Voice input stopped.', 1600);
        } else {
          sttActive = true; startRec();
        }
      }
      if (isMobile) {
        btn.addEventListener('touchend', function(e) { e.preventDefault(); handleTap(); }, { passive: false });
      }
      btn.addEventListener('click', handleTap);

      return {
        stop: function() {
          if (!sttActive) return;
          sttActive = false; killRec(); clearDictUI(); setIdle(); hideHint();
        }
      };
    })();

    /* ═══════════════════════════════════════════════════════════
       VOICE MODE — hands-free exam loop
       Flow: [one-time intro, timer paused] → readQuestion (dynamic rate)
             → STT listens (continuous, no timeout penalty)
             → answer / "next" / "previous" → advance → repeat
    ═══════════════════════════════════════════════════════════ */
    var VoiceMode = (function () {
      var SYNTH    = window.speechSynthesis || null;
      var SRec     = window.SpeechRecognition || window.webkitSpeechRecognition || null;
      var vmBtn    = document.getElementById('vmBtn');
      var vmLbl    = document.getElementById('vmLbl');
      var statEl   = document.getElementById('vmStatus');
      var statTxt  = document.getElementById('vmStatusText');
      var OPT_KEYS = ['A','B','C','D','E','F','G','H'];

      var active        = false;
      var vmRec         = null;
      var advTimer      = null;
      var rstTimer      = null; /* STT restart guard — only one restart at a time */
      var retries       = 0;
      var MAX_RETRY     = 3;

      if (!vmBtn) return { isActive: function(){ return false; }, onRender: function(){} };

      /* ── UI helpers ── */
      function setBanner(txt) {
        if (statTxt) statTxt.textContent = txt || '';
        if (statEl)  statEl.classList.toggle('show', active && !!txt);
      }
      function updateBtn(state) {
        var labels = { reading:'Reading…', listening:'Listening…', answered:'Got it!', idle:'Auto' };
        if (vmLbl) vmLbl.textContent = active ? (labels[state] || 'Auto') : 'Auto';
        vmBtn.classList.toggle('vm-on', active);
        vmBtn.title = active ? 'Tap to end voice mode' : 'Hands-free voice mode';
      }
      function disableManualAudio(off) {
        ['ttsBtn','sttBtn'].forEach(function(id) {
          var el = document.getElementById(id);
          if (el) { el.disabled = off; el.style.opacity = off ? '0.35' : ''; }
        });
      }

      /* ── Cancel all pending timers + speech ── */
      function cancelAll() {
        if (advTimer) { clearTimeout(advTimer); advTimer = null; }
        if (rstTimer)  { clearTimeout(rstTimer);  rstTimer  = null; }
        if (vmRec)    { try { vmRec.abort(); } catch(e) {} vmRec = null; }
        if (SYNTH)    SYNTH.cancel();
      }

      /* Restart STT after a delay — only one restart scheduled at a time */
      function scheduleRecRestart(delay) {
        if (rstTimer) return;
        rstTimer = setTimeout(function() {
          rstTimer = null;
          if (active) startListen();
        }, delay || 300);
      }

      /* ── Dynamic TTS rate based on time remaining per question ── */
      function calcRate() {
        var qLeft = questions.length - current;
        if (!qLeft || !durationSec) return 0.88;
        var sPerQ = durationSec / qLeft;
        if (sPerQ < 8)  return 1.5;
        if (sPerQ < 12) return 1.2;
        if (sPerQ < 18) return 1.0;
        if (sPerQ < 25) return 0.92;
        return 0.88;
      }

      /* ── Parse transcript → answer letter OR navigation keyword ── */
      function parseAnswer(text, qType, rawOpts) {
        var raw = (text || '').trim();
        var lo  = raw.toLowerCase().replace(/[.,!?]/g, ' ').replace(/\s+/g, ' ').trim();

        /* ── Navigation first ── */
        if (/\b(next|skip|forward|move on|continue|proceed)\b/.test(lo)) return '__next__';
        if (/\b(previous|prev|back|go back|last one)\b/.test(lo))         return '__prev__';

        /* ── True/False ── */
        if (qType === 'truefalse') {
          if (/\b(true|yes|correct|right|yeah|yep|yea|affirmative)\b/.test(lo))  return 'True';
          if (/\b(false|no|wrong|incorrect|nope|nah|negative)\b/.test(lo))        return 'False';
          return null;
        }

        /* ── MCQ / Multi — 6-pass strategy (specific → broad) ── */

        /* Pass 1: whole utterance is a bare letter ("b", "B") */
        var bare = raw.replace(/[\s.,!?]/g, '');
        if (/^[A-Ha-h]$/.test(bare)) return bare.toUpperCase();

        /* Pass 2: whole cleaned utterance matches a phonetic word exactly.
           'ah' and 'eh' are common STT transcriptions for the letter A
           (especially with non-native / West-African accents). */
        var P = {
          A:['alpha','able','apple','ay','aye','ah','eh','ace','a'],
          B:['bravo','bee','be','bi','bea','beat'],
          C:['charlie','see','sea','si','ce'],
          D:['delta','dee','di','de'],
          E:['echo','ee'],
          F:['foxtrot','ef','eff'],
          G:['golf','gee','ge'],
          H:['hotel','aitch','haitch','ache'],
        };
        var stripped = lo.replace(/[^a-z\s]/g,'').trim();
        for (var l0 in P) { if (P[l0].indexOf(stripped) !== -1) return l0; }

        /* Pass 3: explicit answer phrase — "my answer is B", "I choose C", "option D" */
        var mp = lo.match(/\b(?:(?:my\s+)?answer\s+(?:is\s+)?|i\s+(?:choose|pick|select|say|go\s+with)\s+|option\s+|letter\s+|choice\s+|it(?:'?s)?\s+)([a-h])\b/);
        if (mp) return mp[1].toUpperCase();

        /* Pass 4: ordinal / number words → letter */
        var N = {one:'A',first:'A','1':'A','1st':'A',
                 two:'B',second:'B','2':'B','2nd':'B',
                 three:'C',third:'C','3':'C','3rd':'C',
                 four:'D',fourth:'D','4':'D','4th':'D',
                 five:'E',fifth:'E','5':'E','5th':'E',
                 six:'F',sixth:'F','6':'F','6th':'F',
                 seven:'G',seventh:'G','7':'G','7th':'G',
                 eight:'H',eighth:'H','8':'H','8th':'H'};
        var ws = stripped.replace(/[^a-z0-9\s]/g,'').split(/\s+/);
        for (var wi=0;wi<ws.length;wi++) { if (N[ws[wi]]) return N[ws[wi]]; }

        /* Pass 4.5: word-by-word scan for short phonetics that won't false-match
           inside the general \b regex passes (ah/eh/ay are clearly "A" sounds). */
        var SHORT_A = {ah:'A', ay:'A', eh:'A', aye:'A'};
        for (var si=0;si<ws.length;si++) { if (SHORT_A[ws[si]]) return SHORT_A[ws[si]]; }

        /* Pass 5: single letter as a whole word (\b boundary) */
        var ml = lo.match(/\b([a-h])\b/);
        if (ml) return ml[1].toUpperCase();

        /* Pass 6: phonetic word appearing anywhere (3+ chars to avoid short false matches) */
        for (var l6 in P) {
          for (var j=0;j<P[l6].length;j++) {
            var ph = P[l6][j];
            if (ph.length >= 3 && new RegExp('\\b' + ph + '\\b').test(stripped)) return l6;
          }
        }

        /* Pass 7: content matching — student says the actual option text */
        if (rawOpts && rawOpts.length) {
          var OKP = ['A','B','C','D','E','F','G','H'];
          var heardP = lo.replace(/[^\w\s]/g,' ').replace(/\s+/g,' ').trim();
          var bestKP = null, bestScP = 0;
          rawOpts.forEach(function(o, idx) {
            if (idx >= OKP.length) return;
            var optP = (typeof o === 'string' ? o : (o.text || '')).toLowerCase().replace(/[^\w\s]/g,' ').replace(/\s+/g,' ').trim();
            if (!optP || optP.length < 4) return;
            if (optP.length >= 6 && heardP.indexOf(optP) !== -1) {
              if (1.0 > bestScP) { bestScP = 1.0; bestKP = OKP[idx]; }
              return;
            }
            var kwP = optP.split(' ').filter(function(w) { return w.length >= 4; });
            if (!kwP.length) return;
            var hitsP = kwP.filter(function(w) { return heardP.indexOf(w) !== -1; }).length;
            var scP = hitsP / kwP.length;
            if (scP >= 0.55 && scP > bestScP) { bestScP = scP; bestKP = OKP[idx]; }
          });
          if (bestKP) return bestKP;
        }

        return null;
      }

      /* ── Apply the chosen letter to the DOM ── */
      function applyAnswer(q, letter) {
        if (!q || !letter) return null;
        if (answeredQs && answeredQs.has(q.$id)) return null;
        var body = document.getElementById('qbody');
        if (!body) return null;
        body.querySelectorAll('.opt').forEach(function(el) {
          el.classList.remove('is-selected','fb-correct','fb-wrong');
          var ke = el.querySelector('.opt__key');
          if (ke) ke.textContent = q.type === 'truefalse'
            ? (el.dataset.k === 'True' ? '✓' : '✗') : el.dataset.k;
        });
        var target = body.querySelector('.opt[data-k="' + letter + '"]');
        if (!target) return null;
        target.classList.add('is-selected');
        try { setAnswer(q.$id, letter); } catch(e) {}
        var fb = null;
        try { fb = showFeedback(q, letter); } catch(e) {}
        return fb;
      }

      /* ── Pick best English TTS voice ── */
      function bestVoice() {
        if (!SYNTH) return null;
        var vs = SYNTH.getVoices();
        var en = vs.filter(function(v){ return /en/i.test(v.lang); });
        return en.find(function(v){ return /en[-_]?(US|GB)/i.test(v.lang); }) || en[0] || vs[0] || null;
      }

      /* ── Build TTS text from question ── */
      function buildText(q) {
        var t = 'Question ' + (current + 1) + '. ' + q.text + '. ';
        if (q.type === 'truefalse') {
          t += 'True or False?';
        } else if (q.type === 'mcq' || q.type === 'multi') {
          try {
            var opts = JSON.parse(q.options || '[]');
            opts.forEach(function(o, i) {
              if (i >= OPT_KEYS.length) return;
              var txt = typeof o === 'string' ? o : (o.text || '');
              t += OPT_KEYS[i] + ': ' + txt + '. ';
            });
          } catch(e) {}
          if (q.type === 'multi') t += 'Multiple correct answers possible.';
          /* "Say A, B, C or D" is in the one-time intro — not repeated per question */
        } else {
          t += 'This question needs a typed answer. Moving on in 5 seconds.';
        }
        return t;
      }

      /* ── Read feedback aloud, then call cb when done ── */
      function readFeedback(speechText, cb) {
        if (!active) return;
        setBanner('Reviewing…');
        if (!SYNTH || !speechText) {
          advTimer = setTimeout(function() { if (active) cb(); }, 2000);
          return;
        }
        SYNTH.cancel();
        var u = new SpeechSynthesisUtterance(speechText);
        u.rate  = calcRate();
        u.pitch = 1.0;
        var v = bestVoice(); if (v) u.voice = v;
        u.onend   = function() { if (active) advTimer = setTimeout(function() { if (active) cb(); }, 500); };
        u.onerror = function() { if (active) advTimer = setTimeout(function() { if (active) cb(); }, 500); };
        SYNTH.speak(u);
      }

      /* ── Step 3: advance to next question ── */
      function advance() {
        if (!active) return;
        cancelAll();
        if (current < questions.length - 1) {
          current++;
          render(); /* render() → VoiceMode.onRender → readQuestion */
        } else {
          setBanner('All done! Exam complete.');
          updateBtn('idle');
          advTimer = setTimeout(function() { stop(true); }, 2500);
        }
      }

      /* ── Step 2: continuous STT — waits indefinitely for user to speak ── */
      function startListen() {
        if (!active) return;
        var q = questions[current];
        if (!q) { stop(); return; }

        if (q.type !== 'mcq' && q.type !== 'truefalse' && q.type !== 'multi') {
          setBanner('Type required — moving on in 5 s');
          updateBtn('listening');
          advTimer = setTimeout(function() { if (active) advance(); }, 5000);
          return;
        }
        if (answeredQs && answeredQs.has(q.$id)) {
          setBanner('Already answered — skipping');
          advTimer = setTimeout(function() { if (active) advance(); }, 1500);
          return;
        }
        if (!SRec) {
          setBanner('No speech recognition in this browser');
          advTimer = setTimeout(function() { stop(); }, 3000);
          return;
        }

        setBanner('Listening… say your answer');
        updateBtn('listening');

        if (vmRec) { try { vmRec.abort(); } catch(e) {} vmRec = null; }
        if (rstTimer) { clearTimeout(rstTimer); rstTimer = null; }

        var rawOpts = [];
        try { rawOpts = JSON.parse(q.options || '[]'); } catch(e0) {}

        try {
          vmRec = new SRec();
          vmRec.lang            = 'en-US';
          vmRec.continuous      = true;  /* keep mic open even during silence */
          vmRec.interimResults  = true;
          vmRec.maxAlternatives = 6;

          vmRec.onresult = function(e) {
            /* Show what's being heard in real time */
            if (!e.results[e.resultIndex].isFinal) {
              var interim = e.results[e.resultIndex][0].transcript || '';
              if (interim) setBanner('Heard: "' + interim.slice(0, 50) + '"…');
              return;
            }
            /* Process final results (continuous mode — start from resultIndex) */
            var heard = '', letter = null;
            for (var ri = e.resultIndex; ri < e.results.length; ri++) {
              if (!e.results[ri].isFinal) continue;
              for (var ai = 0; ai < e.results[ri].length; ai++) {
                var tx = e.results[ri][ai].transcript || '';
                if (!heard) heard = tx;
                if (!letter) letter = parseAnswer(tx, q.type, rawOpts);
              }
            }
            if (!letter) return; /* wait for more speech */

            /* Valid answer found — stop this recognition session */
            var captured = vmRec;
            vmRec = null;
            if (captured) { try { captured.abort(); } catch(e2) {} }
            if (!active) return;

            if (letter === '__next__') {
              setBanner('Skipping…');
              advTimer = setTimeout(function() { if (active) advance(); }, 700);
              return;
            }
            if (letter === '__prev__') {
              if (current > 0) {
                setBanner('Going back…');
                advTimer = setTimeout(function() {
                  if (!active) return;
                  current--;
                  render();
                }, 700);
              } else {
                setBanner('Already at first question');
                advTimer = setTimeout(function() { if (active) startListen(); }, 1500);
              }
              return;
            }

            retries = 0;
            setBanner('Heard: ' + letter + ' ✓');
            updateBtn('answered');
            var fb = applyAnswer(q, letter);
            readFeedback(fb && fb.speechText, function() { if (active) advance(); });
          };

          vmRec.onerror = function(ev) {
            if (!active) return;
            if (ev.error === 'aborted') { vmRec = null; return; }
            vmRec = null;
            if (ev.error === 'no-speech') {
              /* Chrome silence timeout — restart without counting as a retry */
              setBanner('Still listening… take your time');
              scheduleRecRestart(300);
              return;
            }
            /* Fatal mic error */
            setBanner('Mic error — moving on');
            advTimer = setTimeout(function() { if (active) advance(); }, 2000);
          };

          vmRec.onnomatch = function() {
            if (!active) return;
            vmRec = null;
            retries++;
            if (retries < MAX_RETRY) {
              setBanner('Not clear — say A, B, C or D');
              scheduleRecRestart(800);
            } else {
              retries = 0;
              setBanner('Moving on…');
              advTimer = setTimeout(function() { if (active) advance(); }, 1500);
            }
          };

          vmRec.onend = function() {
            /* Only restart if we haven't already handled this end via onerror/onresult */
            if (vmRec !== null) { vmRec = null; if (active) scheduleRecRestart(400); }
          };

          vmRec.start();
        } catch(e) {
          vmRec = null;
          advTimer = setTimeout(function() { if (active) advance(); }, 2000);
        }
      }

      /* ── Step 1: TTS reads current question then starts STT ── */
      function readQuestion() {
        if (!active) return;
        cancelAll();
        retries = 0;
        var q = questions[current];
        if (!q) { stop(); return; }
        updateBtn('reading');
        setBanner('Reading Q' + (current + 1) + ' of ' + questions.length + '…');
        if (!SYNTH) { startListen(); return; }
        SYNTH.cancel();
        var u = new SpeechSynthesisUtterance(buildText(q));
        u.rate  = calcRate();
        u.pitch = 1.0;
        var v = bestVoice(); if (v) u.voice = v;
        u.onend   = function() { if (active) advTimer = setTimeout(function(){ if (active) startListen(); }, 600); };
        u.onerror = function() { if (active) startListen(); };
        SYNTH.speak(u);
      }

      /* ── Start voice mode ── */
      function start() {
        if (active) return;
        active = true;
        retries = 0;
        updateBtn('reading');
        setBanner('Starting…');
        disableManualAudio(true);

        var INTRO_KEY    = 'ronyx_vm_intro_' + examId;
        var hasSeenIntro = sessionStorage.getItem(INTRO_KEY) === '1';

        if (!hasSeenIntro && SYNTH) {
          /* First activation this exam — pause timer, play full instructions */
          timerPaused = true;
          SYNTH.cancel();
          var intro = new SpeechSynthesisUtterance(
            'Voice mode on. I will read each question and its options, then listen for your answer. ' +
            'Say A, B, C, or D to choose your answer. ' +
            'Say next or skip to move to the next question. ' +
            'Say previous to go back. ' +
            'Tap the Auto button to end voice mode at any time. ' +
            'Your exam timer is now paused.'
          );
          intro.rate = 0.90;
          var v1 = bestVoice(); if (v1) intro.voice = v1;
          var done = function() {
            timerPaused = false;
            try { sessionStorage.setItem(INTRO_KEY, '1'); } catch(e) {}
            if (active) readQuestion();
          };
          intro.onend   = done;
          intro.onerror = done;
          SYNTH.speak(intro);
        } else if (SYNTH) {
          /* Already seen intro — just play a short "on" cue */
          SYNTH.cancel();
          var cue = new SpeechSynthesisUtterance('Voice mode on.');
          cue.rate = 0.92;
          var v2 = bestVoice(); if (v2) cue.voice = v2;
          cue.onend   = function() { if (active) readQuestion(); };
          cue.onerror = function() { if (active) readQuestion(); };
          SYNTH.speak(cue);
        } else {
          readQuestion();
        }
      }

      /* ── Stop voice mode ── */
      function stop(quiet) {
        active = false;
        timerPaused = false; /* always resume timer when VM stops */
        cancelAll();
        retries = 0;
        updateBtn('idle');
        setBanner('');
        disableManualAudio(false);
        if (!quiet && SYNTH) {
          SYNTH.cancel();
          var bye = new SpeechSynthesisUtterance('Voice mode off.');
          bye.rate = 0.92;
          SYNTH.speak(bye);
        }
      }

      function toggle() { if (active) stop(false); else start(); }

      vmBtn.addEventListener('click', toggle);
      vmBtn.addEventListener('touchend', function(e){ e.preventDefault(); toggle(); }, { passive:false });

      return {
        isActive: function() { return active; },
        stop: stop,
        onRender: function() {
          if (!active) return;
          cancelAll();
          retries = 0;
          advTimer = setTimeout(function() { if (active) readQuestion(); }, 350);
        }
      };
    })();

  })();
  </script>
</body>
</html>
