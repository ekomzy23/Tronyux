<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Exam — Ronyx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- KaTeX for equation preview in theory answers -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>
    .overlay { position:absolute; inset:0; background:rgba(4,4,15,.75); backdrop-filter:blur(6px); display:none; z-index:30; padding:22px; }
    .overlay.open { display:block; }
    .overlay__sheet { background:var(--color-bg-2); border:1px solid var(--color-stroke); border-radius:var(--radius-lg); padding:20px; margin-top:60px; }

    /* Immediate answer feedback */
    .opt.fb-correct { border-color:var(--color-success) !important; background:rgba(52,211,153,.1) !important; }
    .opt.fb-wrong   { border-color:var(--color-danger)  !important; background:rgba(251,113,133,.1) !important; }
    .opt.fb-correct .opt__key { background:var(--color-success) !important; color:#fff !important; }
    .opt.fb-wrong   .opt__key { background:var(--color-danger)  !important; color:#fff !important; }
    .feedback-card {
      margin-top:12px; padding:13px 15px; border-radius:14px;
      animation:fbIn .2s ease;
    }
    .feedback-card.correct { background:rgba(52,211,153,.1); border:1px solid rgba(52,211,153,.35); }
    .feedback-card.wrong   { background:rgba(251,113,133,.1); border:1px solid rgba(251,113,133,.3); }
    .feedback-card__hd { font-size:13px; font-weight:700; margin-bottom:5px; }
    .feedback-card__body { font-size:12px; color:var(--color-muted); line-height:1.55; }
    @keyframes fbIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    /* ── Audio exam buttons (stacked FABs) ── */
    .audio-fab-group {
      position:fixed; bottom:92px; right:14px;
      z-index:25; display:flex; flex-direction:column; align-items:center; gap:8px;
    }
    .audio-fab-item { display:flex; flex-direction:column; align-items:center; gap:3px; }
    .audio-fab {
      width:46px; height:46px; border-radius:50%;
      background:var(--color-bg-2); border:1.5px solid var(--color-stroke);
      color:var(--color-text); font-size:19px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 4px 18px rgba(0,0,0,.38); transition:background .2s,border .2s;
      line-height:1; padding:0;
    }
    .audio-fab:active { transform:scale(.9); }
    .audio-fab__lbl {
      font-size:9px; font-weight:700; color:var(--color-muted);
      text-transform:uppercase; letter-spacing:.5px;
    }
    .audio-fab--on {
      background:var(--color-primary,#6d5efc) !important;
      border-color:transparent !important; color:#fff !important;
      animation:audioPulse 2.5s ease-in-out infinite;
    }
    .audio-fab--listening {
      background:#e11d48 !important; border-color:transparent !important;
      color:#fff !important; animation:recPulse 1s ease-in-out infinite !important;
    }
    @keyframes audioPulse {
      0%,100%{ box-shadow:0 4px 20px rgba(109,94,252,.4); }
      50%    { box-shadow:0 4px 32px rgba(109,94,252,.85); }
    }
    @keyframes recPulse {
      0%,100%{ box-shadow:0 4px 18px rgba(225,29,72,.4); }
      50%    { box-shadow:0 4px 28px rgba(225,29,72,.85); }
    }
    /* Speech pop — shows raw transcript on every capture */
    #speechPop {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(.85);
      background:rgba(15,15,30,.96); color:#fff;
      border:1.5px solid rgba(109,94,252,.6);
      border-radius:18px; padding:18px 28px; z-index:60;
      text-align:center; pointer-events:none; min-width:180px;
      opacity:0; transition:opacity .18s, transform .18s;
    }
    #speechPop.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
    #speechPop .sp-label { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:rgba(255,255,255,.5); margin-bottom:6px; }
    #speechPop .sp-text  { font-size:22px; font-weight:800; color:#fff; word-break:break-word; }
    #speechPop .sp-match { font-size:13px; margin-top:6px; color:#a78bfa; font-weight:600; }

    /* STT status hint */
    #sttHint {
      position:fixed; bottom:238px; right:68px;
      max-width:210px; font-size:11px; font-weight:600; line-height:1.45;
      background:rgba(0,0,0,.85); color:#fff; border-radius:10px;
      padding:7px 11px; z-index:26; pointer-events:none;
      opacity:0; transition:opacity .25s; text-align:right;
    }
    #sttHint.visible { opacity:1; }

    /* ── Mic state + waveform panel ── */
    #micPanel {
      position:fixed; bottom:155px; right:8px; z-index:24;
      display:none; flex-direction:column; align-items:flex-end; gap:5px;
    }
    #micPanel.show { display:flex; }
    #micChip {
      font-size:9px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
      padding:3px 9px; border-radius:20px;
      background:rgba(109,94,252,.92); color:#fff;
      transition:background .22s;
    }
    #micChip.listening { background:rgba(225,29,72,.92); }
    #waveCanvas {
      width:110px; height:26px; border-radius:7px;
      background:rgba(0,0,0,.45); display:block;
    }

    /* Dictation mode — pulsing red border on textarea */
    textarea.is-dictating {
      border-color:#e11d48 !important;
      outline:none;
      animation:dictPulse 1.6s ease-in-out infinite;
    }
    @keyframes dictPulse {
      0%,100%{ box-shadow:0 0 0 2px rgba(225,29,72,.22); }
      50%    { box-shadow:0 0 0 4px rgba(225,29,72,.45); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="appbar">
      <a href="/pages/student/dashboard.html" class="iconbtn">&larr;</a>
      <span class="text-tiny" data-status style="flex:1;"></span>
      <span class="timer">&#9201; <span id="examTimer">--:--:--</span></span>
      <button class="iconbtn" id="paletteBtn">&#9638;</button>
    </div>

    <div class="app__body" id="examBody">
      <div class="between mb-4">
        <span class="text-tiny" id="qcount">Loading…</span>
        <span class="badge badge--violet" id="qbadge">—</span>
      </div>
      <h3 class="title-md mb-4" id="qtext">Loading questions…</h3>
      <div id="qbody"></div>
      <div class="card mt-4 row" style="justify-content: space-around;" id="toolRow">
        <span class="link text-tiny" id="flagBtn">&#9872; Flag</span>
        <a class="link text-tiny" href="/pages/student/calculator.html">&#129518; Calculator</a>
        <a class="link text-tiny" href="/pages/student/notepad.html">&#128221; Notepad</a>
      </div>
    </div>

    <div style="padding: 0 22px 12px;">
      <div class="pbar"><i class="pbar__fill" id="progress" style="width: 0;"></i></div>
    </div>

    <nav class="tabbar tabbar--actions" id="navRow">
      <button class="btn btn--ghost" id="prevBtn">&larr; Previous</button>
      <button class="btn btn--primary" id="nextBtn">Next &rarr;</button>
    </nav>

    <!-- Audio exam: two independent buttons -->
    <div class="audio-fab-group">
      <div class="audio-fab-item">
        <button class="audio-fab" id="ttsBtn" title="Read question &amp; options aloud">&#128266;</button>
        <span class="audio-fab__lbl">Read</span>
      </div>
      <div class="audio-fab-item">
        <button class="audio-fab" id="sttBtn" title="Speak your answer (A / B / C / D or True / False)">&#127910;</button>
        <span class="audio-fab__lbl">Speak</span>
      </div>
    </div>
    <!-- STT status hint bubble -->
    <div id="sttHint"></div>
    <!-- Speech pop — raw transcript toast -->
    <div id="speechPop">
      <div class="sp-label">I heard</div>
      <div class="sp-text" id="spText">...</div>
      <div class="sp-match" id="spMatch"></div>
    </div>
    <!-- Mic state chip + waveform -->
    <div id="micPanel">
      <div id="micChip">Setting up&hellip;</div>
      <canvas id="waveCanvas" width="220" height="52"></canvas>
    </div>

    <div class="overlay" id="overlay">
      <div class="overlay__sheet">
        <div class="between mb-4">
          <h3 class="title-md">Questions</h3>
          <button class="iconbtn" id="closePalette">&times;</button>
        </div>
        <div class="legend">
          <div><span class="legend__dot" style="background: var(--color-success);"></span>Answered</div>
          <div><span class="legend__dot" style="background: var(--color-primary-2);"></span>Marked</div>
          <div><span class="legend__dot" style="background: var(--color-surface-2); border: 1px solid var(--color-stroke);"></span>Not done</div>
        </div>
        <div class="palette" id="paletteGrid"></div>
      </div>
    </div>
  </div>

  <script src="/js/appwrite.min.js?v=mra6sc87"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="/js/config.js?v=mra6sc87"></script>
  <script src="/js/appwrite.js?v=mra6sc87"></script>
  <script src="/js/data.js?v=mra6sc87"></script>
  <script src="/js/scikeyboard.js?v=mra6sc87"></script>
  <script src="/js/theme.js?v=mra6sc87"></script>
  <script>
  (function () {
    const cfg = window.RONYX_CONFIG || { CONFIGURED: false };
    const params = new URLSearchParams(location.search);
    const examId = params.get('exam') || '';
    const format = sessionStorage.getItem('ronyx_format') || 'mixed';
    const minutes = parseInt(sessionStorage.getItem('ronyx_minutes')) || 30;
    const qcount  = parseInt(sessionStorage.getItem('ronyx_qcount') || '0');

    const OBJECTIVE = ['mcq','truefalse','multi'];
    const THEORY    = ['theory','fill'];
    const BADGE = { mcq:'MCQ', multi:'Multi-select', truefalse:'True / False', theory:'Theory', fill:'Fill blank', upload:'Upload' };

    /* Namespace answers + flags per exam so stale data from a previous exam never pre-selects */
    const ANSWERS_KEY = 'ronyx_ans_' + examId;
    const MARKED_KEY  = 'ronyx_mrk_' + examId;

    let questions = [], current = 0, attemptId = null, durationSec = minutes * 60;
    const answers = JSON.parse(sessionStorage.getItem(ANSWERS_KEY) || '{}');
    const marked  = new Set(JSON.parse(sessionStorage.getItem(MARKED_KEY) || '[]'));
    const statusEl = document.querySelector('[data-status]');

    function emptyState(msg) {
      document.getElementById('examBody').innerHTML =
        `<div class="empty"><div class="empty__icon">📭</div><p>${msg}</p></div>`;
      document.getElementById('navRow').style.display = 'none';
      document.getElementById('examTimer').textContent = '--:--:--';
    }

    (async function init() {
      if (!cfg.CONFIGURED || !window.RonyxData) {
        emptyState('App not configured. Run setup first.');
        return;
      }
      if (!examId) {
        emptyState('No exam ID found. Go back and open the exam again.');
        return;
      }

      /* ── Load questions with a 12-second timeout ─────────────────────────
         Questions are the ONLY thing students need to see. Everything else
         (exam title, user session, attempt record) runs in the background
         so a slow auth check can never freeze the exam screen.
      ──────────────────────────────────────────────────────────────────── */
      let all;
      try {
        all = await Promise.race([
          RonyxData.listQuestions(examId),
          new Promise(function(_, rej) {
            setTimeout(function() { rej(new Error('timeout')); }, 12000);
          }),
        ]);
      } catch(e) {
        if (e.message === 'timeout') {
          emptyState('Questions took too long to load. Check your internet connection and tap ← to try again.');
        } else {
          emptyState('Could not load questions (' + (e.message || 'network error') + '). Tap ← to retry.');
        }
        return;
      }

      // filter by the format the student chose
      let qs = all;
      if (format === 'objective') qs = qs.filter(q => OBJECTIVE.includes(q.type));
      else if (format === 'theory') qs = qs.filter(q => THEORY.includes(q.type));

      // shuffle so each attempt feels fresh
      qs = qs.sort(() => Math.random() - 0.5);

      // apply question count limit (0 = all)
      if (qcount > 0 && qs.length > qcount) qs = qs.slice(0, qcount);

      questions = qs;

      if (!questions.length) {
        emptyState('No ' + format + ' questions found for this exam. The admin may need to add questions first.');
        return;
      }

      /* Store questions for auto-scoring (note: Appwrite uses correctAnswer / explanation) */
      try {
        sessionStorage.setItem('ronyx_examId', examId);
        if (!sessionStorage.getItem('ronyx_examStart')) {
          sessionStorage.setItem('ronyx_examStart', String(Date.now()));
        }
        sessionStorage.setItem('ronyx_q_' + examId, JSON.stringify(questions.map(function(q) {
          return {
            id:      q.$id,
            text:    q.text,
            type:    q.type,
            options: q.options || '[]',
            answer:  q.correctAnswer || q.answer || '',   /* setup.js field = correctAnswer */
            explain: q.explanation   || q.explain  || '', /* setup.js field = explanation  */
            marks:   q.marks || 1,
          };
        })));
      } catch(e) {}

      sessionStorage.setItem('ronyx_total', questions.length);

      /* Render NOW — student sees questions immediately */
      render(); buildPalette(); startTimer();

      /* Everything else is background — slow auth/network can't block the exam */
      Promise.all([
        RonyxData.getExam(examId).catch(function() { return null; }),
        RonyxData.currentUser().catch(function() { return null; }),
      ]).then(function(res) {
        const exam = res[0], user = res[1];
        if (exam) sessionStorage.setItem('ronyx_examTitle', exam.title || '');
        if (user) {
          RonyxData.startAttempt(examId).then(function(attempt) {
            if (attempt) attemptId = attempt.$id;
          }).catch(function() {});
        }
      }).catch(function() {});
    })();

    function render() {
      const q = questions[current];
      document.getElementById('qcount').textContent = `Question ${current + 1} of ${questions.length}`;
      document.getElementById('qbadge').textContent = `${BADGE[q.type] || 'Question'} · ${q.marks || 1} marks`;
      document.getElementById('qtext').textContent = q.text;

      const body = document.getElementById('qbody');
      const val = answers[q.$id];

      if (q.type === 'theory' || q.type === 'fill') {
        body.innerHTML = `<textarea class="input" id="ans" rows="6" placeholder="Write your answer…">${val || ''}</textarea>`;
        const ta = document.getElementById('ans');
        ta.addEventListener('input', e => setAnswer(q.$id, e.target.value));
        RonyxSciKeyboard.attach(ta);
      } else if (q.type === 'upload') {
        body.innerHTML = `
          <p class="text-muted mb-4">Accepted: PDF, DOC, JPG, PNG · max 10 MB</p>
          <label class="btn btn--ghost">⤓ ${val ? 'Replace file' : 'Choose file'}
            <input type="file" hidden accept=".pdf,.doc,.docx,.jpg,.png"></label>
          <p class="text-tiny mt-2" id="fileName">${val || ''}</p>`;
        body.querySelector('input').addEventListener('change', e => {
          const f = e.target.files[0]; if (!f) return;
          setAnswer(q.$id, f.name);
          document.getElementById('fileName').textContent = f.name;
          if (window.RonyxData) RonyxData.uploadFile(f).catch(() => {});
        });
      } else if (q.type === 'truefalse') {
        /* True / False — two big buttons */
        body.innerHTML = ['True','False'].map(o =>
          `<div class="opt ${val === o ? 'is-selected' : ''}" data-k="${o}" style="margin-bottom:10px;">
             <span class="opt__key">${o === 'True' ? '✓' : '✗'}</span><span>${o}</span></div>`
        ).join('');
        body.querySelectorAll('.opt').forEach(el => el.addEventListener('click', () => {
          body.querySelectorAll('.opt').forEach(o => {
            o.classList.remove('is-selected','fb-correct','fb-wrong');
            o.querySelector('.opt__key').textContent = o.dataset.k === 'True' ? '✓' : '✗';
          });
          el.classList.add('is-selected');
          setAnswer(q.$id, el.dataset.k);
          showFeedback(q, el.dataset.k);
        }));
        if (val) showFeedback(q, val);
      } else {
        /* MCQ + Multi-select — parse options (supports string[] and {text,explain}[]) */
        const rawOpts = JSON.parse(q.options || '[]');
        const opts = rawOpts.map(o => typeof o === 'string' ? o : (o.text || ''));
        const keys = ['A','B','C','D','E','F','G','H'];
        const isMulti = q.type === 'multi';
        const selected = isMulti && val ? val.split(',') : [];

        body.innerHTML = opts.map((o, i) => {
          const k = keys[i] || String(i + 1);
          const active = isMulti ? selected.includes(k) : val === k;
          return `<div class="opt ${active ? 'is-selected' : ''}" data-k="${k}" style="margin-bottom:8px;">
                    <span class="opt__key">${k}</span><span>${o}</span></div>`;
        }).join('');

        if (isMulti) {
          body.querySelectorAll('.opt').forEach(el => el.addEventListener('click', () => {
            el.classList.toggle('is-selected');
            const sel = [...body.querySelectorAll('.opt.is-selected')].map(e => e.dataset.k);
            setAnswer(q.$id, sel.join(','));
            showFeedback(q, sel.join(','));
          }));
        } else {
          body.querySelectorAll('.opt').forEach(el => el.addEventListener('click', () => {
            body.querySelectorAll('.opt').forEach(o => {
              o.classList.remove('is-selected','fb-correct','fb-wrong');
              o.querySelector('.opt__key').textContent = keys[opts.indexOf(o)] || o.dataset.k;
            });
            el.classList.add('is-selected');
            setAnswer(q.$id, el.dataset.k);
            showFeedback(q, el.dataset.k);
          }));
        }
        /* Re-show feedback for already-answered question */
        if (val) showFeedback(q, val);
      }

      document.getElementById('progress').style.width = ((current + 1) / questions.length * 100) + '%';
      document.getElementById('prevBtn').style.visibility = current === 0 ? 'hidden' : 'visible';
      document.getElementById('nextBtn').textContent = current === questions.length - 1 ? 'Review →' : 'Next →';

      /* Stop dictation when question changes */
      if (typeof STTMode !== 'undefined' && STTMode.stop) STTMode.stop();
      /* TTS: auto-read new question if Read mode is ON */
      if (typeof TTSMode !== 'undefined') TTSMode.onRender(q);
    }

    /* ── Immediate answer feedback ───────────────────────────
       Shows correct/wrong highlight + explanation right after
       the student selects an answer (before they tap Next).
    ──────────────────────────────────────────────────────── */
    function showFeedback(q, selectedValue) {
      /* Appwrite stores correct answer as "correctAnswer", explanation as "explanation".
         Fall back to legacy field names for safety. */
      const correctAns = q.correctAnswer || q.answer || '';
      const explain    = q.explanation   || q.explain  || '';

      if (!correctAns || q.type === 'theory' || q.type === 'fill' || q.type === 'upload') return;

      const correctKeys  = String(correctAns).split(',').map(s => s.trim());
      const selectedKeys = String(selectedValue || '').split(',').map(s => s.trim());
      const isCorrect    = correctKeys.sort().join(',') === selectedKeys.sort().join(',');

      /* Colour the option chips */
      document.querySelectorAll('#qbody .opt').forEach(el => {
        const k = el.dataset.k;
        if (correctKeys.includes(k)) {
          el.classList.add('fb-correct');
          el.querySelector('.opt__key').textContent = '✓';
        } else if (selectedKeys.includes(k) && !correctKeys.includes(k)) {
          el.classList.add('fb-wrong');
          el.querySelector('.opt__key').textContent = '✗';
        }
      });

      /* Remove old card if re-answering */
      const old = document.getElementById('fbCard');
      if (old) old.remove();

      /* Build feedback card */
      const card = document.createElement('div');
      card.id = 'fbCard';
      card.className = 'feedback-card ' + (isCorrect ? 'correct' : 'wrong');
      const hd = isCorrect
        ? '&#9989; Correct!'
        : '&#10060; Wrong &mdash; correct: <strong>' + correctAns + '</strong>';
      card.innerHTML = '<div class="feedback-card__hd">' + hd + '</div>' +
        (explain ? '<div class="feedback-card__body">' + explain + '</div>' : '');
      document.getElementById('qbody').appendChild(card);
    }

    let saveTimer;
    function setAnswer(qid, value) {
      answers[qid] = value;
      sessionStorage.setItem(ANSWERS_KEY, JSON.stringify(answers));
      statusEl.textContent = 'Saving…';
      clearTimeout(saveTimer);
      saveTimer = setTimeout(async () => {
        try { if (attemptId && window.RonyxData) await RonyxData.saveAnswers(attemptId, answers); } catch (e) {}
        statusEl.textContent = '&#10003; Saved';
        buildPalette();
      }, 600);
    }

    function buildPalette() {
      const grid = document.getElementById('paletteGrid');
      grid.innerHTML = questions.map((q, i) => {
        let cls = '';
        if (i === current) cls = 'pcell--current';
        else if (marked.has(q.$id)) cls = 'pcell--marked';
        else if (answers[q.$id] != null && answers[q.$id] !== '') cls = 'pcell--answered';
        return `<div class="pcell ${cls}" data-i="${i}">${i + 1}</div>`;
      }).join('');
      grid.querySelectorAll('.pcell').forEach(c =>
        c.addEventListener('click', () => { current = +c.dataset.i; render(); closeOverlay(); }));
    }

    document.getElementById('prevBtn').onclick = () => { if (current > 0) { current--; render(); } };
    document.getElementById('nextBtn').onclick = () => {
      if (current < questions.length - 1) { current++; render(); }
      else location.href = '/pages/student/review.html';
    };
    const flagBtnEl = document.getElementById('flagBtn');
    if (flagBtnEl) flagBtnEl.onclick = () => {
      const id = questions[current].$id;
      marked.has(id) ? marked.delete(id) : marked.add(id);
      sessionStorage.setItem(MARKED_KEY, JSON.stringify([...marked]));
      buildPalette();
    };

    const overlay = document.getElementById('overlay');
    function closeOverlay() { overlay.classList.remove('open'); }
    document.getElementById('paletteBtn').onclick = () => overlay.classList.add('open');
    document.getElementById('closePalette').onclick = closeOverlay;
    overlay.addEventListener('click', e => { if (e.target === overlay) closeOverlay(); });

    function startTimer() {
      const display = document.getElementById('examTimer');
      const tick = () => {
        if (durationSec <= 0) { location.href = '/pages/student/review.html'; return; }
        durationSec--;
        const h = Math.floor(durationSec / 3600), m = Math.floor(durationSec % 3600 / 60), s = durationSec % 60;
        display.textContent = [h, m, s].map(n => String(n).padStart(2, '0')).join(':');
      };
      tick(); setInterval(tick, 1000);
    }

    /* ══════════════════════════════════════════════════════════════
       TTS MODULE — "Read" button (🔊)
       Reads the current question and its options aloud.
       Completely independent of the STT module below.

       Tap when OFF  → turn ON, read current question; auto-reads
                       every question as you navigate.
       Tap when ON   → if currently speaking: stop (stay ON for
                       next question); if idle: re-read now.
       Tap while ON  twice within 400ms → turn OFF completely.
    ══════════════════════════════════════════════════════════════ */
    var TTSMode = (function () {
      var SYNTH  = window.speechSynthesis || null;
      var btn    = document.getElementById('ttsBtn');
      var KEYS   = ['A','B','C','D','E','F','G','H'];
      var active = false;

      if (!btn) return { onRender: function(){} };
      if (!SYNTH) {
        btn.parentElement.style.display = 'none';
        return { onRender: function(){} };
      }

      function bestVoice() {
        var vs = SYNTH.getVoices();
        var en = vs.filter(function(v) { return /en/i.test(v.lang); });
        return en.find(function(v) { return /en[-_]?(US|GB)/i.test(v.lang) && !v.localService; })
            || en[0] || vs[0] || null;
      }

      function buildText(q) {
        if (!q) return '';
        var t = 'Question ' + (current + 1) + ' of ' + questions.length + '.  ' + q.text + '.  ';
        if (q.type === 'truefalse') {
          t += 'True or False?';
        } else if (q.type === 'theory' || q.type === 'fill') {
          t += 'Type your answer in the box below.';
        } else if (q.type === 'upload') {
          t += 'Upload your answer as a file.';
        } else {
          try {
            var opts = JSON.parse(q.options || '[]');
            opts.forEach(function(o, i) {
              if (!KEYS[i]) return;
              var txt = typeof o === 'string' ? o : (o.text || '');
              t += 'Option ' + KEYS[i] + ': ' + txt + '.  ';
            });
          } catch(e) {}
        }
        return t;
      }

      function read(q) {
        if (!active || !q) return;
        SYNTH.cancel();
        var u = new SpeechSynthesisUtterance(buildText(q));
        u.rate = 0.88; u.pitch = 1;
        var v = bestVoice(); if (v) u.voice = v;
        u.onend = u.onerror = function() {
          /* keep button "on" visually — stays ready for next question */
          btn.title = 'Reading ON — tap to re-read or double-tap to turn off';
        };
        SYNTH.speak(u);
        btn.classList.add('audio-fab--on');
        btn.title = 'Speaking… tap to stop';
      }

      function turnOff() {
        active = false;
        SYNTH.cancel();
        btn.classList.remove('audio-fab--on');
        btn.innerHTML = '&#128266;';
        btn.title = 'Read question &amp; options aloud';
      }

      var lastTap = 0;
      btn.addEventListener('click', function() {
        var now = Date.now();
        if (active && now - lastTap < 400) { turnOff(); lastTap = 0; return; }
        lastTap = now;

        if (!active) {
          active = true;
          btn.classList.add('audio-fab--on');
          btn.title = 'Read ON — double-tap to turn off';
          if (questions && questions[current]) read(questions[current]);
        } else {
          /* Already ON: if speaking → stop; if idle → re-read */
          if (SYNTH.speaking) { SYNTH.cancel(); }
          else { if (questions && questions[current]) read(questions[current]); }
        }
      });

      if (typeof SYNTH.onvoiceschanged !== 'undefined') SYNTH.onvoiceschanged = function(){};

      return {
        onRender: function(q) { if (active) read(q); }
      };
    })();

    /* STT MODULE - "Speak" button
       Desktop : continuous dictation with live interim preview.
       Mobile  : short non-continuous sessions (restart per phrase)
                 because Android Chrome kills continuous after ~5 s.
       New     : live waveform via Web Audio API, mic state chip.        */
    var STTMode = (function () {
      var SRec      = window.SpeechRecognition || window.webkitSpeechRecognition || null;
      var btn       = document.getElementById('sttBtn');
      var hintEl    = document.getElementById('sttHint');
      var rec       = null;
      var sttActive = false;
      var hintTimer = null;
      var recBusy   = false;
      var recStarted = false; /* true once rec.onstart has fired */

      var isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);

      var T_NOSPEECH = isMobile ? 800 : 600;
      var T_END      = isMobile ? 700 : 500;
      var T_MCQ      = isMobile ? 800 : 600;

      /* Restart guard — prevents double-fires when both onerror:no-speech
         and onend try to schedule the same restart.                       */
      var _restartTimer = null;
      function scheduleRestart(fn, delay) {
        if (_restartTimer) return; /* already scheduled — first one wins */
        _restartTimer = setTimeout(function() { _restartTimer = null; fn(); }, delay);
      }
      function cancelRestart() {
        if (_restartTimer) { clearTimeout(_restartTimer); _restartTimer = null; }
      }

      /* On the very first tap we show "Speak Now…" and open getUserMedia.
         On every subsequent restart within the same session we stay silent
         so the user never sees the mic "shut down" between phrases.       */
      var _isFirstRec = true;

      /* ── Animated waveform (canvas only — no getUserMedia so Chrome STT
         never conflicts with a second mic grab)                          ── */
      var waveRaf   = null;
      var wavePhase = 0;

      var waveCanvas = document.getElementById('waveCanvas');
      var micPanel   = document.getElementById('micPanel');
      var micChip    = document.getElementById('micChip');

      function setMicState(state) {
        if (state === 'idle') {
          if (micPanel) micPanel.classList.remove('show');
          stopViz();
        } else if (state === 'setup') {
          if (micPanel) micPanel.classList.add('show');
          if (micChip)  { micChip.textContent = 'Speak Now…'; micChip.className = ''; }
          startAnimWave(false); /* slow purple wave while mic initialises */
        } else if (state === 'listening') {
          if (micPanel) micPanel.classList.add('show');
          if (micChip)  { micChip.textContent = 'Listening'; micChip.className = 'listening'; }
          startAnimWave(true);  /* energetic red wave when actively recording */
        }
      }

      function stopViz() {
        if (waveRaf) { cancelAnimationFrame(waveRaf); waveRaf = null; }
        if (waveCanvas) {
          var c = waveCanvas.getContext('2d');
          c.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
        }
      }

      /* Two overlapping sines — looks like compressions/rarefactions.
         energetic=false: slow, dim (setup); true: faster, bright (listening). */
      function startAnimWave(energetic) {
        if (!waveCanvas) return;
        if (waveRaf) { cancelAnimationFrame(waveRaf); waveRaf = null; }
        var ctx   = waveCanvas.getContext('2d');
        var W     = waveCanvas.width, H = waveCanvas.height;
        var amp   = energetic ? H * 0.38 : H * 0.16;
        var spd   = energetic ? 0.18     : 0.07;
        var col1  = energetic ? 'rgba(225,29,72,.9)'    : 'rgba(109,94,252,.65)';
        var col2  = energetic ? 'rgba(109,94,252,.55)'  : 'rgba(109,94,252,.28)';
        wavePhase = 0;
        (function draw() {
          waveRaf = requestAnimationFrame(draw);
          ctx.clearRect(0, 0, W, H);
          for (var w = 0; w < 2; w++) {
            var off   = w * Math.PI * 0.75;
            var scale = w === 0 ? 1.0 : 0.5;
            ctx.strokeStyle = w === 0 ? col1 : col2;
            ctx.lineWidth   = w === 0 ? 2.0 : 1.4;
            ctx.beginPath();
            for (var x = 0; x < W; x++) {
              var y = H / 2
                    + Math.sin(x * 0.055 + wavePhase + off) * amp * scale
                    + Math.sin(x * 0.110 + wavePhase * 1.8 + off) * amp * 0.22 * scale;
              if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
          }
          wavePhase += spd;
        })();
      }

      if (!btn) return { stop: function(){} };

      function showHint(msg, ms) {
        if (!hintEl) return;
        hintEl.textContent = msg;
        hintEl.classList.add('visible');
        clearTimeout(hintTimer);
        if (ms !== 0) hintTimer = setTimeout(function() { hintEl.classList.remove('visible'); }, ms || 3000);
      }
      function hideHint() {
        if (!hintEl) return;
        clearTimeout(hintTimer);
        hintEl.classList.remove('visible');
      }

      var _popTimer = null;
      function showSpeechPop(heard, matched) {
        var pop  = document.getElementById('speechPop');
        var txt  = document.getElementById('spText');
        var mtch = document.getElementById('spMatch');
        if (!pop || !txt) return;
        txt.textContent  = heard || '(nothing)';
        mtch.textContent = matched ? ('-> ' + matched) : 'no match - try again';
        mtch.style.color = matched ? '#34d399' : '#f87171';
        clearTimeout(_popTimer);
        pop.classList.add('show');
        _popTimer = setTimeout(function() { pop.classList.remove('show'); }, 2200);
      }

      if (!SRec) {
        btn.addEventListener('click', function() {
          showHint(isMobile
            ? 'Voice needs Chrome on Android — Safari is not supported.'
            : 'Voice input needs Chrome or Edge.', 5000);
        });
        return { stop: function(){} };
      }

      function setIdle() {
        btn.classList.remove('audio-fab--listening');
        btn.innerHTML = '&#127910;';
        recBusy = false;
        recStarted = false;
        _isFirstRec = true;
        cancelRestart();
        setMicState('idle');
      }
      function setBusy() {
        btn.classList.add('audio-fab--listening');
        btn.innerHTML = '&#127908;';
      }
      function clearDictUI() { var ta = document.getElementById('ans'); if (ta) ta.classList.remove('is-dictating'); }

      function killRec() {
        if (rec) { try { rec.abort(); } catch(e) {} rec = null; }
        recBusy = false;
        recStarted = false;
        cancelRestart();
      }

      function parseVoice(text, qtype) {
        var t = text.trim().toUpperCase().replace(/[^A-Z0-9\s]/g,'').replace(/\s+/g,' ');
        if (qtype === 'truefalse') {
          if (/\b(TRUE|YES|CORRECT|RIGHT|YEP|YEA|YEAH)\b/.test(t)) return 'True';
          if (/\b(FALSE|NO|WRONG|INCORRECT|NAH|NOPE)\b/.test(t))   return 'False';
          return null;
        }
        if (/^[A-H]$/.test(t)) return t;
        var MAP = { AY:'A',EI:'A',EY:'A',BEE:'B',BE:'B',BI:'B',
                    SEE:'C',SEA:'C',SI:'C',DEE:'D',DE:'D',DI:'D',
                    EE:'E',HEE:'E',EF:'F',GEE:'G',AGE:'G',AITCH:'H',ACE:'A' };
        if (MAP[t]) return MAP[t];
        var m = t.match(/\b(?:OPTION|ANSWER|LETTER|CHOOSE|SELECT|PICK)\s+([A-H])\b/);
        if (m) return m[1];
        m = t.match(/\b([A-H])\b/);
        if (m) return m[1];
        var NUM = { ONE:'A',TWO:'B',THREE:'C',FOUR:'D',FIVE:'E',SIX:'F',SEVEN:'G',EIGHT:'H',
                    FIRST:'A',SECOND:'B',THIRD:'C',FOURTH:'D' };
        var ws = t.split(' ');
        for (var i = 0; i < ws.length; i++) { if (NUM[ws[i]]) return NUM[ws[i]]; }
        return null;
      }

      function handleFatalError(code) {
        var MSGS = {
          'not-allowed'        : 'Mic blocked — allow microphone in browser settings.',
          'service-not-allowed': 'Mic blocked — allow microphone in browser settings.',
          'audio-capture'      : 'No microphone found on this device.',
          'network'            : 'Network error — voice input needs internet.',
          'aborted'            : '',
        };
        var msg = (code in MSGS) ? MSGS[code] : ('Mic error: ' + code);
        sttActive = false; killRec(); clearDictUI(); setIdle();
        if (msg) showHint(msg, 6000);
      }

      function startMCQ(q) {
        if (recBusy) return;
        killRec(); setBusy(); recBusy = true;

        function go() {
          try {
            rec = new SRec();
            rec.lang            = 'en-US';
            rec.continuous      = false;
            rec.interimResults  = false;
            rec.maxAlternatives = isMobile ? 3 : 6;

            rec.onstart = function() {
              recStarted = true;
              setMicState('listening');
              showHint('Say A, B, C, D or True / False', 0);
            };

            rec.onresult = function(e) {
              var letter = null, heard = '';
              outer: for (var ri = 0; ri < e.results.length; ri++) {
                for (var ai = 0; ai < e.results[ri].length; ai++) {
                  var tr = e.results[ri][ai].transcript || '';
                  if (!heard) heard = tr;
                  letter = parseVoice(tr, q.type);
                  if (letter) break outer;
                }
              }
              showSpeechPop(heard, letter);
              sttActive = false; killRec(); setIdle();
              if (letter) {
                showHint('Heard: ' + heard + ' -> ' + letter, 2500);
                /* Capture refs now, before the timeout fires */
                var _q = q;
                var _letter = letter;
                setTimeout(function() {
                  try {
                    var body = document.getElementById('qbody');
                    if (!body) return;
                    var allOpts = body.querySelectorAll('.opt');

                    /* Find the target option */
                    var sel = null;
                    for (var i = 0; i < allOpts.length; i++) {
                      if (String(allOpts[i].dataset.k) === String(_letter)) { sel = allOpts[i]; break; }
                    }
                    if (!sel) { showHint('Option ' + _letter + ' not on this question.', 3000); return; }

                    /* Reset all options then highlight chosen */
                    for (var j = 0; j < allOpts.length; j++) {
                      allOpts[j].classList.remove('is-selected', 'fb-correct', 'fb-wrong');
                      var kEl = allOpts[j].querySelector('.opt__key');
                      if (kEl) kEl.textContent = allOpts[j].dataset.k;
                    }
                    sel.classList.add('is-selected');

                    /* Save answer */
                    var qid = (_q && (_q.$id || _q.id)) || '';
                    if (qid) {
                      try { answers[qid] = _letter; sessionStorage.setItem(ANSWERS_KEY, JSON.stringify(answers)); } catch(e) {}
                    }

                    /* Inline feedback - green if correct, red if wrong */
                    var correctAns = '';
                    try { correctAns = String((_q && (_q.correctAnswer || _q.answer)) || '').trim(); } catch(e) {}
                    if (correctAns) {
                      var cKeys = correctAns.split(',').map(function(s) { return s.trim().toUpperCase(); });
                      var chosen = String(_letter).toUpperCase();
                      var isOk   = cKeys.indexOf(chosen) !== -1;
                      for (var k = 0; k < allOpts.length; k++) {
                        var dk = String(allOpts[k].dataset.k || '').toUpperCase();
                        var ke = allOpts[k].querySelector('.opt__key');
                        if (cKeys.indexOf(dk) !== -1) {
                          allOpts[k].classList.add('fb-correct');
                          if (ke) ke.textContent = '\u2713';
                        } else if (dk === chosen) {
                          allOpts[k].classList.add('fb-wrong');
                          if (ke) ke.textContent = '\u2717';
                        }
                      }
                      var old = document.getElementById('fbCard');
                      if (old) old.remove();
                      var card = document.createElement('div');
                      card.id = 'fbCard';
                      card.className = 'feedback-card ' + (isOk ? 'correct' : 'wrong');
                      var expl = '';
                      try { expl = String((_q && (_q.explanation || _q.explain)) || '').trim(); } catch(e) {}
                      var hdTxt = isOk ? '&#9989; Correct!' : '&#10060; Wrong &mdash; correct: <strong>' + correctAns + '</strong>';
                      card.innerHTML = '<div class="feedback-card__hd">' + hdTxt + '</div>' +
                        (expl ? '<div class="feedback-card__body">' + expl + '</div>' : '');
                      body.appendChild(card);
                    }
                  } catch(e) {
                    showHint('Heard ' + _letter + '. Tap to select manually.', 3000);
                  }
                }, 80);
              } else {
                showHint(heard ? ('Heard: ' + heard + ' - say A B C or D') : 'Nothing heard. Tap mic to try again.', 3000);
              }
            };
            rec.onnomatch = function() {
              sttActive = false; killRec(); setIdle();
              showHint('Did not catch that. Tap mic to try again.', 2500);
            };
            rec.onerror = function(ev) {
              if (ev.error === 'aborted') { rec = null; recBusy = false; return; }
              sttActive = false; killRec(); setIdle();
              if (ev.error === 'no-speech') {
                showHint('Nothing heard. Tap mic to try again.', 2500);
                return;
              }
              handleFatalError(ev.error);
            };
            rec.onend = function() {
              rec = null; recBusy = false;
              if (sttActive) { sttActive = false; setIdle(); }
            };
            rec.start();
          } catch(err) {
            showHint('Could not start mic: ' + (err.message || err), 4000);
            sttActive = false; recBusy = false; setIdle();
          }
        }

        /* First tap: show “Speak Now…” wave; restarts go straight to go()
           so the waveform never flickers between phrases.                */
        if (_isFirstRec) {
          _isFirstRec = false;
          setMicState('setup');
        }
        go();
      }

      function startDictation(q) {
        if (recBusy) return;
        var ta = document.getElementById('ans');
        if (!ta) { showHint('Text field not ready yet.', 2500); sttActive = false; setIdle(); return; }

        killRec(); recBusy = true;
        setBusy();
        ta.classList.add('is-dictating');

        /* Snapshot the textarea's current value as the base for this phrase.
           finalBuf accumulates words heard in this single rec session.       */
        var base = ta.value;
        if (base && base[base.length-1] !== ' ' && base[base.length-1] !== '\n') base += ' ';
        var finalBuf = '';

        function go() {
          try {
            rec = new SRec();
            rec.lang            = 'en-US';
            rec.maxAlternatives = 1;

            rec.onstart = function() {
              recStarted = true;
              setMicState('listening');
              if (isMobile) showHint('Speak a phrase, pause, speak again. Tap mic to stop.', 0);
              else          showHint('Dictating… speak naturally. Tap mic to stop.', 0);
            };

            if (isMobile) {
              rec.continuous     = false;
              rec.interimResults = false;

              rec.onresult = function(e) {
                for (var i = 0; i < e.results.length; i++) {
                  if (e.results[i].isFinal) {
                    finalBuf += e.results[i][0].transcript;
                    if (finalBuf && finalBuf[finalBuf.length-1] !== ' ') finalBuf += ' ';
                  }
                }
                var ta2 = document.getElementById('ans');
                if (ta2) {
                  ta2.value = base + finalBuf;
                  ta2.dispatchEvent(new Event('input'));
                  ta2.scrollTop = ta2.scrollHeight;
                }
                if (finalBuf) showHint('”' + finalBuf.slice(-50).trimStart() + '”', 0);
              };

              rec.onerror = function(ev) {
                recBusy = false;
                if (ev.error === 'no-speech') {
                  /* onerror fires first, then onend. Guard so only one restart
                     is scheduled — scheduleRestart ignores the second call.   */
                  if (sttActive) scheduleRestart(function() { startDictation(q); }, T_NOSPEECH);
                  return;
                }
                if (ev.error === 'aborted') { rec = null; return; }
                handleFatalError(ev.error);
              };

              rec.onend = function() {
                rec = null; recBusy = false;
                if (sttActive) {
                  /* Update base so next phrase appends after what we have so far */
                  var ta2 = document.getElementById('ans');
                  if (ta2) {
                    base = ta2.value;
                    if (base && base[base.length-1] !== ' ' && base[base.length-1] !== '\n') base += ' ';
                  }
                  finalBuf = '';
                  /* scheduleRestart is a no-op if onerror already scheduled */
                  scheduleRestart(function() { if (sttActive) startDictation(q); }, T_END);
                } else {
                  clearDictUI();
                }
              };

            } else {
              rec.continuous     = true;
              rec.interimResults = true;

              rec.onresult = function(e) {
                var interim = '';
                for (var i = e.resultIndex; i < e.results.length; i++) {
                  var chunk = e.results[i][0].transcript || '';
                  if (e.results[i].isFinal) {
                    finalBuf += chunk;
                    if (finalBuf && finalBuf[finalBuf.length-1] !== ' ') finalBuf += ' ';
                  } else {
                    interim += chunk;
                  }
                }
                var ta2 = document.getElementById('ans');
                if (ta2) {
                  ta2.value = base + finalBuf + interim;
                  ta2.dispatchEvent(new Event('input'));
                  ta2.scrollTop = ta2.scrollHeight;
                }
                if (interim) showHint('”' + interim + '…”', 0);
                else if (finalBuf) showHint('Got: ' + finalBuf.slice(-60).trimStart(), 1800);
              };

              rec.onerror = function(ev) {
                recBusy = false;
                if (ev.error === 'no-speech') {
                  var ta2 = document.getElementById('ans');
                  if (ta2 && sttActive) {
                    base = ta2.value;
                    if (base && base[base.length-1] !== ' ' && base[base.length-1] !== '\n') base += ' ';
                    finalBuf = '';
                  }
                  if (sttActive) scheduleRestart(function() { startDictation(q); }, T_NOSPEECH);
                  return;
                }
                if (ev.error === 'aborted') { rec = null; return; }
                handleFatalError(ev.error);
              };

              rec.onend = function() {
                rec = null; recBusy = false;
                if (sttActive) {
                  var ta2 = document.getElementById('ans');
                  if (ta2) {
                    base = ta2.value;
                    if (base && base[base.length-1] !== ' ' && base[base.length-1] !== '\n') base += ' ';
                  }
                  finalBuf = '';
                  scheduleRestart(function() { if (sttActive) startDictation(q); }, T_END);
                } else {
                  clearDictUI();
                }
              };
            }

            rec.start();
          } catch(err) {
            showHint('Could not start mic: ' + (err.message || err), 4000);
            sttActive = false; recBusy = false; clearDictUI(); setIdle();
          }
        }

        /* First tap: show “Speak Now…” wave; restarts go straight to go()
           so the waveform never flickers between phrases.                */
        if (_isFirstRec) {
          _isFirstRec = false;
          setMicState('setup');
        }
        go();
      }

      function startRec() {
        var q = questions && questions[current];
        if (!q) { showHint('No question loaded.', 2000); sttActive = false; setIdle(); return; }
        if (q.type === 'theory' || q.type === 'fill') {
          startDictation(q);
        } else if (['mcq','truefalse','multi'].indexOf(q.type) !== -1) {
          startMCQ(q);
        } else {
          showHint('Voice input not available for upload questions.', 3000);
          sttActive = false; setIdle();
        }
      }

      var _tapping = false;
      function handleTap() {
        if (_tapping) return;
        _tapping = true;
        setTimeout(function() { _tapping = false; }, 400);
        if (sttActive) {
          sttActive = false; killRec(); clearDictUI(); setIdle();
          showHint('Voice input stopped.', 1600);
        } else {
          sttActive = true; startRec();
        }
      }
      if (isMobile) {
        btn.addEventListener('touchend', function(e) { e.preventDefault(); handleTap(); }, { passive: false });
      }
      btn.addEventListener('click', handleTap);

      return {
        stop: function() {
          if (!sttActive) return;
          sttActive = false; killRec(); clearDictUI(); setIdle(); hideHint();
        }
      };
    })();

  })();
  </script>
</body>
</html>
