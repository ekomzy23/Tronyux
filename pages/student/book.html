<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Library Reader &mdash; Ronyx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>
    /* ── Full-screen reader — stretch to fill the device screen ── */
    .tabbar { display: none !important; }
    .tts-bar { bottom: env(safe-area-inset-bottom, 0px) !important; }
    .app { max-height: none !important; border-radius: 0 !important; border: none !important; }
    @media (min-width: 480px) {
      .app { height: 100dvh !important; height: 100vh !important; }
    }

    /* ── Reader body ── */
    .reader-body { font-size: 15px; line-height: 1.9; }
    .reader-body h2 { font-size:18px; font-weight:800; margin:28px 0 10px; color:var(--color-primary-2); }
    .reader-body h3 { font-size:15px; font-weight:700; margin:20px 0 8px; }
    .reader-body p  { margin-bottom:14px; color:var(--color-muted); }
    .reader-body ul, .reader-body ol { padding-left:22px; margin-bottom:14px; }
    .reader-body li { margin-bottom:6px; color:var(--color-muted); }
    .reader-body strong { color:var(--color-text); font-weight:700; }
    .reader-body hr { border:none; border-top:1px solid var(--color-stroke); margin:24px 0; }
    .reader-body blockquote { border-left:3px solid var(--color-primary-2); padding-left:14px;
      color:var(--color-muted-2); font-style:italic; margin:14px 0; }

    /* ── TTS sentences: tap-to-seek affordance ── */
    .tts-sent { display: inline; border-radius: 3px; line-height: 1.9; }
    .tts-sent.active { background: rgba(109,94,252,.3); color: #fff !important; padding: 0 2px; border-radius: 4px; }
    .tts-tap-active .tts-sent { cursor: pointer; border-radius: 3px; transition: background .1s; }
    .tts-tap-active .tts-sent:not([data-hl]):hover  { background: rgba(109,94,252,.1); }
    .tts-tap-active .tts-sent:not([data-hl]):active { background: rgba(109,94,252,.22); }
    .tts-tap-active .tts-sent[data-hl]:hover  { opacity: .82; }
    .tts-tap-active .tts-sent[data-hl]:active { opacity: .7; }

    /* ── Highlight colors ── */
    .tts-sent[data-hl=”y”] { background: rgba(251,191,36,.38); border-radius: 3px; }
    .tts-sent[data-hl=”g”] { background: rgba(52,211,153,.34);  border-radius: 3px; }
    .tts-sent[data-hl=”p”] { background: rgba(244,63,94,.24);   border-radius: 3px; }
    .tts-sent[data-hl=”b”] { background: rgba(59,130,246,.28);  border-radius: 3px; }

    /* ── Reading toolbar ── */
    .reader-tools {
      display: flex; align-items: center; gap: 6px; overflow-x: auto;
      padding: 6px 0 8px; margin-bottom: 12px; border-bottom: 1px solid var(--color-stroke);
      scrollbar-width: none;
    }
    .reader-tools::-webkit-scrollbar { display: none; }
    .rt-btn {
      flex-shrink: 0; padding: 5px 11px; border-radius: 18px; font-size: 12px; font-weight: 700;
      cursor: pointer; border: 1.5px solid var(--color-stroke); background: var(--color-surface);
      color: var(--color-muted); white-space: nowrap; touch-action: manipulation;
      -webkit-tap-highlight-color: transparent; line-height: 1.4;
      transition: background .12s, color .12s, border-color .12s;
    }
    .rt-btn:active { opacity: .7; }
    .rt-btn.rt-on { background: rgba(109,94,252,.18); border-color: rgba(109,94,252,.5); color: var(--color-primary-2); }
    .rt-divider { width: 1px; height: 20px; background: var(--color-stroke); flex-shrink: 0; margin: 0 2px; }
    .rt-zoom-lbl { min-width: 44px; text-align: center; cursor: pointer; font-variant-numeric: tabular-nums; }
    #ttsBody { transition: zoom 0.05s; }

    .takeaway-list { margin-bottom:24px; }
    .takeaway-item { display:flex; align-items:flex-start; gap:10px; padding:10px 14px;
      border-radius:12px; background:var(--color-surface); border:1px solid var(--color-stroke);
      margin-bottom:8px; font-size:14px; }
    .takeaway-check { color:var(--color-success); font-size:16px; flex-shrink:0; margin-top:1px; }

    .section-hd { font-size:10px; font-weight:800; text-transform:uppercase;
      letter-spacing:.08em; color:var(--color-muted-2); margin:28px 0 12px;
      display:flex; align-items:center; gap:8px; }
    .section-hd::after { content:''; flex:1; height:1px; background:var(--color-stroke); }

    /* Admin book file viewer fallback (iframe) */
    .file-viewer { margin-top:24px; border-radius:16px; overflow:hidden; border:1px solid var(--color-stroke); }
    .file-viewer iframe { width:100%; height:70vh; border:none; background:#fff; display:block; }
    .file-viewer-label { padding:10px 14px; font-size:11px; font-weight:700; text-transform:uppercase;
      letter-spacing:.06em; color:var(--color-muted-2); border-bottom:1px solid var(--color-stroke); }

    /* DOCX document body — white pages inside the dark app shell */
    .doc-body { background:#fff; color:#111; padding:32px 36px; border-radius:12px;
      font-family:Georgia,'Times New Roman',serif; font-size:12pt; line-height:1.6; }
    .doc-body p  { margin:0 0 10px; }
    .doc-body h1 { font-size:20pt; font-weight:700; margin:20px 0 10px; }
    .doc-body h2 { font-size:15pt; font-weight:700; margin:16px 0 8px; }
    .doc-body h3 { font-size:12pt; font-weight:700; margin:12px 0 6px; }
    .doc-body ul,
    .doc-body ol { padding-left:24px; margin:0 0 10px; }
    .doc-body li { margin-bottom:4px; }
    .doc-body table { border-collapse:collapse; width:100%; margin:10px 0; }
    .doc-body td,
    .doc-body th  { border:1px solid #ccc; padding:5px 10px; }
    .doc-body strong { font-weight:700; }
    .doc-body em { font-style:italic; }

    /* â”€â”€ TOP progress bar (sticky â€” always visible) â”€â”€ */
    #topProc {
      position: sticky;
      top: 0;
      z-index: 200;
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-stroke);
      padding: 10px 16px 12px;
      margin: -16px -16px 16px;
      display: none;
    }
    #topProc.on { display: block; }
    .tp-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .tp-msg { font-size:13px; font-weight:600; color:var(--color-text); }
    .tp-pct { font-size:12px; color:var(--color-muted); }
    .tp-track { height:4px; border-radius:2px; background:var(--color-stroke); overflow:hidden; }
    .tp-fill  { height:100%; width:0%; border-radius:2px; background:var(--color-primary-2); transition:width .35s ease; }

    /* â”€â”€ TTS bar — always visible on this page â”€â”€ */
    .tts-bar {
      position:fixed; bottom:calc(56px + env(safe-area-inset-bottom,0px));
      left:0; right:0; z-index:500;
      background:var(--color-bg); border-top:1px solid var(--color-stroke);
      padding:8px 14px; display:block;
    }
    .tts-row { display:flex; align-items:center; gap:8px; }
    .tts-playbtn { width:44px;height:44px;border-radius:50%;flex-shrink:0;background:var(--color-primary-2);color:#fff;font-size:18px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;font-family:monospace; }
    .tts-iconbtn { width:38px;height:38px;border-radius:50%;flex-shrink:0;background:rgba(109,94,252,.14);color:var(--color-primary-2);font-size:14px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;font-weight:700; }
    .tts-iconbtn:active,.tts-playbtn:active { opacity:.7; }
    .tts-mid { flex:1;min-width:0; }
    .tts-track { height:3px;background:var(--color-stroke);border-radius:2px;margin-bottom:4px;overflow:hidden; }
    .tts-fill  { height:100%;width:0%;background:var(--color-primary-2);border-radius:2px;transition:width .4s; }
    .tts-info  { font-size:10px;color:var(--color-muted-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .tts-speed { font-size:11px;font-weight:800;color:var(--color-primary-2);background:rgba(109,94,252,.12);border:1px solid rgba(109,94,252,.3);border-radius:6px;padding:4px 8px;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent; }

    /* â”€â”€ PDF viewer â”€â”€ */
    .pdf-viewer { background:var(--color-surface);border:1px solid var(--color-stroke);border-radius:14px;overflow:hidden;margin-bottom:20px; }
    .pdf-hd { padding:10px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--color-muted-2);border-bottom:1px solid var(--color-stroke);display:flex;align-items:center;gap:8px; }
    .pdf-hd-left  { flex:1;min-width:0; }
    .pdf-hd-right { display:flex;align-items:center;gap:6px;flex-shrink:0; }
    .z-btn { width:28px;height:28px;border-radius:50%;background:rgba(109,94,252,.14);color:var(--color-primary-2);border:1px solid rgba(109,94,252,.3);font-size:18px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;flex-shrink:0; }
    .z-btn:active { opacity:.65; }
    #zoomLbl { font-size:11px;font-weight:700;color:var(--color-primary-2);min-width:36px;text-align:center; }
    .pdf-scroll { overflow:auto;max-height:72vh;-webkit-overflow-scrolling:touch; }
    .pdf-pages  { width:100%;transition:zoom .15s; }
    .pdf-pages canvas { width:100%;display:block;margin-bottom:2px;border-radius:3px; }

    /* â”€â”€ Image viewer â”€â”€ */
    .img-viewer { border-radius:14px;overflow:hidden;border:1px solid var(--color-stroke);margin-bottom:20px;background:var(--color-surface);text-align:center; }
    .img-viewer img { max-width:100%;max-height:70vh;object-fit:contain;display:block;margin:0 auto; }
  </style>
</head>
<body>
  <div class="app">
    <div class="appbar">
      <a href="/pages/student/library.html" class="iconbtn">&larr;</a>
      <span class="appbar__title" id="appbarTitle">Reading</span>
      <button class="iconbtn" id="favBtn" style="display:none;font-size:18px;color:var(--color-muted);" onclick="toggleFav()" title="Add to favourites">&#9825;</button>
    </div>

    <div class="app__body" id="content" style="padding-bottom:80px;">
      <div class="empty"><div class="empty__icon">&#128214;</div><p>Loading&hellip;</p></div>
    </div>

    <!-- TTS player bar -->
    <div class="tts-bar" id="ttsBar">
      <div class="tts-row">
        <button class="tts-iconbtn" title="Restart" onclick="TTS.restart()">&#124;&#9664;</button>
        <button class="tts-playbtn" id="ttsPlay" onclick="TTS.toggle()">&#9654;</button>
        <button class="tts-iconbtn" title="Stop" onclick="TTS.stop()">&#9632;</button>
        <div class="tts-mid">
          <div class="tts-track"><div class="tts-fill" id="ttsFill"></div></div>
          <div class="tts-info" id="ttsInfo">Tap &#9654; to listen aloud</div>
        </div>
        <span class="tts-speed" id="ttsVoice" onclick="TTS.cycleVoice()" title="Switch voice">&#9792;</span>
        <span class="tts-speed" id="ttsSpd"   onclick="TTS.cycleSpeed()">1x</span>
      </div>
    </div>

  </div>

  <script src="/js/appwrite.min.js?v=mrr39s6t"></script>
  <script src="/js/config.js?v=mrr39s6t"></script>
  <script src="/js/appwrite.js?v=mrr39s6t"></script>
  <script src="/js/data.js?v=mrr39s6t"></script>
  <script src="/js/ui.js?v=mrr39s6t"></script>
  <script src="/js/theme.js?v=mrr39s6t"></script>
  <script src="/js/student-ai-chat.js?v=mrr39s6t"></script>
  <script>
  /* ============================================================
     HELPERS
  ============================================================ */
  function esc(t){ return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function inline(t){
    return esc(t)
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/`(.+?)`/g,'<code style="background:var(--color-surface);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:13px;">$1</code>');
  }
  function renderContent(text){
    if(!text) return '';
    var lines=text.split('\n'),html='',inUl=false,inOl=false;
    lines.forEach(function(raw){
      var line=raw.trimEnd();
      if(line.startsWith('## ')){if(inUl){html+='</ul>';inUl=false;}if(inOl){html+='</ol>';inOl=false;}html+='<h2>'+esc(line.slice(3))+'</h2>';}
      else if(line.startsWith('### ')){if(inUl){html+='</ul>';inUl=false;}if(inOl){html+='</ol>';inOl=false;}html+='<h3>'+esc(line.slice(4))+'</h3>';}
      else if(line.startsWith('> ')){if(inUl){html+='</ul>';inUl=false;}html+='<blockquote>'+inline(line.slice(2))+'</blockquote>';}
      else if(line.startsWith('---')){html+='<hr>';}
      else if(line.startsWith('- ')||line.startsWith('â€¢ ')){if(inOl){html+='</ol>';inOl=false;}if(!inUl){html+='<ul>';inUl=true;}html+='<li>'+inline(line.slice(2))+'</li>';}
      else if(/^\d+\.\s/.test(line)){if(inUl){html+='</ul>';inUl=false;}if(!inOl){html+='<ol>';inOl=true;}html+='<li>'+inline(line.replace(/^\d+\.\s/,''))+'</li>';}
      else if(line===''){if(inUl){html+='</ul>';inUl=false;}if(inOl){html+='</ol>';inOl=false;}}
      else{if(inUl){html+='</ul>';inUl=false;}if(inOl){html+='</ol>';inOl=false;}html+='<p>'+inline(line)+'</p>';}
    });
    if(inUl)html+='</ul>';if(inOl)html+='</ol>';
    return html;
  }

  /* ============================================================
     READING PROGRESS + FAVOURITES
  ============================================================ */
  var RLIB = {
    get: function(id) {
      try { return JSON.parse(localStorage.getItem('ronyx_read_'+id)||'null'); } catch(e) { return null; }
    },
    set: function(id, data) {
      try { localStorage.setItem('ronyx_read_'+id, JSON.stringify(data)); } catch(e) {}
    },
    getFavs: function() { try { return JSON.parse(localStorage.getItem('ronyx_favs')||'[]'); } catch(e) { return []; } },
    isFav:   function(id) { return RLIB.getFavs().indexOf(id)>=0; },
    toggleFav: function(id) {
      var favs=RLIB.getFavs(), idx=favs.indexOf(id);
      if(idx>=0) favs.splice(idx,1); else favs.push(id);
      try { localStorage.setItem('ronyx_favs',JSON.stringify(favs)); } catch(e) {}
      return favs.indexOf(id)>=0;
    }
  };

  var _currentBookId = null;

  function initFavBtn(id) {
    _currentBookId = id;
    var btn = document.getElementById('favBtn');
    if (!btn) return;
    btn.style.display = '';
    var fav = RLIB.isFav(id);
    btn.innerHTML = fav ? '&#10084;' : '&#9825;';
    btn.style.color = fav ? '#EF4444' : '';
  }

  function toggleFav() {
    if (!_currentBookId) return;
    var isFav = RLIB.toggleFav(_currentBookId);
    var btn = document.getElementById('favBtn');
    if (btn) { btn.innerHTML = isFav?'&#10084;':'&#9825;'; btn.style.color = isFav?'#EF4444':''; }
  }

  /* Save progress on scroll (text / summary books) */
  function trackScrollProgress(id, meta) {
    var el = document.querySelector('.app__body') || document.getElementById('content');
    if (!el) return;
    var _save = function() {
      var total = el.scrollHeight - el.clientHeight;
      if (total <= 0) return;
      var pct = Math.min(100, Math.max(1, Math.round((el.scrollTop/total)*100)));
      RLIB.set(id, Object.assign({}, meta, { percent: pct, lastRead: Date.now() }));
    };
    el.addEventListener('scroll', _save, { passive: true });
  }

  /* Save progress per PDF page via IntersectionObserver */
  function trackPdfProgress(id, title, cover, pagesEl) {
    var canvases = pagesEl.querySelectorAll('canvas');
    var total    = canvases.length;
    if (!total) return;
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (!entry.isIntersecting) return;
        var idx = Array.prototype.indexOf.call(canvases, entry.target);
        if (idx < 0) return;
        var pct = Math.min(100, Math.round(((idx+1)/total)*100));
        RLIB.set(id, { percent: pct, page: idx+1, totalPages: total, lastRead: Date.now(), title: title, cover: cover, type: 'pdf' });
      });
    }, { threshold: 0.4 });
    Array.prototype.forEach.call(canvases, function(c){ obs.observe(c); });
  }

  /* ============================================================
     TTS ENGINE  v2
  ============================================================ */
  var TTS=(function(){
    'use strict';
    var synth=window.speechSynthesis||null;
    if(!synth) return{init:function(){},toggle:function(){},stop:function(){},restart:function(){},cycleSpeed:function(){},cycleVoice:function(){}};
    var SPEEDS=[0.75,1,1.25,1.5,2],spIdx=1;
    var VPREFS=['auto','female','male'],VICONS={auto:'&#9834;',female:'&#9792;',male:'&#9794;'},VTITLES={auto:'Voice: Auto',female:'Voice: Female',male:'Voice: Male'},vpIdx=0;
    var chunks=[],cur=0,playing=false,gen=0,lastEnd=0,dog=null;
    var _title='',_keepCtx=null,_keepSrc=null;
    /* Silent 1-second audio buffer keeps the audio session alive when the
       page is backgrounded or the screen locks, so speechSynthesis continues. */
    function _startBgAudio(){
      if(_keepSrc)return;
      try{
        _keepCtx=_keepCtx||new(window.AudioContext||window.webkitAudioContext)();
        if(_keepCtx.state==='suspended')_keepCtx.resume();
        var buf=_keepCtx.createBuffer(1,_keepCtx.sampleRate,_keepCtx.sampleRate);
        _keepSrc=_keepCtx.createBufferSource();
        _keepSrc.buffer=buf;_keepSrc.loop=true;
        _keepSrc.connect(_keepCtx.destination);
        _keepSrc.start(0);
      }catch(e){}
    }
    function _stopBgAudio(){if(_keepSrc){try{_keepSrc.stop();}catch(e){}_keepSrc=null;}}
    function _setMedia(s){
      if(!('mediaSession' in navigator))return;
      if(s==='play'){
        navigator.mediaSession.metadata=new MediaMetadata({
          title:_title||'Ronyx',artist:'Listening Mode',
          artwork:[{src:'/assets/icon-192.png',sizes:'192x192',type:'image/png'}]
        });
        navigator.mediaSession.setActionHandler('play',function(){if(!playing){playing=true;var g=++gen;setBtn('&#9646;&#9646;');_startBgAudio();startDog();speakAt(cur,g);}});
        navigator.mediaSession.setActionHandler('pause',function(){if(playing){playing=false;gen++;stopDog();_stopBgAudio();synth.cancel();setBtn('&#9654;');setInfo('Paused');}});
        navigator.mediaSession.setActionHandler('stop',function(){playing=false;gen++;stopDog();_stopBgAudio();synth.cancel();cur=0;clearHl();setFill(0);setBtn('&#9654;');setInfo('Tap ▶ to listen aloud');navigator.mediaSession.playbackState='none';});
        navigator.mediaSession.setActionHandler('nexttrack',function(){if(cur<chunks.length-1){cur++;if(playing){var g=++gen;stopDog();synth.cancel();setTimeout(function(){if(playing&&gen===g){startDog();speakAt(cur,g);}},80);}}});
        navigator.mediaSession.setActionHandler('previoustrack',function(){if(cur>0){cur--;if(playing){var g=++gen;stopDog();synth.cancel();setTimeout(function(){if(playing&&gen===g){startDog();speakAt(cur,g);}},80);}}});
        navigator.mediaSession.playbackState='playing';
      }else{
        navigator.mediaSession.playbackState='none';
        ['play','pause','stop','nexttrack','previoustrack'].forEach(function(a){try{navigator.mediaSession.setActionHandler(a,null);}catch(e){}});
      }
    }
    function setInfo(t){var e=document.getElementById('ttsInfo');if(e)e.textContent=t;}
    function setFill(p){var e=document.getElementById('ttsFill');if(e)e.style.width=Math.max(0,Math.min(100,p))+'%';}
    function setBtn(h){var e=document.getElementById('ttsPlay');if(e)e.innerHTML=h;}
    function clearHl(){document.querySelectorAll('.tts-sent.active').forEach(function(n){n.classList.remove('active');});}
    function highlight(i){var c=chunks[i];if(!c)return;var prev=document.querySelector('.tts-sent.active');if(prev!==c.span){clearHl();c.span.classList.add('active');}setFill(chunks.length>1?Math.round(i/(chunks.length-1)*100):100);setInfo('Reading '+(i+1)+' of '+chunks.length);}
    var FEMALE_RE=/female|samantha|zira|victoria|karen|lucy|moira|joanna|jenny|aria|salli|kimberly|kendra|ivy|michelle|allison|sora|nicky|fiona|tessa|raveena/i;
    var MALE_RE=/male|david|daniel|alex|mark|ralph|luca|reed|arthur|brian|jorge|hans|xander|wayne|tom|oliver|guy/i;
    function pickVoice(){var vs=synth.getVoices();var pref=VPREFS[vpIdx];var en=vs.filter(function(v){return /en/i.test(v.lang);});if(!en.length)en=vs;if(pref==='female')return en.find(function(v){return FEMALE_RE.test(v.name);})||en[0]||null;if(pref==='male')return en.find(function(v){return MALE_RE.test(v.name);})||en[0]||null;return en.find(function(v){return /en[-_]?(US|GB)/i.test(v.lang)&&!v.localService;})||en[0]||null;}
    function setVoiceBtn(){var e=document.getElementById('ttsVoice');if(e){e.innerHTML=VICONS[VPREFS[vpIdx]];e.title=VTITLES[VPREFS[vpIdx]];}}
    function speakAt(i,myGen){if(myGen!==gen||!playing)return;if(i>=chunks.length){finish();return;}cur=i;highlight(i);lastEnd=Date.now();var u=new SpeechSynthesisUtterance(chunks[i].text);u.rate=SPEEDS[spIdx];u.pitch=1.0;var v=pickVoice();if(v)u.voice=v;u.onend=function(){lastEnd=Date.now();speakAt(i+1,myGen);};u.onerror=function(e){if(e.error==='interrupted'||e.error==='canceled')return;setTimeout(function(){if(myGen===gen&&playing)speakAt(i,myGen);},300);};synth.speak(u);}

    /* \u2500\u2500 LaTeX expression \u2192 spoken English \u2500\u2500 */
    function latexToSpeech(expr){
      expr=String(expr).trim();
      /* Recursive \frac{num}{den} \u2192 "num over den" */
      var prev,safety=0;
      do{prev=expr;expr=expr.replace(/\\frac\{([^{}]*)\}\{([^{}]*)\}/g,function(_,n,d){return latexToSpeech(n)+' over '+latexToSpeech(d);});}while(expr!==prev&&++safety<20);
      /* Roots */
      expr=expr.replace(/\\sqrt\[([^\]]+)\]\{([^{}]*)\}/g,function(_,n,a){return latexToSpeech(n)+'th root of '+latexToSpeech(a);});
      expr=expr.replace(/\\sqrt\{([^{}]*)\}/g,function(_,a){return 'square root of '+latexToSpeech(a);});
      expr=expr.replace(/\\sqrt\s+([a-zA-Z0-9])/g,'square root of $1');
      /* Exponents */
      expr=expr.replace(/([a-zA-Z0-9])\^\{2\}/g,'$1 squared').replace(/([a-zA-Z0-9])\^\{3\}/g,'$1 cubed').replace(/([a-zA-Z0-9])\^\{([^}]+)\}/g,'$1 to the power of $2');
      expr=expr.replace(/([a-zA-Z0-9])\^2/g,'$1 squared').replace(/([a-zA-Z0-9])\^3/g,'$1 cubed').replace(/([a-zA-Z0-9])\^([0-9n])/g,'$1 to the power of $2');
      /* Subscripts */
      expr=expr.replace(/([a-zA-Z])\{([^}]+)\}/g,'$1 sub $2').replace(/([a-zA-Z])_([a-zA-Z0-9])/g,'$1 sub $2');
      /* Limits with bounds */
      expr=expr.replace(/\\sum_\{([^}]*)\}\^\{([^}]*)\}/g,'the sum from $1 to $2 of');
      expr=expr.replace(/\\int_\{([^}]*)\}\^\{([^}]*)\}/g,'the integral from $1 to $2 of');
      expr=expr.replace(/\\prod_\{([^}]*)\}\^\{([^}]*)\}/g,'the product from $1 to $2 of');
      expr=expr.replace(/\\lim_\{([^}]*)\}\s*\\to/g,'the limit as $1 approaches');
      expr=expr.replace(/\\lim_\{([^}]*)\}/g,'the limit as $1 of');
      /* Named commands */
      var map={'\\\\pi':'pi','\\\\theta':'theta','\\\\alpha':'alpha','\\\\beta':'beta','\\\\gamma':'gamma','\\\\delta':'delta','\\\\epsilon':'epsilon','\\\\varepsilon':'epsilon','\\\\zeta':'zeta','\\\\eta':'eta','\\\\iota':'iota','\\\\kappa':'kappa','\\\\lambda':'lambda','\\\\mu':'mu','\\\\nu':'nu','\\\\xi':'xi','\\\\rho':'rho','\\\\sigma':'sigma','\\\\tau':'tau','\\\\upsilon':'upsilon','\\\\phi':'phi','\\\\varphi':'phi','\\\\chi':'chi','\\\\psi':'psi','\\\\omega':'omega','\\\\Gamma':'capital Gamma','\\\\Delta':'capital Delta','\\\\Theta':'capital Theta','\\\\Lambda':'capital Lambda','\\\\Pi':'pi','\\\\Sigma':'capital Sigma','\\\\Phi':'capital Phi','\\\\Psi':'capital Psi','\\\\Omega':'capital Omega','\\\\infty':'infinity','\\\\pm':'plus or minus','\\\\mp':'minus or plus','\\\\times':'times','\\\\div':'divided by','\\\\cdot':'times','\\\\ast':'times','\\\\leq':'less than or equal to','\\\\le':'less than or equal to','\\\\geq':'greater than or equal to','\\\\ge':'greater than or equal to','\\\\neq':'not equal to','\\\\ne':'not equal to','\\\\approx':'approximately','\\\\sim':'similar to','\\\\equiv':'equivalent to','\\\\propto':'proportional to','\\\\rightarrow':'to','\\\\to':'to','\\\\leftarrow':'from','\\\\Rightarrow':'implies','\\\\Leftarrow':'implied by','\\\\Leftrightarrow':'if and only if','\\\\leftrightarrow':'if and only if','\\\\therefore':'therefore','\\\\because':'because','\\\\exists':'there exists','\\\\nexists':'there does not exist','\\\\forall':'for all','\\\\in':'in','\\\\notin':'not in','\\\\subset':'subset of','\\\\subseteq':'subset of or equal to','\\\\cup':'union','\\\\cap':'intersection','\\\\emptyset':'empty set','\\\\varnothing':'empty set','\\\\partial':'the partial derivative of','\\\\nabla':'del','\\\\log':'log','\\\\ln':'natural log','\\\\exp':'exponential','\\\\sin':'sine','\\\\cos':'cosine','\\\\tan':'tangent','\\\\cot':'cotangent','\\\\sec':'secant','\\\\csc':'cosecant','\\\\arcsin':'arcsine','\\\\arccos':'arccosine','\\\\arctan':'arctangent','\\\\sinh':'hyperbolic sine','\\\\cosh':'hyperbolic cosine','\\\\tanh':'hyperbolic tangent','\\\\max':'maximum','\\\\min':'minimum','\\\\gcd':'greatest common divisor','\\\\lcm':'lowest common multiple','\\\\det':'determinant','\\\\dim':'dimension','\\\\ker':'kernel','\\\\sum':'sum of','\\\\prod':'product of','\\\\int':'integral','\\\\oint':'contour integral','\\\\iint':'double integral','\\\\iiint':'triple integral','\\\\cdots':'and so on','\\\\ldots':'and so on','\\\\vdots':'','\\\\left':'','\\\\right':'','\\\\langle':'','\\\\rangle':'','\\\\|':'','\\\\,':' ','\\\\;':' ','\\\\:':' ','\\\\ ':' ','\\\\!':'','\\\\quad':' ','\\\\qquad':' '};
      Object.keys(map).forEach(function(k){expr=expr.replace(new RegExp(k,'g'),' '+map[k]+' ');});
      expr=expr.replace(/\\text\{([^}]*)\}/g,'$1');
      expr=expr.replace(/\\[a-zA-Z]+/g,' ');
      expr=expr.replace(/[{}]/g,' ').replace(/[\^_&|]/g,' ');
      expr=expr.replace(/\+/g,' plus ').replace(/-/g,' minus ').replace(/=/g,' equals ');
      expr=expr.replace(/</g,' less than ').replace(/>/g,' greater than ');
      expr=expr.replace(/\*/g,' times ');
      expr=expr.replace(/[$\\]/g,' ');
      return expr.replace(/\s+/g,' ').trim();
    }
    function ttsClean(t){
      /* Strip HTML tags that appear when pasting from websites/Word */
      t=t.replace(/<[a-zA-Z\/][^>]*>/g,' ');
      /* Strip decorative symbols that sound terrible when spoken */
      t=t.replace(/[✓✗✘☑☐►▶•◦◆★☆]/g,'');
      /* LaTeX math blocks */
      t=t.replace(/\$\$([^$]+)\$\$/g,function(_,m){return '. '+latexToSpeech(m)+'. ';});
      t=t.replace(/\$([^$\n]{1,300})\$/g,function(_,m){return ' '+latexToSpeech(m)+' ';});
      /* Plain-text math notation */
      t=t.replace(/([a-zA-Z0-9]+)\^2\b/g,'$1 squared').replace(/([a-zA-Z0-9]+)\^3\b/g,'$1 cubed');
      t=t.replace(/([a-zA-Z0-9]+)\^\{?([0-9]+)\}?/g,'$1 to the power of $2');
      t=t.replace(/([a-zA-Z0-9]+)\^n\b/g,'$1 to the power n');
      t=t.replace(/\b1\/2\b/g,'one half').replace(/\b1\/3\b/g,'one third').replace(/\b1\/4\b/g,'one quarter').replace(/\b3\/4\b/g,'three quarters').replace(/\b2\/3\b/g,'two thirds');
      /* Unicode math symbols */
      return t.replace(/\u2192/g,' to ').replace(/\u2190/g,' from ').replace(/\u2191/g,' up ').replace(/\u2193/g,' down ').replace(/\u21D2/g,' implies ').replace(/\u21D4/g,' if and only if ').replace(/\u2248/g,' approximately ').replace(/\u2260/g,' not equal to ').replace(/\u2264/g,' less than or equal to ').replace(/\u2265/g,' greater than or equal to ').replace(/\u00D7/g,' times ').replace(/\u00F7/g,' divided by ').replace(/\u00B0/g,' degrees ').replace(/\u00B2/g,' squared ').replace(/\u00B3/g,' cubed ').replace(/\u221A/g,' root of ').replace(/\u221E/g,' infinity ').replace(/\u2234/g,' therefore ').replace(/\u2235/g,' because ').replace(/\u03C0/g,' pi ').replace(/\u2211/g,' sum ').replace(/\u222B/g,' integral ').replace(/\u03B1/g,' alpha ').replace(/\u03B2/g,' beta ').replace(/\u03B3/g,' gamma ').replace(/\u03B4/g,' delta ').replace(/\u03B8/g,' theta ').replace(/\u03BB/g,' lambda ').replace(/\u03BC/g,' mu ').replace(/\u03C3/g,' sigma ').replace(/\s+/g,' ').trim();
    }
    function splitText(text){var MARK='\uE001';var result=[];var t=text.replace(/\s+/g,' ').trim();t.replace(/([.!?]+)\s+/g,'$1'+MARK).split(MARK).forEach(function(s){s=s.trim();if(!s)return;if(s.length<=180){result.push(s);return;}s.split(/,\s+/).forEach(function(part){part=part.trim();if(!part)return;if(part.length<=180){result.push(part);return;}var words=part.split(' '),buf='';words.forEach(function(w){if(buf.length+w.length+1>180&&buf){result.push(buf);buf=w;}else buf+=(buf?' ':'')+w;});if(buf)result.push(buf);});});return result.length?result:[t];}
    function buildChunks(bodyEl){
      var built=[],idx=0,firstOf={};
      /* Primary: standard prose elements + takeaway items */
      bodyEl.querySelectorAll('p,li,h2,h3,blockquote,.takeaway-item').forEach(function(el){
        var text=ttsClean(el.textContent.trim());
        if(!text)return;
        var sid='_ts'+(idx++);
        el.innerHTML='<span class="tts-sent" id="'+sid+'">'+el.innerHTML+'</span>';
        var span=document.getElementById(sid)||el;
        firstOf[sid]=built.length;
        span.addEventListener('click',function(){TTS.seekTo(firstOf[sid]);});
        splitText(text).forEach(function(s){built.push({text:s,span:span});});
      });
      /* Fallback: if the content has no standard elements (unusual formatting,
         single-block text, etc.) — read raw text content directly            */
      if(!built.length){
        var raw=ttsClean((bodyEl.innerText||bodyEl.textContent||'').trim());
        if(raw){
          bodyEl.innerHTML='<span class="tts-sent" id="_ts0">'+bodyEl.innerHTML+'</span>';
          var span=document.getElementById('_ts0')||bodyEl;
          splitText(raw).forEach(function(s){built.push({text:s,span:span});});
        }
      }
      chunks=built;
    }
    return{
      init:function(bodyEl,title){
        if(playing){playing=false;gen++;stopDog();_stopBgAudio();_setMedia('stop');synth.cancel();}
        if(title)_title=title;
        cur=0;chunks=[];clearHl();setFill(0);setBtn('&#9654;');
        try{buildChunks(bodyEl);}catch(e){chunks=[];}

            var el=document.getElementById(containers[i]);

              }

        else{playing=true;var myGen=++gen;setBtn('&#9646;&#9646;');_startBgAudio();_setMedia('play');startDog();speakAt(cur,myGen);}
      },
      stop:function(){playing=false;gen++;stopDog();_stopBgAudio();_setMedia('stop');synth.cancel();cur=0;clearHl();setFill(0);setBtn('&#9654;');setInfo('Tap play to listen aloud');},
      restart:function(){playing=false;gen++;stopDog();synth.cancel();cur=0;playing=true;var myGen=++gen;setBtn('&#9646;&#9646;');_startBgAudio();_setMedia('play');startDog();setTimeout(function(){speakAt(0,myGen);},100);},
      cycleSpeed:function(){spIdx=(spIdx+1)%SPEEDS.length;var e=document.getElementById('ttsSpd');if(e)e.textContent=SPEEDS[spIdx]+'x';if(playing){var myGen=++gen;stopDog();synth.cancel();setTimeout(function(){if(playing&&gen===myGen){startDog();speakAt(cur,myGen);}},100);}},
      cycleVoice:function(){vpIdx=(vpIdx+1)%VPREFS.length;setVoiceBtn();if(playing){var myGen=++gen;stopDog();synth.cancel();setTimeout(function(){if(playing&&gen===myGen){startDog();speakAt(cur,myGen);}},100);}},
      seekTo:function(i){if(!chunks.length)return;cur=Math.max(0,Math.min(i,chunks.length-1));if(playing){var myGen=++gen;stopDog();synth.cancel();setTimeout(function(){if(playing&&gen===myGen){startDog();speakAt(cur,myGen);}},80);}else{playing=true;var myGen=++gen;setBtn('&#9646;&#9646;');_startBgAudio();_setMedia('play');startDog();speakAt(cur,myGen);}}

  function activateTtsBar(){} /* no-op — TTS.init owns the bar now */

  /* ── Reader tools: highlights · zoom · pinch-to-zoom ─────────── */
  var _hlMode   = null;
  var _hlStore  = {};
  var _hlBookId = null;
  var _zoom     = 1.0;   /* visual zoom level applied to #ttsBody */

  function initHighlights(bookId) {
    _hlBookId = bookId;
    try { _hlStore = JSON.parse(localStorage.getItem('ronyx_hl_' + bookId) || '{}'); }
    catch(e) { _hlStore = {}; }
  }

  function _saveHlStore() {
    try { localStorage.setItem('ronyx_hl_' + _hlBookId, JSON.stringify(_hlStore)); }
    catch(e) {}
  }

  function applyHighlights() {
    document.querySelectorAll('.tts-sent').forEach(function(span) {
      var key = (span.textContent || '').trim().slice(0, 50);
      var col = _hlStore[key];
      if (col) span.setAttribute('data-hl', col);
      else     span.removeAttribute('data-hl');
    });
  }

  function setHlMode(color) {
    _hlMode = (_hlMode === color) ? null : color;
    renderReaderTools();
  }

  function clearHighlights() {
    _hlStore = {};
    _saveHlStore();
    document.querySelectorAll('[data-hl]').forEach(function(el) { el.removeAttribute('data-hl'); });
  }

  function setContentZoom(z) {
    _zoom = Math.max(0.5, Math.min(3.5, z));
    var ttsBody = document.getElementById('ttsBody');
    if (ttsBody) ttsBody.style.zoom = _zoom;
    /* allow horizontal scroll when zoomed in */
    var content = document.getElementById('content');
    if (content) content.style.overflowX = _zoom > 1.02 ? 'auto' : '';
    /* update label */
    var lbl = document.getElementById('rtZoomLbl');
    if (lbl) lbl.textContent = Math.round(_zoom * 100) + '%';
  }

  function changeZoom(delta) {
    setContentZoom(Math.round((_zoom + delta) * 10) / 10);
  }

  function renderReaderTools() {
    var el = document.getElementById('readerTools');
    if (!el) return;
    if (_hlMode) {
      var cols = [
        { id:'y', label:'Yellow', bg:'rgba(251,191,36,.35)', bc:'rgba(251,191,36,.7)', tc:'#92400e' },
        { id:'g', label:'Green',  bg:'rgba(52,211,153,.32)', bc:'rgba(52,211,153,.7)', tc:'#065f46' },
        { id:'p', label:'Pink',   bg:'rgba(244,63,94,.22)',  bc:'rgba(244,63,94,.7)',  tc:'#9f1239' },
        { id:'b', label:'Blue',   bg:'rgba(59,130,246,.25)', bc:'rgba(59,130,246,.7)', tc:'#1e3a8a' },
      ];
      el.innerHTML =
        '<span style=”font-size:11px;color:var(--color-muted);flex-shrink:0;padding:4px 2px;”>Color:</span>' +
        cols.map(function(c) {
          var on = _hlMode === c.id;
          return '<button class=”rt-btn'+(on?' rt-on':'')+'” '+
            'style=”background:'+c.bg+';border-color:'+c.bc+';color:'+c.tc+';” '+
            'onclick=”setHlMode(\''+c.id+'\')” title=”'+c.label+'”>'+c.label+'</button>';
        }).join('') +
        '<button class=”rt-btn” style=”background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.3);color:#f43f5e;” '+
          'onclick=”clearHighlights()” title=”Remove all highlights”>&#10006; Clear</button>' +
        '<button class=”rt-btn rt-on” onclick=”setHlMode(null)” title=”Exit highlight mode”>&#10003; Done</button>';
    } else {
      el.innerHTML =
        '<button class=”rt-btn” onclick=”setHlMode(\'y\')” title=”Highlight text”>&#9997; Highlight</button>'+
        '<div class=”rt-divider”></div>'+
        '<button class=”rt-btn” onclick=”changeZoom(-0.1)” title=”Zoom out” style=”padding:5px 10px;font-size:16px;font-weight:900;”>&#8722;</button>'+
        '<span id=”rtZoomLbl” class=”rt-btn rt-zoom-lbl” onclick=”setContentZoom(1)” title=”Reset zoom”>100%</span>'+
        '<button class=”rt-btn” onclick=”changeZoom(0.1)”  title=”Zoom in”  style=”padding:5px 10px;font-size:16px;font-weight:900;”>&#43;</button>'+
        '<div class=”rt-divider”></div>'+
        '<button class=”rt-btn” onclick=”document.getElementById(\'content\').scrollTop=0” title=”Back to top”>&#8679; Top</button>';
    }

  function setupTextPinchZoom() {
    var container = document.getElementById('content');
    if (!container) return;
    var startDist = 0, startZoom = 1.0;

    container.addEventListener('touchstart', function(e) {
      if (e.touches.length === 2) {
        startDist = Math.hypot(
          e.touches[1].clientX - e.touches[0].clientX,
          e.touches[1].clientY - e.touches[0].clientY
        );
        startZoom = _zoom;
      }
    }, { passive: true });

    container.addEventListener('touchmove', function(e) {
      if (e.touches.length !== 2 || !startDist) return;
      e.preventDefault();
      var dist = Math.hypot(
        e.touches[1].clientX - e.touches[0].clientX,
        e.touches[1].clientY - e.touches[0].clientY
      );
      setContentZoom(startZoom * dist / startDist);
    }, { passive: false });

    container.addEventListener('touchend', function(e) {
      if (e.touches.length < 2) startDist = 0;
    }, { passive: true });

    /* Double-tap: reset to 100% if zoomed, else zoom to 150% */
    var _lastTap = 0;
    container.addEventListener('touchend', function(e) {
      if (e.changedTouches.length !== 1 || e.touches.length > 0) return;
      var now = Date.now();
      if (now - _lastTap < 280) {
        setContentZoom(Math.abs(_zoom - 1.0) > 0.08 ? 1.0 : 1.5);
        e.preventDefault();
      }
      _lastTap = now;
    }, { passive: false });
  }

  /* Capture-phase: intercept .tts-sent clicks when highlight mode is on */
  document.addEventListener('click', function(e) {
    if (!_hlMode) return;
    var sent = e.target.closest ? e.target.closest('.tts-sent') : null;
    if (!sent) return;
    e.stopPropagation();
    var key = (sent.textContent || '').trim().slice(0, 50);
    var cur = sent.getAttribute('data-hl');
    if (cur === _hlMode) {
      sent.removeAttribute('data-hl');
      delete _hlStore[key];
    } else {
      sent.setAttribute('data-hl', _hlMode);
      _hlStore[key] = _hlMode;
    }
    _saveHlStore();
  }, true);

  /* ============================================================
     ADMIN BOOK MODE — showBook(b)
  ============================================================ */
  async function showBook(b){
    activateTtsBar('Preparing audio…');
    document.getElementById('appbarTitle').textContent=(b.cover||'\u{1F4D8}')+' '+(b.title||'Reading');
    document.title=(b.title||'Summary')+' — Ronyx';

    /* Mark as opened / preserve existing progress */
    var existing = RLIB.get(b.$id);
    RLIB.set(b.$id, Object.assign({}, existing||{}, {
      lastRead: Date.now(), title: b.title||'', cover: b.cover||'&#128218;',
      author: b.author||'Unknown', type: 'text',
      percent: existing ? existing.percent : 1
    }));
    initFavBtn(b.$id);
    var takeaways=[];try{takeaways=JSON.parse(b.takeaways||'[]');}catch(e){}
    var contentHtml=renderContent(b.summary||'');

    /* File-only book (no summary text) → detect MIME type and jump straight to
       the correct viewer so TTS is available without an extra tap.           */
    if (b.fileId && !contentHtml) {
      var info = await RonyxData.getFileInfo(b.fileId);
      var mime = (info && info.mimeType) || 'application/pdf';
      if (/^image\//.test(mime)) {
        var ext = mime.split('/')[1] || 'jpg';
        handleImage(b.title||'Document', b.fileId, ext);
      } else if (mime === 'text/plain' || mime === 'text/markdown') {
        handleText(b.title||'Document', b.fileId);
      } else if (isDocMime(mime)) {
        handleDocx(b.title||'Document', b.fileId);
      } else {
        handlePdf(b.title||'Document', b.fileId);
      }
      return;
    }

    var tkHtml=takeaways.length?
      '<div class=”section-hd”>Key Takeaways</div>'+
      '<div class=”takeaway-list”>'+
        takeaways.map(function(t){return '<div class=”takeaway-item”><span class=”takeaway-check”>&#10003;</span><span>'+esc(t)+'</span></div>';}).join('')+
      '</div>':'';

    /* Book has a summary; show the reader. If there is also a file, offer a
       button so the student can switch to the full document view.           */
    var fileHtml = '';
    if (b.fileId) {
      var safeTitle = JSON.stringify(b.title||'');
      var safeId    = JSON.stringify(b.fileId);
      fileHtml =
        '<div class=”section-hd”>Full Document</div>'+
        '<div style=”padding:4px 0 24px;”>'+
          '<button class=”btn btn--ghost” style=”width:100%;padding:14px;” '+
            'onclick=”openBookPdf('+safeTitle+','+safeId+')”>'+
            '&#128196;&nbsp; Open full document'+
          '</button>'+
        '</div>';
    }

    /* Listen button — always visible so user can find it immediately */
    var listenBtn = '<button id=”listenBtn” onclick=”TTS.toggle()” '+
      'style=”display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;'+
      'padding:4px 11px;border-radius:20px;background:rgba(109,94,252,.14);'+
      'color:var(--color-primary-2);border:1px solid rgba(109,94,252,.3);'+
      'cursor:pointer;margin-left:auto;-webkit-tap-highlight-color:transparent;”>'+
      '&#128266;&nbsp;Listen</button>';

    document.getElementById('content').innerHTML=
      '<div id=”readerTools” class=”reader-tools”></div>'+
      /* Summary + takeaways share one #ttsBody so TTS reads everything */
      '<div class=”section-hd” style=”display:flex;align-items:center;”>Summary'+listenBtn+'</div>'+
      '<div id=”ttsBody”>'+
        '<div class=”reader-body”>'+contentHtml+'</div>'+
        tkHtml+
      '</div>'+
      fileHtml;
    if('speechSynthesis' in window){
      var el=document.getElementById('ttsBody');
      if(el){
        TTS.init(el,b.title||'');
        var infoEl=document.getElementById('ttsInfo');
        if(infoEl) infoEl.textContent='Tap ▶ or touch text to seek';
      }
    }
    initHighlights(b.$id);
    applyHighlights();
    _zoom = 1.0; /* reset zoom for each new book */
    setupTextPinchZoom();
    renderReaderTools();
    /* Expose book context to the AI chat widget */
    if(window.rnxAI) rnxAI.setBook(b.title||'', b.summary||'');
    else window.RONYX_BOOK={title:b.title||'',summary:b.summary||''};

    /* Track scroll progress for text/summary view */
    trackScrollProgress(b.$id, { title:b.title||'', cover:b.cover||'&#128218;', author:b.author||'Unknown', type:'text' });
  }

  function openBookPdf(title, fileId) {
    if (window.TTS && TTS.stop) TTS.stop();
    document.getElementById('content').innerHTML = '';
    handlePdf(title, fileId);
  }

  /* ============================================================
     UPLOADED FILE MODE â€” shared helpers
  ============================================================ */

  /* â”€â”€ Top progress bar â”€â”€ */
  function showProc(msg, pct, color) {
    var bar = document.getElementById('topProc');
    if (!bar) return;
    bar.classList.add('on');
    var msgEl = document.getElementById('procMsg');
    var pctEl = document.getElementById('procPct');
    var fill  = document.getElementById('procFill');
    if (msgEl) msgEl.textContent = msg || 'Processingâ€¦';
    if (pctEl) pctEl.textContent = Math.round(pct || 0) + '%';
    if (fill)  {
      fill.style.width = Math.round(pct || 0) + '%';
      if (color) fill.style.background = color;
    }
  }
  function hideProc() {
    var bar = document.getElementById('topProc');
    if (bar) bar.classList.remove('on');
  }

  /* â”€â”€ Top progress HTML â”€â”€ */
  function procHtml() {
    return '<div id="topProc" class="' + /* sticky bar */ '">' +
      '<div class="tp-row"><span class="tp-msg" id="procMsg">Loadingâ€¦</span><span class="tp-pct" id="procPct">0%</span></div>'+
      '<div class="tp-track"><div class="tp-fill" id="procFill"></div></div>'+
    '</div>';
  }

  /* â”€â”€ Hero HTML â”€â”€ */
  function heroHtml(title, emoji, meta) {
    /* Title is already shown in the appbar — no separate hero needed */
    return '';
  }

  /* â”€â”€ Hidden TTS element (off-screen, DOM-accessible for TTS engine) â”€â”€ */
  function ttsBodyHtml() {
    return '<div id="ttsBody" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden;" aria-hidden="true"></div>';
  }

  /* ── MIME type helpers ── */
  function isDocMime(mime) {
    /* Word documents that mammoth.js can render */
    return /wordprocessingml|msword|vnd\.ms-word|opendocument\.text/.test(mime || '');
  }

  /* ── Fetch any file from Appwrite storage (authenticated) ──
     Returns { buf: ArrayBuffer, blob: Blob, mimeType: string }.
     Throws clear errors on auth failures and HTTP errors.      */
  async function fetchFile(fileId) {
    var url = String(RonyxData.fileViewUrl(fileId));
    var pid = (window.RONYX_CONFIG || {}).PROJECT_ID || '';

    /* Auth path 1: Appwrite SDK stores session in localStorage['cookieFallback']
       when SameSite cookie restrictions block cross-origin cookies.           */
    var cookieFallback = '';
    try { cookieFallback = localStorage.getItem('cookieFallback') || ''; } catch(e) {}

    /* Auth path 2: read session cookie directly so we can send it as a header */
    if (!cookieFallback) {
      try {
        var sessionKey = 'a_session_' + pid;
        var found = document.cookie.split(';').filter(function(c){
          return c.trim().indexOf(sessionKey) === 0;
        });
        if (found.length) {
          var kv = {};
          found.forEach(function(c){
            var parts = c.trim().split('=');
            kv[parts[0]] = parts.slice(1).join('=');
          });
          cookieFallback = JSON.stringify(kv);
        }
      } catch(e) {}
    }

    var hdrs = { 'X-Appwrite-Project': pid };
    if (cookieFallback) hdrs['X-Fallback-Cookies'] = cookieFallback;

    var r = await fetch(url, { credentials: 'include', headers: hdrs });

    if (!r.ok) {
      throw new Error('Could not load file (HTTP ' + r.status + '). Check your connection and login.');
    }

    var buf   = await r.arrayBuffer();
    var bytes = new Uint8Array(buf);
    var ct    = r.headers.get('content-type') || '';
    var head4 = bytes.length >= 4 ? String.fromCharCode(bytes[0], bytes[1], bytes[2], bytes[3]) : '';

    /* Catch HTML/JSON error pages regardless of status code */
    if (ct.includes('text/html') || head4 === '<!DO' || head4 === '<htm') {
      throw new Error('Authentication failed — session may have expired. Please log out and log back in.');
    }
    if (ct.includes('application/json') && head4.charAt(0) === '{') {
      var errText = new TextDecoder().decode(bytes.slice(0, 300));
      try { var j = JSON.parse(errText); throw new Error(j.message || 'Access denied'); }
      catch(je) { if (je.message && je.message !== 'Access denied') throw je; }
      throw new Error('Access denied — the file could not be retrieved.');
    }

    /* Detect MIME from magic bytes when server returns generic octet-stream */
    var detectedMime = ct.split(';')[0].trim() || 'application/octet-stream';
    if (bytes[0] === 0x25 && bytes[1] === 0x50 && bytes[2] === 0x44 && bytes[3] === 0x46) {
      detectedMime = 'application/pdf'; /* %PDF */
    } else if (bytes[0] === 0x50 && bytes[1] === 0x4B && bytes[2] === 0x03 && bytes[3] === 0x04) {
      /* PK header — ZIP-based format (docx, xlsx, pptx, odt…) — keep server MIME */
      if (detectedMime === 'application/octet-stream') detectedMime = ct || detectedMime;
    }

    return { buf: buf, blob: new Blob([buf], { type: detectedMime }), mimeType: detectedMime };
  }

  /* â”€â”€ Lazy-load a script (deduplicated by data-rsrc attr) â”€â”€ */
  function loadScript(src) {
    return new Promise(function(res, rej) {
      if (document.querySelector('script[data-rsrc="'+src+'"]')) { res(); return; }
      var s = document.createElement('script');
      s.src = src; s.setAttribute('data-rsrc', src);
      s.onload = res; s.onerror = function(){ rej(new Error('Script load failed: '+src)); };
      document.head.appendChild(s);
    });
  }

  /* â”€â”€ Feed cleaned text to TTS via hidden body element â”€â”€ */
  function initTtsFromText(text, title) {
    var el = document.getElementById('ttsBody');
    if (!el) return;
    /* Strip any HTML tags that OCR or extraction might include */
    text = (text || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
    if (!text) {
      el.innerHTML = '<p>No readable text was found in this document.</p>';
    } else {
      /* Split into paragraphs (double newline) or sentences if no double newlines */
      var paras = text.split(/\n{2,}/).filter(function(p){ return p.trim(); });
      if (paras.length === 1) paras = text.split(/\n/).filter(function(p){ return p.trim(); });
      el.innerHTML = paras.map(function(p){ return '<p>'+esc(p.trim())+'</p>'; }).join('');
    }
    if ('speechSynthesis' in window) TTS.init(el, title||'');
  }

  /* â”€â”€ PDF zoom â”€â”€ */
  var ZOOM_LEVELS = [50, 75, 100, 125, 150, 200, 300];
  var zoomIdx = 2; /* 100% */

  window.changeZoom = function(dir) {
    zoomIdx = Math.max(0, Math.min(ZOOM_LEVELS.length - 1, zoomIdx + dir));
    var pct = ZOOM_LEVELS[zoomIdx];
    var pages = document.getElementById('pdfPages');
    if (pages) pages.style.zoom = pct / 100;
    var lbl = document.getElementById('zoomLbl');
    if (lbl) lbl.textContent = pct + '%';
  };

  function setupPinchZoom(el) {
    var startDist = 0, startZoom = 1.0;
    el.addEventListener('touchstart', function(e) {
      if (e.touches.length === 2) {
        startDist = Math.hypot(
          e.touches[1].clientX - e.touches[0].clientX,
          e.touches[1].clientY - e.touches[0].clientY
        );
        startZoom = ZOOM_LEVELS[zoomIdx] / 100;
      }
    }, { passive: true });
    el.addEventListener('touchmove', function(e) {
      if (e.touches.length === 2 && startDist > 0) {
        var dist = Math.hypot(
          e.touches[1].clientX - e.touches[0].clientX,
          e.touches[1].clientY - e.touches[0].clientY
        );
        var newZ = Math.max(0.5, Math.min(3, startZoom * dist / startDist));
        el.style.zoom = newZ;
        var lbl = document.getElementById('zoomLbl');
        if (lbl) lbl.textContent = Math.round(newZ * 100) + '%';
      }
    }, { passive: true });
    /* Double-tap to toggle 100% â†” 200% */
    var lastTap = 0;
    el.addEventListener('click', function() {
      var now = Date.now();
      if (now - lastTap < 320) {
        zoomIdx = (ZOOM_LEVELS[zoomIdx] > 100) ? 2 : 5;
        var pct = ZOOM_LEVELS[zoomIdx];
        el.style.zoom = pct / 100;
        var lbl = document.getElementById('zoomLbl');
        if (lbl) lbl.textContent = pct + '%';
      }
      lastTap = now;
    });
  }

  /* ── PDF handler — shows the file as-is using the native browser viewer ── */
  async function handlePdf(title, fileId) {
    document.getElementById('content').innerHTML =
      procHtml() +
      '<div id=”pdfWrap” style=”border-radius:14px;overflow:hidden;border:1px solid var(--color-stroke);background:var(--color-surface);”></div>';
    showProc('Loading PDF…', 15);

    try {
      var _file = await fetchFile(fileId);
      if (isDocMime(_file.mimeType)) { await handleDocx(title, fileId, _file.buf); return; }
      if (_file.mimeType !== 'application/pdf') {
        throw new Error('Expected a PDF but received ' + _file.mimeType + '.');
      }
      var blobUrl = URL.createObjectURL(_file.blob);
      hideProc();

      /* Embed the PDF directly — the browser's built-in PDF viewer handles it.
         Works on desktop and Android Chrome. iOS Safari shows a download prompt;
         the “Open in new tab” link below covers that case.                      */
      var wrap = document.getElementById('pdfWrap');
      if (wrap) {
        wrap.innerHTML =
          '<embed src=”' + blobUrl + '” type=”application/pdf” ' +
          'style=”width:100%;height:82vh;display:block;” />' +
          '<div style=”padding:10px 14px;border-top:1px solid var(--color-stroke);text-align:center;”>' +
            '<a href=”' + blobUrl + '” target=”_blank” rel=”noopener” ' +
               'style=”font-size:12px;color:var(--color-muted);”>&#8599; Open in new tab</a>' +
          '</div>';
      }

      /* No text to extract — hide TTS bar and remove its padding */
      var bar = document.getElementById('ttsBar');
      if (bar) bar.style.display = 'none';
      var cEl = document.getElementById('content');
      if (cEl) cEl.style.paddingBottom = '12px';

      /* Progress tracking */
      var _trackId = bookId || fileId;
      if (_trackId) {
        var ex = RLIB.get(_trackId);
        RLIB.set(_trackId, {
          title: title, cover: '&#128196;', type: 'pdf',
          lastRead: Date.now(), percent: ex ? ex.percent : 1
        });
        if (!_currentBookId) initFavBtn(_trackId);
      }
    } catch (err) {
      hideProc();
      var extUrl = String(RonyxData.fileViewUrl(fileId));
      document.getElementById('content').innerHTML +=
        '<div style=”margin-top:12px;”>' +
          '<p style=”color:var(--color-danger);font-size:13px;margin-bottom:12px;”>' +
            '&#9888; ' + esc(err.message) + '</p>' +
          '<a href=”' + extUrl + '” target=”_blank” rel=”noopener” ' +
             'class=”btn btn--ghost” style=”display:block;text-align:center;”>' +
            'Open PDF externally</a>' +
        '</div>';
    }
  }

  /* ── Image handler (OCR) ── */
  async function handleImage(title, fileId, ext) {
    activateTtsBar('Preparing audio…');
    /* Show placeholder — do NOT put the Appwrite URL in <img src> because browsers
       strip credentials on cross-origin image requests, causing a 401 in the console. */
    document.getElementById('content').innerHTML =
      procHtml() +
      heroHtml(title, '&#128247;', ext.toUpperCase()) +
      '<div class=”img-viewer”><div id=”imgPlaceholder” style=”padding:32px;text-align:center;color:var(--color-muted);font-size:13px;”>Loading image&#8230;</div></div>' +
      ttsBodyHtml();

    showProc('Fetching image…', 5, '#10B981');

    try {
      var { blob } = await fetchFile(fileId);
      var blobUrl = URL.createObjectURL(blob);

      /* Swap placeholder for real image rendered from authenticated blob */
      var ph = document.getElementById('imgPlaceholder');
      if (ph) ph.outerHTML = '<img id=”bookImgEl” style=”max-width:100%;border-radius:8px;display:block;margin:0 auto;” src=”'+blobUrl+'” alt=”'+esc(title)+'”>';

      showProc('Loading OCR engine…', 15, '#10B981');
      await loadScript('/js/ocrengine.js?v=mrr39s6t');
      var ocrKey = 'ronyx_ocr_' + fileId;
      var text   = await window.RonyxOCR.processBlob(blob, ocrKey, function(p) {
        showProc(p.label, p.pct, '#10B981');
      });
      hideProc();
      initTtsFromText(text, title);
    } catch (err) {
      hideProc();
      document.getElementById('content').innerHTML +=
        '<p style=”color:var(--color-danger);font-size:13px;margin-top:12px;”>&#9888; Could not load image: '+esc(err.message)+'</p>';
    }
  }

  /* ── Text / Markdown handler ── */
  async function handleText(title, fileId) {
    var book = { title:title, cover:'&#128221;', author:'My Upload', subject:'', readMinutes:0 };
    try {
      var { blob } = await fetchFile(fileId);
      book.summary = await blob.text();
    } catch(e) {
      book.summary = '(Could not load file content — please try again.)';
    }
    showBook(book);
  }

  /* ── Word / DOCX handler ──
     Renders the document faithfully using mammoth.js (Word-to-HTML).
     Styled to look like a printed document page.
     TTS reads from the rendered content via a hidden buffer.
     Accepts an optional pre-fetched ArrayBuffer to avoid a double-fetch
     when handlePdf detects it received a DOCX file instead of a PDF.   */
  async function handleDocx(title, fileId, preloadedBuf) {
    document.getElementById('content').innerHTML =
      procHtml() +
      '<div class="doc-body" id="docBody" style="padding-bottom:120px;"></div>' +
      ttsBodyHtml();

    showProc('Loading document…', 15);

    var buf = preloadedBuf || null;
    try {
      if (!buf) {
        var _f = await fetchFile(fileId);
        buf = _f.buf;
      }

      showProc('Loading…', 50);
      await loadScript('/js/mammoth.min.js?v=mrr39s6t');

      var result  = await window.mammoth.convertToHtml({ arrayBuffer: buf });
      var html    = result.value || '<p>(Empty document)</p>';

      var docBody = document.getElementById('docBody');
      if (docBody) docBody.innerHTML = html;
      hideProc();

      /* Feed document text into TTS so the listen button works */
      initTtsFromText(docBody ? docBody.innerText : '', title);

      /* Track in reading library */
      var _trackId = bookId || fileId;
      if (_trackId) {
        var _ex = RLIB.get(_trackId);
        RLIB.set(_trackId, Object.assign({ title: title, cover: '&#128221;', type: 'doc' },
          { lastRead: Date.now(), percent: _ex ? _ex.percent : 1 }));
        if (!_currentBookId) initFavBtn(_trackId);
      }

    } catch (err) {
      hideProc();
      var extUrl = String(RonyxData.fileViewUrl(fileId));
      document.getElementById('content').innerHTML +=
        '<div style="margin-top:12px;">' +
          '<p style="color:var(--color-danger);font-size:13px;margin-bottom:12px;">' +
            '&#9888; Could not open document: ' + esc(err.message) + '</p>' +
          '<a href="' + extUrl + '" target="_blank" rel="noopener" ' +
             'class="btn btn--ghost" style="display:block;text-align:center;">' +
            'Download Document</a>' +
        '</div>';
    }
  }

  /* ============================================================
     PAGE INIT
  ============================================================ */
  var _params = new URLSearchParams(location.search);
  var bookId  = _params.get('id');
  var fileId  = _params.get('fileId') || _params.get('file');

  (async function(){

    /* â”€â”€ Uploaded file mode â”€â”€ */
    if (fileId) {
      var title    = _params.get('title') ? decodeURIComponent(_params.get('title')) : 'Document';
      var fileType = (_params.get('type') || 'pdf').toLowerCase();
      var _ftEmoji = fileType === 'pdf' ? '\u{1F4C4}' : /^(jpg|jpeg|png|gif|webp)$/.test(fileType) ? '\u{1F5BC}' : '\u{1F4DD}';
      document.getElementById('appbarTitle').textContent = _ftEmoji + ' ' + title;
      document.title = title + ' â€” Ronyx';

      if (!window.RONYX_CONFIG || !RONYX_CONFIG.CONFIGURED || !window.RonyxData) {
        document.getElementById('content').innerHTML =
          '<div class="empty"><div class="empty__icon">&#128196;</div><p>Sign in to view your uploads.</p></div>';
        return;
      }

      if (fileType === 'txt' || fileType === 'md' || fileType === 'text') {
        await handleText(title, fileId);
      } else if (fileType === 'pdf') {
        await handlePdf(title, fileId);
      } else if (/^(jpg|jpeg|png|gif|webp|image)$/.test(fileType)) {
        await handleImage(title, fileId, fileType);
      } else if (/^(docx|doc|odt|wps|rtf)$/.test(fileType)) {
        await handleDocx(title, fileId);
      } else {
        document.getElementById('content').innerHTML =
          heroHtml(title, '&#128196;', fileType.toUpperCase()) +
          '<a href="'+String(RonyxData.fileViewUrl(fileId))+'" target="_blank" rel="noopener" '+
             'class="btn btn--primary" style="display:block;text-align:center;padding:18px 0;margin-top:24px;">'+
            '&#128196;&nbsp; Open File</a>';
      }
      return;
    }

    /* â”€â”€ Admin book mode â”€â”€ */
    if (!window.RONYX_CONFIG || !RONYX_CONFIG.CONFIGURED || !bookId) {
      document.getElementById('content').innerHTML =
        '<div class="empty"><div class="empty__icon">&#128214;</div><p>Connect Appwrite to read course materials.</p></div>';
      return;
    }
    var b = await RonyxData.getBook(bookId).catch(function(){ return null; });
    if (!b) {
      document.getElementById('content').innerHTML =
        '<div class="empty"><div class="empty__icon">&#128214;</div><p>Book not found.</p></div>';
      return;
    }
    showBook(b);
  })();
  </script>
